<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AVE Rozpis</title>
  <link rel="manifest" href="/static/widget-manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-bg:  #1e3a5f;
      --page-bg:    #f8fafc;
      --tab-act:    #1e3a5f;
      --tab-idle:   #dde3ec;
      --tab-idle-fg:#475569;
      --border:     #e2e8f0;
      --hotel-fg:   #1a3050;
      --name-fg:    #1e293b;
      --dash-fg:    #dc2626;
      --p-bg:       #ffe0e6;
      --q-bg:       #fed7aa;
      --online:     #4ade80;
      --offline:    #f87171;
    }

    html, body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--page-bg);
      /* Suggest compact width — user drags window once, browser remembers */
      width: 100%;
      max-width: 260px;
    }

    /* ── Header ── */
    .hdr {
      background: var(--header-bg);
      color: #fff;
      padding: 4px 8px 4px;
      display: flex;
      align-items: center;
      gap: 5px;
      user-select: none;
    }
    .hdr-text   { flex: 1; min-width: 0; }
    .hdr-date   { font-size: 8px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-sub    { font-size: 7px; opacity: .6; margin-top: 1px; }
    .dot        { width: 5px; height: 5px; border-radius: 50%; background: var(--online); flex-shrink: 0; transition: background .4s; }
    .dot.off    { background: var(--offline); }

    /* ── Tabs ── */
    .tabs { display: flex; }
    .tab {
      flex: 1; padding: 3px 0;
      font-size: 8px; font-weight: 700;
      text-align: center; cursor: pointer;
      border: none; background: var(--tab-idle); color: var(--tab-idle-fg);
      transition: background .12s, color .12s;
      user-select: none;
      border-bottom: 2px solid transparent;
    }
    .tab.active { background: var(--tab-act); color: #fff; border-bottom-color: var(--tab-act); }

    /* ── Hotel list ── */
    .list { padding: 1px 0 2px; }

    .row {
      display: flex; align-items: center;
      padding: 2px 7px; gap: 5px;
      border-bottom: 1px solid var(--border);
      min-height: 19px;
    }
    .row:last-child { border-bottom: none; }
    .row.p { background: var(--p-bg); }
    .row.q { background: var(--q-bg); }

    .code { font-size: 8px; font-weight: 800; color: var(--hotel-fg); width: 10px; flex-shrink: 0; }
    .name { font-size: 8px; color: var(--name-fg); flex: 1; line-height: 1.3; }
    .name.empty { color: var(--dash-fg); font-weight: 700; }

    /* ── Footer ── */
    .foot {
      padding: 2px 7px 3px;
      font-size: 7px; color: #94a3b8;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between;
      cursor: default; user-select: none;
    }

    .msg { padding: 12px; text-align: center; color: #94a3b8; font-size: 8px; }
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-text">
      <div class="hdr-date" id="hdr-date">—</div>
      <div class="hdr-sub">AVE Hotels · Recepce</div>
    </div>
    <div class="dot" id="dot"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-d" onclick="switchTab('day')">Denní</button>
    <button class="tab"        id="tab-n" onclick="switchTab('night')">Noční</button>
  </div>

  <div class="list" id="list">
    <div class="msg">Načítání…</div>
  </div>

  <div class="foot">
    <span id="foot-upd"></span>
    <span style="opacity:.4">AVE</span>
  </div>

  <script>
    const HOTELS = ['A','B','C','D','E','G','H','I','J','L','M','N','S','T','U','P','Q'];
    const DAYS   = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
    const MONTHS = ['ledna','února','března','dubna','května','června',
                    'července','srpna','září','října','listopadu','prosince'];

    let tab     = localStorage.getItem('widget-tab') || 'day';
    let data    = null;
    let updated = null;

    function fmt2(n) { return String(n).padStart(2,'0'); }

    // Strip leading "z " prefix (legacy) — names already stored as "Příjmení Jméno"
    function fmtName(s) {
      if (!s) return null;
      const clean = s.trim().startsWith('z ') ? s.trim().slice(2).trim() : s.trim();
      return clean || null;
    }

    function switchTab(t) {
      tab = t;
      localStorage.setItem('widget-tab', t);
      document.getElementById('tab-d').classList.toggle('active', t === 'day');
      document.getElementById('tab-n').classList.toggle('active', t === 'night');
      render();
    }

    function render() {
      const el = document.getElementById('list');
      if (!data)      { el.innerHTML = '<div class="msg">Načítání…</div>'; return; }
      if (!data.ok)   { el.innerHTML = '<div class="msg">Chyba dat.</div>'; return; }

      const dt = new Date(data.year, data.month - 1, data.day);
      document.getElementById('hdr-date').textContent =
        `${DAYS[dt.getDay()]} ${data.day}. ${MONTHS[data.month - 1]} ${data.year}`;

      const h = data.hotels || {};
      let html = '';
      for (const code of HOTELS) {
        const info = h[code] || {};
        const raw  = tab === 'day' ? info.day : info.night;
        const name = fmtName(raw);
        const cls  = code === 'P' ? 'p' : code === 'Q' ? 'q' : '';
        html += `<div class="row ${cls}">` +
                `<span class="code">${code}</span>` +
                `<span class="name${name ? '' : ' empty'}">${name || '—'}</span>` +
                `</div>`;
      }
      el.innerHTML = html;

      if (updated) {
        document.getElementById('foot-upd').textContent =
          'Aktualizováno ' + fmt2(updated.getHours()) + ':' + fmt2(updated.getMinutes());
      }
    }

    async function load() {
      try {
        const r = await fetch('/api/widget-today', { credentials: 'include' });
        if (!r.ok || r.redirected) { window.location.href = '/'; return; }
        data    = await r.json();
        updated = new Date();
        render();
      } catch (e) { console.error(e); }
    }

    /* SSE */
    let es, retryMs = 3000;
    function connect() {
      if (es) { es.close(); es = null; }
      es = new EventSource('/api/widget-events');
      es.onopen    = () => { retryMs = 3000; document.getElementById('dot').classList.remove('off'); };
      es.onmessage = e => { if (e.data === 'update') load(); };
      es.onerror   = () => {
        document.getElementById('dot').classList.add('off');
        es.close(); es = null;
        retryMs = Math.min(retryMs * 2, 60000);
        setTimeout(connect, retryMs);
      };
    }

    /* Midnight refresh */
    function scheduleMidnight() {
      const n = new Date();
      const m = new Date(n.getFullYear(), n.getMonth(), n.getDate() + 1);
      setTimeout(() => { load(); scheduleMidnight(); }, m - n + 500);
    }

    /* Init */
    switchTab(tab);
    load();
    connect();
    scheduleMidnight();
  </script>
</body>
</html>
