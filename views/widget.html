<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Mini Rozpis</title>
  <link rel="manifest" href="/static/widget-manifest.json">
  <meta name="theme-color" content="#1E2228">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }

    :root {
      --hdr-bg:      #1E2228;
      --hdr-text:    #DDDDDD;
      --page-bg:     #F5F4EE;
      --day-bg:      #FFFFFF;
      --night-bg:    #E8EDF6;
      --chdr-day:    #2C3540;
      --chdr-ngt:    #3A4A6A;
      --border:      #D4D0C8;
      --border-mid:  #B8B4AC;
      --hotel-fg:    #2C3540;
      --name-fg:     #1A1A18;
      --dash-fg:     #b03030;
      --p-day:       #ffe0e6;
      --p-ngt:       #f4cad4;
      --p-code:      #ffe0e6;
      --q-day:       #fed7aa;
      --q-ngt:       #f4c48a;
      --q-code:      #fed7aa;
      --online:      #4ade80;
      --offline:     #f87171;
      --foot-fg:     #999890;
      --nav-fg:      #777870;
    }

    /* Shrink to content — no scrollbars */
    html, body {
      width: fit-content;
      overflow: hidden;
      scrollbar-width: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--name-fg);
    }

    /* ── Header ── */
    .hdr {
      background: var(--hdr-bg);
      padding: 4px 7px 3px;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      color: var(--nav-fg); font-size: 13px; font-weight: 700;
      padding: 0 2px; line-height: 1; border-radius: 2px;
      transition: color .12s;
    }
    .nav-btn:hover { color: #fff; }
    .hdr-date {
      font-size: 8px; font-weight: 700; color: var(--hdr-text);
      flex: 1; white-space: nowrap; padding: 0 3px;
    }
    .today-btn {
      font-size: 7px; font-weight: 700;
      padding: 1px 6px; border-radius: 3px; border: none; cursor: pointer;
      background: #2C3540; color: #fff;
    }
    .today-btn.on-today { background: #3E444C; color: #666860; cursor: default; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--online); margin-left: 4px;
      transition: background .4s;
    }
    .dot.off { background: var(--offline); }

    /* ── Table — natural (fit-content) width ── */
    table { border-collapse: collapse; }  /* NO width:100% */

    thead th {
      font-size: 7.5px; font-weight: 700; letter-spacing: .04em;
      padding: 2px 5px; color: #fff;
      border-bottom: 2px solid var(--border-mid);
      white-space: nowrap;
    }
    thead th.th-code { background: var(--page-bg); color: transparent; padding: 2px 4px; }
    thead th.th-day  { background: var(--chdr-day); border-right: 1px solid var(--border-mid); }
    thead th.th-ngt  { background: var(--chdr-ngt); }

    tbody tr         { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }

    tbody td {
      font-size: 8px; padding: 2px 5px;
      white-space: nowrap;
      vertical-align: middle;
    }
    td.code {
      font-weight: 800; color: var(--hotel-fg);
      padding-left: 7px; padding-right: 4px;
      border-right: 1px solid var(--border-mid);
      background: var(--page-bg);
    }
    /* min-width sized to fit "Kochurikhina Valeriia" (21 chars @ 8px) */
    td.day {
      min-width: 120px;
      background: var(--day-bg);
      border-right: 1px solid var(--border);
      color: var(--name-fg);
    }
    td.ngt {
      min-width: 120px;
      background: var(--night-bg);
      color: var(--name-fg);
    }
    td.empty { color: var(--dash-fg); font-weight: 700; }

    tr.p td.code { background: var(--p-code); }
    tr.p td.day  { background: var(--p-day); }
    tr.p td.ngt  { background: var(--p-ngt); }
    tr.q td.code { background: var(--q-code); }
    tr.q td.day  { background: var(--q-day); }
    tr.q td.ngt  { background: var(--q-ngt); }

    /* ── Footer ── */
    .foot {
      font-size: 7px; color: var(--foot-fg);
      padding: 2px 7px 3px;
      border-top: 1px solid var(--border);
      white-space: nowrap;
      cursor: default; user-select: none;
    }
    .msg { padding: 10px 16px; font-size: 8px; color: var(--foot-fg); white-space: nowrap; }
  </style>
</head>
<body>

  <div class="hdr">
    <button class="nav-btn" onclick="navDay(-1)" title="Předchozí den">&#8249;</button>
    <div class="hdr-date" id="hdr-date">—</div>
    <button class="nav-btn" onclick="navDay(1)" title="Následující den">&#8250;</button>
    <button class="today-btn" id="btn-today" onclick="goToday()">Dnes</button>
    <div class="dot" id="dot"></div>
  </div>

  <div id="content"><div class="msg">Načítání…</div></div>

  <div class="foot" id="foot">AVE Hotels · Recepce</div>

  <script>
    const HOTELS = ['A','B','C','D','E','G','H','I','J','L','M','N','S','T','U','P','Q'];
    const DAYS   = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
    const MONTHS = ['ledna','února','března','dubna','května','června',
                    'července','srpna','září','října','listopadu','prosince'];

    let data=null, updated=null;
    const _n=new Date();
    let viewDay=_n.getDate(), viewMonth=_n.getMonth()+1, viewYear=_n.getFullYear();

    function isToday(){const n=new Date();return viewDay===n.getDate()&&viewMonth===n.getMonth()+1&&viewYear===n.getFullYear();}
    function daysInMonth(m,y){return new Date(y,m,0).getDate();}
    function fmt2(n){return String(n).padStart(2,'0');}
    function fmtName(s){
      if(!s) return null;
      const c=s.trim().startsWith('z ')?s.trim().slice(2).trim():s.trim();
      return c||null;
    }

    function fitWindow(){
      try {
        const chromeW = window.outerWidth  - window.innerWidth;
        const chromeH = window.outerHeight - window.innerHeight;
        // offsetWidth = rendered width of html element (= fit-content width)
        const w = document.documentElement.offsetWidth;
        // scrollHeight = full content height including any overflow
        const h = document.documentElement.scrollHeight;
        window.resizeTo(w + chromeW, h + chromeH);
      } catch(e) {}
    }

    function goToday(){const n=new Date();viewDay=n.getDate();viewMonth=n.getMonth()+1;viewYear=n.getFullYear();load();}
    function navDay(d){
      viewDay+=d;
      const dim=daysInMonth(viewMonth,viewYear);
      if(viewDay<1){viewMonth--;if(viewMonth<1){viewMonth=12;viewYear--;}viewDay=daysInMonth(viewMonth,viewYear);}
      else if(viewDay>dim){viewDay=1;viewMonth++;if(viewMonth>12){viewMonth=1;viewYear++;}}
      load();
    }

    function render(){
      document.getElementById('btn-today').classList.toggle('on-today', isToday());
      const el = document.getElementById('content');
      if(!data){el.innerHTML='<div class="msg">Načítání…</div>';fitWindow();return;}
      if(!data.ok){el.innerHTML='<div class="msg">Žádný rozpis.</div>';fitWindow();return;}

      const dt=new Date(data.year,data.month-1,data.day);
      document.getElementById('hdr-date').textContent=
        `${DAYS[dt.getDay()]} ${data.day}. ${MONTHS[data.month-1]} ${data.year}`;

      const h=data.hotels||{};
      let rows='';
      for(const code of HOTELS){
        const info=h[code]||{};
        const dn=fmtName(info.day), nn=fmtName(info.night);
        const cls=code==='P'?'p':code==='Q'?'q':'';
        rows+=`<tr class="${cls}">` +
          `<td class="code">${code}</td>` +
          `<td class="day${dn?'':' empty'}">${dn||'—'}</td>` +
          `<td class="ngt${nn?'':' empty'}">${nn||'—'}</td>` +
          `</tr>`;
      }
      el.innerHTML=`<table>
        <thead><tr>
          <th class="th-code"></th>
          <th class="th-day">Denní</th>
          <th class="th-ngt">Noční</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

      if(updated)
        document.getElementById('foot').textContent=
          `Aktualizováno ${fmt2(updated.getHours())}:${fmt2(updated.getMinutes())}`;

      // Two-tick resize: paint first, then snap window
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        fitWindow();
        setTimeout(fitWindow, 100);
      }));
    }

    async function load(){
      try{
        const r=await fetch(`/api/widget-today?day=${viewDay}&month=${viewMonth}&year=${viewYear}`,{credentials:'include'});
        if(!r.ok||r.redirected){window.location.href='/';return;}
        data=await r.json(); updated=new Date(); render();
      }catch(e){console.error(e);}
    }

    let es, retryMs=3000;
    function connect(){
      if(es){es.close();es=null;}
      es=new EventSource('/api/widget-events');
      es.onopen=()=>{retryMs=3000;document.getElementById('dot').classList.remove('off');};
      es.onmessage=e=>{if(e.data==='update')load();};
      es.onerror=()=>{
        document.getElementById('dot').classList.add('off');
        es.close();es=null;retryMs=Math.min(retryMs*2,60000);
        setTimeout(connect,retryMs);
      };
    }

    function scheduleMidnight(){
      const n=new Date(),m=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1);
      setTimeout(()=>{goToday();scheduleMidnight();},m-n+500);
    }

    load(); connect(); scheduleMidnight();
  </script>
</body>
</html>
