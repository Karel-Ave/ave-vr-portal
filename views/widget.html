<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Denní rozpis">
  <title>Denní rozpis</title>
  <link rel="manifest" href="/static/widget-manifest.json">
  <link rel="stylesheet" href="/static/theme.css">
  <script src="/static/theme.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      min-height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    button {
      font: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .widget-top {
      flex: 0 0 auto;
      min-height: 50px;
      padding: max(7px, env(safe-area-inset-top)) 10px 7px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      background: var(--bg-topbar);
      border-bottom: 1px solid var(--border);
    }
    .today-btn,
    .icon-btn {
      min-height: 34px;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
    }
    .today-btn {
      min-width: 78px;
      padding: 0 13px;
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 48%, var(--border));
    }
    .today-btn.is-today {
      color: var(--text-muted);
      border-color: var(--border);
    }
    .date-nav {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .nav-btn {
      width: 38px;
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--accent);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
    }
    .nav-btn:hover,
    .nav-btn:focus-visible {
      background: color-mix(in srgb, var(--accent) 15%, transparent);
      outline: none;
    }
    #date-label {
      min-width: 0;
      text-align: center;
      color: var(--text);
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .right-tools {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    #btn-theme.icon-btn {
      width: 42px;
      font-size: 20px;
    }
    .status-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #35d270;
      box-shadow: 0 0 0 3px color-mix(in srgb, #35d270 18%, transparent);
    }
    .status-dot.off {
      background: #e25c4f;
      box-shadow: 0 0 0 3px color-mix(in srgb, #e25c4f 18%, transparent);
    }
    .table-wrap {
      flex: 0 0 auto;
      width: 100%;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .widget-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      background: var(--surface);
    }
    .widget-table col.code { width: 50px; }
    .widget-table th {
      padding: 9px 10px;
      background: var(--surface-alt);
      color: var(--accent);
      border-bottom: 2px solid var(--border-strong);
      font-size: clamp(15px, 3.2vw, 22px);
      font-weight: 900;
      letter-spacing: .08em;
    }
    .widget-table th.code-head {
      background: var(--bg-topbar);
      color: transparent;
    }
    .widget-table td {
      height: clamp(36px, 5.15vh, 55px);
      padding: 0 12px;
      border-bottom: 1px solid var(--border);
      font-size: clamp(16px, 3.7vw, 26px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .widget-table td.code {
      padding: 0;
      text-align: center;
      font-weight: 900;
      color: var(--accent);
      background: var(--bg-topbar);
      border-right: 1px solid var(--border-strong);
    }
    .widget-table td.day {
      color: var(--text);
      background: var(--surface);
      border-right: 1px solid var(--border-strong);
    }
    .widget-table td.night {
      color: var(--text);
      background: color-mix(in srgb, var(--surface-alt) 80%, var(--accent) 8%);
    }
    .widget-table tr.p td.code {
      color: #ffe8ef;
      background: color-mix(in srgb, #7e263e 74%, var(--bg-topbar));
    }
    .widget-table tr.p td.day,
    .widget-table tr.p td.night {
      background: color-mix(in srgb, #7e263e 36%, var(--surface));
    }
    .widget-table tr.q td.code {
      color: #ffe9ca;
      background: color-mix(in srgb, #8c561a 70%, var(--bg-topbar));
    }
    .widget-table tr.q td.day,
    .widget-table tr.q td.night {
      background: color-mix(in srgb, #8c561a 31%, var(--surface));
    }
    .missing {
      color: #d33a2f;
      font-weight: 900;
    }
    .note {
      display: inline-block;
      max-width: 100%;
      color: var(--text-muted);
      font-style: italic;
      font-size: .84em;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    .widget-foot {
      flex: 0 0 auto;
      min-height: 32px;
      padding: 5px 10px max(5px, env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: var(--bg-topbar);
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
    }
    .empty {
      padding: 34px 18px;
      color: var(--text-muted);
      text-align: center;
      font-size: 18px;
    }
    .fill {
      flex: 1 1 auto;
      background: var(--bg);
    }
    @media (max-width: 620px) {
      .widget-top {
        min-height: 48px;
        grid-template-columns: 76px minmax(0, 1fr) 62px;
        gap: 5px;
        padding-left: 7px;
        padding-right: 7px;
      }
      .today-btn {
        min-width: 0;
        padding: 0 8px;
      }
      .date-nav { gap: 4px; }
      .nav-btn {
        width: 30px;
        min-height: 34px;
        font-size: 28px;
      }
      #date-label { font-size: clamp(17px, 5vw, 24px); }
      .right-tools { gap: 6px; justify-content: flex-end; }
      #btn-theme.icon-btn {
        width: 38px;
        min-height: 34px;
      }
      .status-dot {
        width: 9px;
        height: 9px;
      }
      .widget-table col.code { width: 34px; }
      .widget-table th { padding: 7px 4px; }
      .widget-table td { padding: 0 7px; }
    }
    @media (orientation: landscape) and (max-height: 520px) {
      .widget-top { min-height: 42px; padding-top: 4px; padding-bottom: 4px; }
      .today-btn, .icon-btn { min-height: 30px; }
      .nav-btn { min-height: 30px; font-size: 25px; }
      .widget-table td { height: 31px; font-size: 15px; }
      .widget-table th { padding: 5px 4px; font-size: 14px; }
      .widget-foot { min-height: 26px; padding-top: 3px; padding-bottom: 3px; }
    }
  </style>
</head>
<body>
  <header class="widget-top">
    <button class="today-btn" id="today-btn" type="button">Dnes</button>
    <div class="date-nav">
      <button class="nav-btn" id="prev-day" type="button" aria-label="Předchozí den">‹</button>
      <div id="date-label">Načítání...</div>
      <button class="nav-btn" id="next-day" type="button" aria-label="Další den">›</button>
    </div>
    <div class="right-tools">
      <button id="btn-theme" class="icon-btn" type="button" title="Přepnout světlý/tmavý režim">☀</button>
      <span class="status-dot" id="status-dot" title="Připojeno"></span>
    </div>
  </header>

  <main class="table-wrap" id="content">
    <div class="empty">Načítání...</div>
  </main>
  <footer class="widget-foot">
    <span id="updated-label">Aktualizováno...</span>
    <span>AVE Hotels</span>
  </footer>
  <div class="fill"></div>

  <script>
    const DAYS = ['Neděle', 'Pondělí', 'Úterý', 'Středa', 'Čtvrtek', 'Pátek', 'Sobota'];
    const MONTHS = ['ledna', 'února', 'března', 'dubna', 'května', 'června', 'července', 'srpna', 'září', 'října', 'listopadu', 'prosince'];
    const NO_NIGHT = new Set(['L', 'N', 'U']);
    const ONLY_DAY = new Set(['J', 'S']);
    let viewDate = new Date();
    let eventSource = null;
    let retryMs = 3000;

    function pad(n) {
      return String(n).padStart(2, '0');
    }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }
    function formatDate(date) {
      return `${DAYS[date.getDay()]} ${date.getDate()}. ${MONTHS[date.getMonth()]} ${date.getFullYear()}`;
    }
    function setStatus(ok) {
      const dot = document.getElementById('status-dot');
      if (dot) dot.classList.toggle('off', !ok);
    }
    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    }
    function cellHtml(letter, value, isNight, info) {
      const dayOnly = !!(info && info.dayOnly);
      if (isNight && (ONLY_DAY.has(letter) || (dayOnly && (letter === 'J' || letter === 'S')))) return '<span class="note">Pouze ve dne</span>';
      if (isNight && (NO_NIGHT.has(letter) || dayOnly)) return '<span class="note">Hotel bez noční recepce</span>';
      if (value) return escapeHtml(value);
      return '<span class="missing">-</span>';
    }
    function updateLabels() {
      const today = new Date();
      document.getElementById('date-label').textContent = formatDate(viewDate);
      document.getElementById('today-btn').classList.toggle('is-today', sameDay(today, viewDate));
    }
    function renderWidget(data) {
      const map = data.hotels || {};
      const order = Array.isArray(data.hotels_order) && data.hotels_order.length ? data.hotels_order : Object.keys(map);
      const rows = order.map(letter => {
        const item = map[letter] || {};
        const cls = letter === 'P' ? ' class="p"' : letter === 'Q' ? ' class="q"' : '';
        return `<tr${cls}>
          <td class="code">${escapeHtml(letter)}</td>
          <td class="day">${cellHtml(letter, item.day, false, item)}</td>
          <td class="code">${escapeHtml(letter)}</td>
          <td class="night">${cellHtml(letter, item.night, true, item)}</td>
        </tr>`;
      }).join('');
      document.getElementById('content').innerHTML = `<table class="widget-table">
        <colgroup><col class="code"><col><col class="code"><col></colgroup>
        <thead><tr><th class="code-head"></th><th>Denní</th><th class="code-head"></th><th>Noční</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
      const now = new Date();
      document.getElementById('updated-label').textContent = `Aktualizováno ${pad(now.getHours())}:${pad(now.getMinutes())}`;
    }
    async function loadWidget() {
      updateLabels();
      const url = `/api/widget-today?day=${viewDate.getDate()}&month=${viewDate.getMonth() + 1}&year=${viewDate.getFullYear()}`;
      try {
        const res = await fetch(url, { credentials: 'include' });
        if (res.redirected || res.status === 401) {
          window.location.href = '/?next=/widget';
          return;
        }
        const data = await res.json();
        if (!data.ok) throw new Error(data.msg || 'Widget data error');
        renderWidget(data);
        setStatus(true);
      } catch (err) {
        console.error(err);
        setStatus(false);
        document.getElementById('content').innerHTML = '<div class="empty">Rozpis se nepodařilo načíst.</div>';
      }
    }
    function moveDay(delta) {
      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), viewDate.getDate() + delta);
      loadWidget();
    }
    function goToday() {
      viewDate = new Date();
      loadWidget();
    }
    function connectEvents() {
      if (!window.EventSource) return;
      if (eventSource) eventSource.close();
      eventSource = new EventSource('/api/widget-events');
      eventSource.onopen = () => {
        retryMs = 3000;
        setStatus(true);
      };
      eventSource.onmessage = (event) => {
        if (event.data === 'update') loadWidget();
      };
      eventSource.onerror = () => {
        setStatus(false);
        if (eventSource) eventSource.close();
        retryMs = Math.min(retryMs * 2, 60000);
        setTimeout(connectEvents, retryMs);
      };
    }
    document.getElementById('prev-day').addEventListener('click', () => moveDay(-1));
    document.getElementById('next-day').addEventListener('click', () => moveDay(1));
    document.getElementById('today-btn').addEventListener('click', goToday);
    setInterval(loadWidget, 60000);
    loadWidget();
    connectEvents();
  </script>
</body>
</html>
