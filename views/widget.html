<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AVE Rozpis</title>
  <link rel="manifest" href="/static/widget-manifest.json">
  <meta name="theme-color" content="#1E2228">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --hdr-bg:      #1E2228;
      --hdr-text:    #DDDDDD;
      --hdr-sub:     #555850;
      --page-bg:     #F5F4EE;
      --day-bg:      #FFFFFF;
      --night-bg:    #E8EDF6;
      --col-day-hdr: #2C3540;
      --col-ngt-hdr: #3A4A6A;
      --border:      #D4D0C8;
      --border-mid:  #C8C4BC;
      --hotel-fg:    #2C3540;
      --name-fg:     #1A1A18;
      --dash-fg:     #b03030;
      --p-day:       #ffe0e6;
      --p-ngt:       #f4cad4;
      --p-code:      #ffe0e6;
      --q-day:       #fed7aa;
      --q-ngt:       #f4c48a;
      --q-code:      #fed7aa;
      --online:      #4ade80;
      --offline:     #f87171;
      --foot-fg:     #999890;
      --nav-fg:      #888880;
      --nav-hover:   #FFFFFF;
      --today-bg:    #2C3540;
      --today-fg:    #FFFFFF;
      --today-dis:   #3E444C;
      --today-dis-fg:#666860;
    }

    html, body {
      width: fit-content;
      min-width: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--page-bg);
      color: var(--name-fg);
      white-space: nowrap;
    }

    /* ── Header: ‹ date › [Dnes] • ── */
    .hdr {
      background: var(--hdr-bg);
      padding: 4px 6px 3px;
      display: flex;
      align-items: center;
      gap: 3px;
      width: 100%;
    }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      color: var(--nav-fg); font-size: 13px; font-weight: 700;
      width: 16px; text-align: center; line-height: 1; padding: 0;
      border-radius: 2px; flex-shrink: 0;
      transition: color .12s;
    }
    .nav-btn:hover { color: var(--nav-hover); }

    .hdr-mid { flex: 1; min-width: 0; }
    .hdr-date { font-size: 8px; font-weight: 700; color: var(--hdr-text);
                white-space: nowrap; }

    .today-btn {
      font-size: 7px; font-weight: 700; padding: 1px 5px;
      border-radius: 3px; cursor: pointer; border: none; flex-shrink: 0;
      background: var(--today-bg); color: var(--today-fg);
      transition: opacity .15s;
    }
    .today-btn.on-today {
      background: var(--today-dis); color: var(--today-dis-fg);
      cursor: default;
    }

    .dot { width: 5px; height: 5px; border-radius: 50%;
           background: var(--online); flex-shrink: 0;
           margin-left: 3px; transition: background .4s; }
    .dot.off { background: var(--offline); }

    /* ── Column header row ── */
    .col-hdr {
      display: flex;
      border-bottom: 2px solid var(--border-mid);
      width: 100%;
    }
    .chdr-code { width: 22px; flex-shrink: 0; background: var(--page-bg); }
    .chdr-cell {
      flex: 1; font-size: 7px; font-weight: 700; letter-spacing: .04em;
      text-align: center; padding: 2px 4px; color: #fff;
    }
    .chdr-cell.day { background: var(--col-day-hdr); border-right: 1px solid var(--border-mid); }
    .chdr-cell.ngt { background: var(--col-ngt-hdr); }

    /* ── Hotel rows ── */
    .list { width: 100%; }

    .row {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      min-height: 20px; width: 100%;
    }
    .row:last-child { border-bottom: none; }

    /* hotel code cell */
    .code {
      width: 22px; flex-shrink: 0;
      font-size: 8px; font-weight: 800; color: var(--hotel-fg);
      padding: 2px 3px 2px 6px;
      display: flex; align-items: center;
      border-right: 1px solid var(--border-mid);
      background: var(--page-bg);
    }

    /* day / night name cells */
    .cell {
      flex: 1; font-size: 8px; padding: 2px 5px;
      display: flex; align-items: center;
      overflow: hidden; /* clip if somehow overflows */
    }
    .cell.day { background: var(--day-bg); border-right: 1px solid var(--border); color: var(--name-fg); }
    .cell.ngt { background: var(--night-bg); color: var(--name-fg); }
    .cell.empty { color: var(--dash-fg); font-weight: 700; }

    /* P / Q row overrides */
    .row.p .code { background: var(--p-code); }
    .row.p .cell.day { background: var(--p-day); }
    .row.p .cell.ngt { background: var(--p-ngt); }
    .row.q .code { background: var(--q-code); }
    .row.q .cell.day { background: var(--q-day); }
    .row.q .cell.ngt { background: var(--q-ngt); }

    /* ── Footer ── */
    .foot {
      padding: 2px 6px 3px;
      font-size: 7px; color: var(--foot-fg);
      border-top: 1px solid var(--border);
      width: 100%; cursor: default; user-select: none;
    }

    .msg { padding: 10px 16px; font-size: 8px; color: var(--foot-fg); }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="hdr">
    <button class="nav-btn" onclick="navDay(-1)" title="Předchozí den">&#8249;</button>
    <div class="hdr-mid">
      <div class="hdr-date" id="hdr-date">—</div>
    </div>
    <button class="nav-btn" onclick="navDay(1)" title="Následující den">&#8250;</button>
    <button class="today-btn" id="btn-today" onclick="goToday()">Dnes</button>
    <div class="dot" id="dot"></div>
  </div>

  <!-- Column headers -->
  <div class="col-hdr">
    <div class="chdr-code"></div>
    <div class="chdr-cell day">Denní</div>
    <div class="chdr-cell ngt">Noční</div>
  </div>

  <!-- Hotel rows -->
  <div class="list" id="list">
    <div class="msg">Načítání…</div>
  </div>

  <div class="foot" id="foot">AVE Hotels · Recepce</div>

  <script>
    const HOTELS = ['A','B','C','D','E','G','H','I','J','L','M','N','S','T','U','P','Q'];

    const DAYS   = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
    const MONTHS = ['ledna','února','března','dubna','května','června',
                    'července','srpna','září','října','listopadu','prosince'];

    let data    = null;
    let updated = null;

    const _n = new Date();
    let viewDay   = _n.getDate();
    let viewMonth = _n.getMonth() + 1;
    let viewYear  = _n.getFullYear();

    function isToday() {
      const n = new Date();
      return viewDay===n.getDate() && viewMonth===n.getMonth()+1 && viewYear===n.getFullYear();
    }
    function daysInMonth(m,y) { return new Date(y,m,0).getDate(); }
    function fmt2(n) { return String(n).padStart(2,'0'); }

    // Strip leading "z " — names stored as "Příjmení Jméno"
    function fmtName(s) {
      if (!s) return null;
      const c = s.trim().startsWith('z ') ? s.trim().slice(2).trim() : s.trim();
      return c || null;
    }

    function goToday() {
      const n = new Date();
      viewDay=n.getDate(); viewMonth=n.getMonth()+1; viewYear=n.getFullYear();
      load();
    }

    function navDay(delta) {
      viewDay += delta;
      const dim = daysInMonth(viewMonth, viewYear);
      if (viewDay < 1) {
        viewMonth--; if (viewMonth<1){viewMonth=12;viewYear--;}
        viewDay = daysInMonth(viewMonth, viewYear);
      } else if (viewDay > dim) {
        viewDay=1; viewMonth++; if(viewMonth>12){viewMonth=1;viewYear++;}
      }
      load();
    }

    function fitWindow() {
      try {
        // content width is determined by CSS (fit-content on html/body)
        // height: scrollHeight + browser chrome (~32px title bar)
        const w = document.body.scrollWidth;
        const h = document.body.scrollHeight;
        window.resizeTo(w + 2, h + 32);
      } catch(e) {}
    }

    function render() {
      // Update Dnes button
      const btnToday = document.getElementById('btn-today');
      btnToday.classList.toggle('on-today', isToday());

      const el = document.getElementById('list');
      if (!data) { el.innerHTML='<div class="msg">Načítání…</div>'; fitWindow(); return; }
      if (!data.ok) { el.innerHTML='<div class="msg">Žádný rozpis.</div>'; fitWindow(); return; }

      const dt = new Date(data.year, data.month-1, data.day);
      document.getElementById('hdr-date').textContent =
        `${DAYS[dt.getDay()]} ${data.day}. ${MONTHS[data.month-1]} ${data.year}`;

      const h = data.hotels || {};
      let html = '';
      for (const code of HOTELS) {
        const info  = h[code] || {};
        const dname = fmtName(info.day);
        const nname = fmtName(info.night);
        const cls   = code==='P' ? 'p' : code==='Q' ? 'q' : '';
        html +=
          `<div class="row ${cls}">` +
            `<span class="code">${code}</span>` +
            `<span class="cell day${dname?'':' empty'}">${dname||'—'}</span>` +
            `<span class="cell ngt${nname?'':' empty'}">${nname||'—'}</span>` +
          `</div>`;
      }
      el.innerHTML = html;

      if (updated) {
        document.getElementById('foot').textContent =
          `Aktualizováno ${fmt2(updated.getHours())}:${fmt2(updated.getMinutes())}`;
      }

      fitWindow();
    }

    async function load() {
      try {
        const url = `/api/widget-today?day=${viewDay}&month=${viewMonth}&year=${viewYear}`;
        const r = await fetch(url, { credentials: 'include' });
        if (!r.ok || r.redirected) { window.location.href='/'; return; }
        data    = await r.json();
        updated = new Date();
        render();
      } catch(e) { console.error(e); }
    }

    /* SSE */
    let es, retryMs = 3000;
    function connect() {
      if (es) { es.close(); es=null; }
      es = new EventSource('/api/widget-events');
      es.onopen    = () => { retryMs=3000; document.getElementById('dot').classList.remove('off'); };
      es.onmessage = e => { if(e.data==='update') load(); };
      es.onerror   = () => {
        document.getElementById('dot').classList.add('off');
        es.close(); es=null;
        retryMs = Math.min(retryMs*2, 60000);
        setTimeout(connect, retryMs);
      };
    }

    /* Midnight snap */
    function scheduleMidnight() {
      const n = new Date();
      const m = new Date(n.getFullYear(), n.getMonth(), n.getDate()+1);
      setTimeout(() => { goToday(); scheduleMidnight(); }, m-n+500);
    }

    load();
    connect();
    scheduleMidnight();
  </script>
</body>
</html>
