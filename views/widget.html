<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>AVE Rozpis</title>
  <link rel="manifest" href="/static/widget-manifest.json">
  <meta name="theme-color" content="#1e3a5f">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --header-bg:   #1e3a5f;
      --header-text: #ffffff;
      --page-bg:     #f8fafc;
      --tab-act-bg:  #1e3a5f;
      --tab-act-fg:  #ffffff;
      --tab-idle-bg: #dde3ec;
      --tab-idle-fg: #475569;
      --border:      #e2e8f0;
      --hotel-fg:    #1a3050;
      --name-fg:     #1e293b;
      --dash-fg:     #dc2626;
      --p-bg:        #ffe0e6;
      --q-bg:        #fed7aa;
      --online:      #4ade80;
      --offline:     #f87171;
    }

    html, body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--page-bg);
      /* narrow default — user resizes once, browser remembers */
      min-width: 220px;
    }

    /* ── Header ── */
    .hdr {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 7px 10px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
      user-select: none;
    }
    .hdr-text { flex: 1; min-width: 0; }
    .hdr-date { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hdr-sub  { font-size: 10px; opacity: .6; margin-top: 1px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--online); flex-shrink: 0;
      transition: background .4s;
    }
    .dot.off { background: var(--offline); }

    /* ── Tabs ── */
    .tabs { display: flex; }
    .tab {
      flex: 1; padding: 5px 0;
      font-size: 12px; font-weight: 700;
      text-align: center; cursor: pointer;
      border: none; background: var(--tab-idle-bg); color: var(--tab-idle-fg);
      transition: background .12s, color .12s;
      user-select: none;
      border-bottom: 2px solid transparent;
    }
    .tab.active { background: var(--tab-act-bg); color: var(--tab-act-fg); border-bottom-color: var(--tab-act-bg); }

    /* ── Hotel list ── */
    .list { padding: 2px 0 4px; }

    .row {
      display: flex; align-items: center;
      padding: 3px 10px; gap: 8px;
      border-bottom: 1px solid var(--border);
      min-height: 26px;
    }
    .row:last-child { border-bottom: none; }
    .row.p { background: var(--p-bg); }
    .row.q { background: var(--q-bg); }

    .code {
      font-size: 12px; font-weight: 800;
      color: var(--hotel-fg); width: 13px; flex-shrink: 0;
    }
    .name { font-size: 11.5px; color: var(--name-fg); flex: 1; line-height: 1.25; }
    .name.empty { color: var(--dash-fg); font-weight: 700; }

    /* ── Footer ── */
    .foot {
      padding: 3px 10px 4px;
      font-size: 9.5px; color: #94a3b8;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      cursor: default;
    }

    /* ── Msg ── */
    .msg { padding: 20px; text-align: center; color: #94a3b8; font-size: 12px; }
  </style>
</head>
<body>

  <div class="hdr">
    <div class="hdr-text">
      <div class="hdr-date" id="hdr-date">—</div>
      <div class="hdr-sub">AVE Hotels · Recepce</div>
    </div>
    <div class="dot" id="dot" title="SSE připojení"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-d" onclick="switchTab('day')">Denní</button>
    <button class="tab"        id="tab-n" onclick="switchTab('night')">Noční</button>
  </div>

  <div class="list" id="list">
    <div class="msg">Načítání…</div>
  </div>

  <div class="foot">
    <span id="foot-time"></span>
    <span id="foot-tip" style="opacity:.55;cursor:pointer" title="Jak zobrazit vždy navrchu" onclick="toggleTip()">?</span>
  </div>

  <!-- tip overlay -->
  <div id="tip" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;padding:16px;display:none;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:8px;padding:14px 16px;max-width:280px;font-size:12px;line-height:1.6;color:#1e293b;">
      <b style="display:block;margin-bottom:6px;">Vždy navrchu – PowerToys</b>
      1. Stáhni <b>Microsoft PowerToys</b> z Microsoft Store (zdarma).<br>
      2. Otevři PowerToys → <b>Always on Top</b> → zapni.<br>
      3. Klikni do okna widgetu a stiskni <b>Win + Ctrl + T</b>.<br>
      Okno zůstane trvale navrchu i při přepínání aplikací.<br>
      <button onclick="toggleTip()" style="margin-top:10px;padding:4px 12px;background:#1e3a5f;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;">Zavřít</button>
    </div>
  </div>

  <script>
    const HOTELS = ['A','B','C','D','E','G','H','I','J','L','M','N','S','T','U','P','Q'];
    const DAYS   = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
    const MONTHS = ['ledna','února','března','dubna','května','června',
                    'července','srpna','září','října','listopadu','prosince'];

    let tab      = localStorage.getItem('widget-tab') || 'day';
    let data     = null;
    let updated  = null;

    function fmt2(n){ return String(n).padStart(2,'0'); }

    // Converts "Jana Nováková" → "Nováková Jana"
    function fmtName(s) {
      if (!s) return null;
      const p = s.trim().split(/\s+/);
      return p.length < 2 ? s : p[p.length-1] + ' ' + p.slice(0,-1).join(' ');
    }

    function switchTab(t) {
      tab = t;
      localStorage.setItem('widget-tab', t);
      document.getElementById('tab-d').classList.toggle('active', t==='day');
      document.getElementById('tab-n').classList.toggle('active', t==='night');
      render();
    }

    function render() {
      const el = document.getElementById('list');
      if (!data) { el.innerHTML = '<div class="msg">Načítání…</div>'; return; }
      if (!data.ok) { el.innerHTML = '<div class="msg">Chyba dat.</div>'; return; }

      const dt = new Date(data.year, data.month-1, data.day);
      document.getElementById('hdr-date').textContent =
        `${DAYS[dt.getDay()]} ${data.day}. ${MONTHS[data.month-1]} ${data.year}`;

      const h = data.hotels || {};
      let html = '';
      for (const code of HOTELS) {
        const info = h[code] || {};
        const raw  = tab==='day' ? info.day : info.night;
        const name = fmtName(raw);
        const cls  = code==='P' ? 'p' : code==='Q' ? 'q' : '';
        html += `<div class="row ${cls}"><span class="code">${code}</span>` +
                `<span class="name${name?'':' empty'}">${name||'—'}</span></div>`;
      }
      el.innerHTML = html;

      if (updated) {
        document.getElementById('foot-time').textContent =
          'Aktualizováno ' + fmt2(updated.getHours()) + ':' + fmt2(updated.getMinutes());
      }
    }

    async function load() {
      try {
        const r = await fetch('/api/widget-today', { credentials: 'include' });
        if (!r.ok || r.redirected) { window.location.href='/'; return; }
        data    = await r.json();
        updated = new Date();
        render();
      } catch(e) { console.error(e); }
    }

    /* SSE */
    let es, retryMs = 3000;
    function connect() {
      if (es) { es.close(); es=null; }
      es = new EventSource('/api/widget-events');
      es.onopen    = () => { retryMs=3000; document.getElementById('dot').classList.remove('off'); };
      es.onmessage = e => { if(e.data==='update') load(); };
      es.onerror   = () => {
        document.getElementById('dot').classList.add('off');
        es.close(); es=null;
        retryMs = Math.min(retryMs*2, 60000);
        setTimeout(connect, retryMs);
      };
    }

    /* Midnight auto-refresh */
    function scheduleMidnight() {
      const n = new Date();
      const m = new Date(n.getFullYear(), n.getMonth(), n.getDate()+1);
      setTimeout(() => { load(); scheduleMidnight(); }, m-n+500);
    }

    /* Tip overlay */
    function toggleTip() {
      const t = document.getElementById('tip');
      t.style.display = t.style.display==='flex' ? 'none' : 'flex';
    }

    /* Init */
    switchTab(tab);
    load();
    connect();
    scheduleMidnight();
  </script>
</body>
</html>
