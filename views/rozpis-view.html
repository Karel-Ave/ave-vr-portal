<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rozpis – AVE Hotels</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100vh; background: #f5f5f0; font-family: 'Segoe UI', sans-serif; color: #1a1a18; }
  #topbar { background: #1a1a18; height: 56px; display: flex; align-items: center; padding: 0 16px; gap: 12px; position: relative; }
  .topbar-logo { position: absolute; left: 50%; transform: translateX(-50%); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn-top { padding: 5px 12px; border-radius: 5px; border: 1px solid #444; background: transparent; color: #ccc; font-size: 12px; cursor: pointer; transition: all .15s; text-decoration: none; white-space: nowrap; }
  .btn-top:hover { background: #333; color: #fff; }

  #month-bar { background: #fff; border-bottom: 1px solid #e8e8e0; padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .month-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid #ddd; background: #f5f5f0; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .month-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .month-btn:hover:not(.active) { background: #e8e8e0; }
  .dropdown { position: relative; }
  .dropdown-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #ddd; background: #f5f5f0; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .dropdown-btn:hover { background: #e8e8e0; }
  .dropdown-menu { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.12); min-width: 180px; z-index: 100; margin-top: 4px; max-height: 300px; overflow-y: auto; }
  .dropdown-menu.show { display: block; }
  .dropdown-item { padding: 8px 14px; font-size: 13px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .dropdown-item:hover { background: #f5f5f0; }
  .dropdown-item.current { font-weight: 700; color: #2a5caa; }
  .set-current-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid #2a5caa; background: transparent; color: #2a5caa; font-size: 12px; cursor: pointer; transition: all .15s; }
  .set-current-btn:hover { background: #2a5caa; color: #fff; }

  #empty-state { text-align: center; padding: 80px 20px; color: #888; }
  #empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  #empty-state h2 { font-size: 18px; margin-bottom: 8px; color: #555; }

  #schedule-container { padding: 16px 20px; overflow-x: auto; }
  #scheduleViewTable { border-collapse: collapse; font-size: 11px; white-space: nowrap; }
  #scheduleViewTable th { background: #1a1a18; color: #fff; padding: 4px 6px; text-align: center; font-weight: 500; border: 1px solid #333; }
  #scheduleViewTable td { padding: 3px 6px; border: 1px solid #e0e0d8; text-align: center; min-width: 28px; }
  .name-cell { text-align: left !important; font-weight: 500; min-width: 160px; padding: 3px 10px !important; background: #fff; }
  .hours-cell { font-weight: 600; color: #2a5caa; background: #f0f4ff; }
  .weekend-header { background: #555 !important; }
  .weekend-cell { background: #f0f0e8; }
  .type-D { background: #F8FF35; }
  .type-N { background: #4DC3F5; }
  .type-B { background: #A8E05A; }
  .type-V { background: #FFB347; }
  .type-S { background: #FF8585; }
  .loading { text-align: center; padding: 40px; color: #888; font-size: 14px; }
  .published-info { font-size: 11px; color: #aaa; margin-left: auto; }

  /* Lock banner */
  #lock-banner { display:none; position:relative; padding:8px 20px; text-align:center; font-size:13px; font-weight:600; }
  #lock-banner.locked-by-me { background:#2d7a2d; color:#fff; display:block; }
  #lock-banner.locked-by-other { background:#c00; color:#fff; display:block; }
  body.readonly-mode * { pointer-events:none !important; }
  body.readonly-mode #lock-banner, body.readonly-mode .btn-top, body.readonly-mode a,
  body.readonly-mode .month-btn, body.readonly-mode .dropdown-btn, body.readonly-mode .dropdown-item,
  body.readonly-mode .set-current-btn { pointer-events:all !important; }

</style>
</head>
<body>
<div id="topbar">
  <a href="/portal" class="btn-top">⬅ Portál</a>
  <div class="topbar-logo">
    <svg width="90" height="30" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="72" font-family="Georgia, serif" font-size="90" font-weight="700" fill="#fff" letter-spacing="-5">AVE</text>
      <text x="32" y="95" font-family="'Segoe UI', sans-serif" font-size="22" fill="#aaa" letter-spacing="12">HOTELS</text>
    </svg>
  </div>
  <div class="topbar-right">
    <span style="color:#aaa;font-size:12px;" id="user-name-top"></span>
    <a href="/logout" class="btn-top">Odhlásit</a>
  </div>
</div>

<div id="lock-banner"></div>
<div id="month-bar">
  <button class="month-btn active" id="current-month-btn">Načítám…</button>
  <div class="dropdown" id="history-dropdown">
    <button class="dropdown-btn" onclick="toggleDropdown()">📋 Historie ▾</button>
    <div class="dropdown-menu" id="dropdown-menu"></div>
  </div>
  <button class="set-current-btn" id="set-current-btn" onclick="setAsCurrent()">⭐ Nastavit jako aktuální</button>
  <button class="set-current-btn" id="send-to-tvorba-btn" onclick="sendToTvorba()" style="border-color:#5a2d8a;color:#5a2d8a;">✏️ Odeslat do Tvorby</button>
  <span class="published-info" id="published-info"></span>
</div>

<div id="empty-state" style="display:none">
  <div class="icon">📅</div>
  <h2>Zatím žádný rozpis</h2>
  <p>Z aplikace Tvorba rozpisu uložte rozpis přes „Uložit rozpis"</p>
</div>
<div id="loading" class="loading">Načítám rozpis…</div>
<div id="schedule-container" style="display:none"></div>

<script>
let allRozpisy = [];
let currentKey = null;
let displayedKey = null;

// Hotel hours mapping (same as in tvorba-rozpisu)
const HOTEL_HOURS = {
  'VSE':12,'A':12,'B':12,'C':12,'D':12,'E':12,'G':12,'H':12,'I':12,'J':12,
  'K':12,'L':12,'M':12,'N':12,'P':12,'S':12,'T':12,'U':12,'W':8,'F':8,'Q':4
};

function getHotelHours(val) {
  if (!val) return 0;
  const v = val.toUpperCase().trim();
  if (!v || 'XYZŽ'.includes(v) || v === '-') return 0;
  return HOTEL_HOURS[v] || 12;
}

async function init() {
  const me = await fetch('/api/me').then(r=>r.json()).catch(()=>null);
  if (me) document.getElementById('user-name-top').textContent = me.username;

  const data = await fetch('/api/rozpisy').then(r=>r.json()).catch(()=>({history:[],current:null}));
  allRozpisy = data.history || [];
  currentKey = data.current;

  if (allRozpisy.length === 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    document.getElementById('current-month-btn').textContent = 'Žádný rozpis';
    return;
  }

  buildDropdown();
  const keyToShow = currentKey || allRozpisy[0].key;
  await loadRozpis(keyToShow);
}

function buildDropdown() {
  const menu = document.getElementById('dropdown-menu');
  menu.innerHTML = '';
  allRozpisy.forEach(r => {
    const el = document.createElement('div');
    el.className = 'dropdown-item' + (r.key === currentKey ? ' current' : '');
    el.textContent = r.label + (r.key === currentKey ? ' ★' : '');
    el.onclick = () => { loadRozpis(r.key); toggleDropdown(); };
    menu.appendChild(el);
  });
}

function toggleDropdown() {
  document.getElementById('dropdown-menu').classList.toggle('show');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#history-dropdown')) document.getElementById('dropdown-menu').classList.remove('show');
});

async function loadRozpis(key) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('schedule-container').style.display = 'none';

  const res = await fetch('/api/rozpisy/' + encodeURIComponent(key)).then(r=>r.json()).catch(()=>({ok:false}));
  if (!res.ok) { document.getElementById('loading').style.display = 'none'; return; }

  displayedKey = key;
  const entry = res.entry;
  document.getElementById('current-month-btn').textContent = entry.label;
  document.getElementById('current-month-btn').classList.toggle('active', key === currentKey);

  const d = new Date(entry.publishedAt);
  document.getElementById('published-info').textContent = `Uloženo: ${d.toLocaleDateString('cs-CZ')} ${d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'})} (${entry.publishedBy})`;

  renderSchedule(entry.data);
}

function renderSchedule(data) {
  const container = document.getElementById('schedule-container');
  container.innerHTML = '';

  const { staff, schedule, month, year, calCols: cols, extras } = data;
  if (!staff || !staff.length) {
    document.getElementById('loading').style.display = 'none';
    container.innerHTML = '<div class="loading">Prázdný rozpis</div>';
    container.style.display = 'block';
    return;
  }

  const daysInMonth = new Date(year, month, 0).getDate();

  // Build calCols from saved data or reconstruct
  let columns = cols;
  if (!columns || !columns.length) {
    columns = [];
    for (let d = 1; d <= daysInMonth; d++) {
      columns.push({ day: d, dn: 'd' });
      columns.push({ day: d, dn: 'n' });
    }
  }
  // Filter out nextYear cols
  const activeCols = columns.filter(c => !c.nextYear);

  const table = document.createElement('table');
  table.id = 'scheduleViewTable';

  // Header - group by day, show just day number
  const thead = document.createElement('thead');
  let hRow = '<tr><th>Jméno</th>';
  activeCols.forEach((col, ci) => {
    const dow = new Date(year, month-1, col.day).getDay();
    const isWe = dow === 0 || dow === 6;
    const isD = col.dn === 'd';
    hRow += `<th class="${isWe ? 'weekend-header' : ''}" title="${col.day}. ${isD?'den':'noc'}">${isD ? col.day : ''}</th>`;
  });
  hRow += '<th>Hod.</th></tr>';
  thead.innerHTML = hRow;
  table.appendChild(thead);

  // Body
  const tbody = document.createElement('tbody');
  staff.forEach((s, si) => {
    if (!s || !s.name) return;
    if (s.name.startsWith('zzz')) return;
    const typeMap = { 'Denní': 'type-D', 'Noční': 'type-N', 'Obojí': 'type-B', 'Vedoucí': 'type-V', 'Speciální': 'type-S' };
    const typeClass = typeMap[s.type] || '';
    const tr = document.createElement('tr');
    let totalHrs = 0;

    let cells = `<td class="name-cell ${typeClass}">${s.name}</td>`;
    activeCols.forEach((col, ci) => {
      const dow = new Date(year, month-1, col.day).getDay();
      const isWe = dow === 0 || dow === 6;
      const val = (schedule && schedule[`${si}_${ci}`]) || '';
      const hrs = getHotelHours(val);
      totalHrs += hrs;
      const bg = isWe ? ' weekend-cell' : '';
      cells += `<td class="${bg}" title="${val||''}">${hrs > 0 ? hrs : (val && !'-XYZŽ'.includes(val.toUpperCase()) ? val : '')}</td>`;
    });

    // Override with extras hours if available
    const extraHrs = extras && extras[si] && extras[si].hours ? extras[si].hours : null;
    cells += `<td class="hours-cell">${extraHrs !== null ? extraHrs : totalHrs}</td>`;
    tr.innerHTML = cells;
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  container.appendChild(table);

  document.getElementById('loading').style.display = 'none';
  container.style.display = 'block';
}

async function setAsCurrent() {
  if (!displayedKey) return;
  await fetch('/api/rozpisy/set-current', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({key: displayedKey}) });
  currentKey = displayedKey;
  document.getElementById('current-month-btn').classList.add('active');
  buildDropdown();
  const lbl = document.getElementById('current-month-btn').textContent;
  alert('Nastaveno jako aktuální: ' + lbl);
}

init();
</script>

<script>
// ── Zamykání, autosave, nečinnost ──
let _iAmEditor = false;
let _lockInterval = null;

async function acquireLock() {
  try {
    const r = await fetch('/api/lock/rozpis', {method:'POST', headers:{'Content-Type':'application/json'}});
    // Use acquire endpoint
  } catch(e) {}
}

async function initLock() {
  try {
    const r = await fetch('/api/lock/rozpis/acquire', {method:'POST'});
    const data = await r.json();
    if (data.ok) {
      _iAmEditor = true;
      document.getElementById('lock-banner').className = 'locked-by-me';
      document.getElementById('lock-banner').textContent = '✏️ Prohlížíte rozpis — ostatní uživatelé mají také přístup';
      document.body.classList.remove('readonly-mode');
    } else {
      setReadonly(data.lock);
    }
    _lockInterval = setInterval(checkLock, 15000);
  } catch(e) {}
}

async function checkLock() {
  try {
    const r = await fetch('/api/lock/rozpis');
    const data = await r.json();
    if (data.lock && !_iAmEditor) setReadonly(data.lock);
    else if (!data.lock && !_iAmEditor) initLock();
  } catch(e) {}
}

function setReadonly(lock) {
  _iAmEditor = false;
  document.body.classList.add('readonly-mode');
  const who = lock ? lock.userName : 'někdo';
  const since = lock ? new Date(lock.since).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('lock-banner').className = 'locked-by-other';
  document.getElementById('lock-banner').textContent = `🔒 Rozpis právě upravuje ${who} (od ${since}) — máte pouze náhled`;
}

// Inactivity logout (10 min)
(function() {
  const LOGOUT_MS = 10 * 60 * 1000;
  let logoutTimer;
  function resetTimer() {
    clearTimeout(logoutTimer);
    logoutTimer = setTimeout(async () => {
      if (_iAmEditor) { try { await fetch('/api/lock/rozpis/release', {method:'POST'}); } catch(e){} }
      window.location.href = '/logout';
    }, LOGOUT_MS - 60000);
  }
  ['mousemove','keydown','click','scroll'].forEach(e => document.addEventListener(e, resetTimer, {passive:true}));
  resetTimer();
})();

async function sendToTvorba() {
  if (!displayedKey) return;
  if (!confirm('Otevřít tento rozpis v aplikaci Tvorba rozpisu?')) return;
  localStorage.setItem('loadRozpisKey', displayedKey);
  window.location.href = '/tvorba-rozpisu';
}

window.addEventListener('load', initLock);
window.addEventListener('beforeunload', () => {
  if (_iAmEditor) navigator.sendBeacon('/api/lock/rozpis/release');
});
</script>

</body>
</html>
