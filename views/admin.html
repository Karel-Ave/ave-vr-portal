<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVE Hotels – Správa uživatelů</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #e8e8e4;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #1a1a18;
  }

  /* ── Horní lišta ── */
  #topbar {
    background: #d8d8d4;
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    border-bottom: 1px solid #c8c8c4;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .btn-top {
    padding: 4px 12px;
    border-radius: 5px;
    border: 1px solid #bbb;
    background: transparent;
    color: #444;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    font-family: inherit;
  }
  .btn-top:hover { background: #c8c8c4; color: #111; border-color: #999; }

  /* ── Obsah ── */
  .main {
    max-width: 860px;
    margin: 40px auto;
    padding: 0 28px;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-header h1 { font-size: 20px; font-weight: 600; color: #1a1a18; }

  .btn-add {
    padding: 8px 18px;
    background: #e0e0e0;
    color: #111;
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .btn-add:hover { background: #fff; }

  /* ── Tabulka uživatelů ── */
  .table-wrap {
    background: #ffffff;
    border: 1px solid #d0d0c8;
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    background: #141414;
    padding: 11px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    border-bottom: 1px solid #d0d0c8;
  }
  tbody tr { border-bottom: 1px solid #e8e8e0; transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f0f0eb; }
  tbody td {
    padding: 12px 16px;
    font-size: 13px;
    vertical-align: middle;
  }
  .role-badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .role-admin   { background: #fff8cc; color: #7a6200; border: 1px solid #d4b800; }
  .role-vedouci { background: #e8f0ff; color: #2a5caa; border: 1px solid #a0b8e0; }
  .td-actions { text-align: right; white-space: nowrap; }
  .btn-action {
    padding: 4px 12px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    transition: all .12s;
    border: 1px solid #ccc;
    background: transparent;
    color: #555;
    margin-left: 4px;
  }
  .btn-action:hover { background: #e8e8e4; color: #111; border-color: #999; }
  .btn-action.danger:hover { background: #fff0f0; color: #c00; border-color: #f00; }

  .empty-row td { text-align: center; color: #888; padding: 32px; font-size: 13px; }

  /* ── Modální okno ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #ffffff;
    border: 1px solid #d0d0c8;
    border-radius: 12px;
    padding: 28px;
    width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,.15);
  }
  .modal h2 { font-size: 15px; font-weight: 600; color: #1a1a18; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .form-group label {
    font-size: 10px;
    font-weight: 700;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .form-group input,
  .form-group select {
    padding: 9px 11px;
    background: #f8f8f4;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    color: #1a1a18;
    outline: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: #2a5caa; }
  .form-group select option { background: #fff; }
  .form-hint { font-size: 11px; color: #888; margin-top: 2px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
  .btn-secondary {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid #ccc;
    border-radius: 6px;
    color: #555;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .btn-secondary:hover { background: #e8e8e4; color: #111; }
  .btn-primary {
    padding: 7px 18px;
    background: #e0e0e0;
    color: #111;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .btn-primary:hover { background: #fff; }
  .msg { font-size: 12px; min-height: 18px; margin-top: 8px; }
  .msg.ok  { color: #5cb85c; }
  .msg.err { color: #e05555; }

  /* ── Modál: Změna hesla ── */
  #pw-overlay .modal { width: 360px; }
</style>
</head>
<body>

<div id="topbar">
  <div class="topbar-left">
    <span style="font-size:13px;font-weight:600;color:#444;">Správa uživatelů</span>
  </div>
</div>

<div class="main">
  <div class="page-header">
    <h1>Správa uživatelů</h1>
    <button class="btn-add" onclick="openAddModal()">+ Přidat uživatele</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Jméno</th>
          <th>Uživatelské jméno</th>
          <th>Role</th>
          <th>Přidán</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-tbody">
        <tr class="empty-row"><td colspan="6">Načítám…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modál: Přidat / Upravit uživatele -->
<div class="overlay" id="user-overlay">
  <div class="modal">
    <h2 id="modal-title">Přidat uživatele</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Jméno</label>
        <input type="text" id="u-name" placeholder="Karel">
      </div>
      <div class="form-group">
        <label>Uživatelské jméno</label>
        <input type="text" id="u-username" placeholder="Karel-Ave">
      </div>
    </div>
    <div class="form-group">
      <label>Heslo <span id="pw-hint-label" style="color:#555;font-weight:400">(ponechte prázdné pro zachování)</span></label>
      <input type="password" id="u-password" placeholder="min. 6 znaků">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="u-role">
        <option value="vedoucí">Vedoucí</option>
        <option value="admin">Admin</option>
      </select>
      <span class="form-hint" id="role-hint"></span>
    </div>
    <div class="msg" id="user-msg"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeUserModal()">Zrušit</button>
      <button class="btn-primary" id="user-save-btn" onclick="saveUser()">Uložit</button>
    </div>
  </div>
</div>

<!-- Modál: Změna vlastního hesla -->
<div class="overlay" id="pw-overlay">
  <div class="modal">
    <h2>Změna hesla</h2>
    <div class="form-group">
      <label>Současné heslo</label>
      <input type="password" id="pw-old">
    </div>
    <div class="form-group">
      <label>Nové heslo</label>
      <input type="password" id="pw-new" placeholder="min. 6 znaků">
    </div>
    <div class="form-group">
      <label>Nové heslo znovu</label>
      <input type="password" id="pw-new2">
    </div>
    <div class="msg" id="pw-msg"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closePwModal()">Zrušit</button>
      <button class="btn-primary" onclick="changePassword()">Uložit</button>
    </div>
  </div>
</div>

<script>
  let currentUserId = null;
  let myId = null;

  // Načíst přihlášeného uživatele
  fetch('/api/me').then(r => r.json()).then(u => {
    myId = u.id;
    loadUsers();
  });

  function formatDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  async function loadUsers() {
    const tbody = document.getElementById('users-tbody');
    try {
      const r = await fetch('/api/users');
      if (!r.ok) { tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Chyba načtení.</td></tr>'; return; }
      const users = await r.json();
      if (!users.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Žádní uživatelé.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map((u, i) => `
        <tr>
          <td style="color:#888;font-size:12px">${i + 1}</td>
          <td style="font-weight:500;color:#1a1a18">${esc(u.name)}</td>
          <td style="color:#555;font-family:monospace;font-size:12px">${esc(u.username)}</td>
          <td><span class="role-badge role-${u.role === 'admin' ? 'admin' : 'vedouci'}">${u.role === 'admin' ? 'Admin' : 'Vedoucí'}</span></td>
          <td style="color:#777;font-size:12px">${formatDate(u.created_at)}</td>
          <td class="td-actions">
            <button class="btn-action" onclick="openEditModal(${u.id}, '${esc(u.name)}', '${esc(u.username)}', '${u.role}')">Upravit</button>
            ${u.id !== myId ? `<button class="btn-action danger" onclick="deleteUser(${u.id}, '${esc(u.name)}')">Smazat</button>` : ''}
          </td>
        </tr>
      `).join('');
    } catch {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">Chyba načtení.</td></tr>';
    }
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // Přidat uživatele
  function openAddModal() {
    currentUserId = null;
    document.getElementById('modal-title').textContent = 'Přidat uživatele';
    document.getElementById('u-name').value = '';
    document.getElementById('u-username').value = '';
    document.getElementById('u-password').value = '';
    document.getElementById('u-role').value = 'vedoucí';
    document.getElementById('u-username').disabled = false;
    document.getElementById('pw-hint-label').style.display = 'none';
    clearMsg('user-msg');
    document.getElementById('user-overlay').classList.add('show');
    setTimeout(() => document.getElementById('u-name').focus(), 50);
  }

  // Upravit uživatele
  function openEditModal(id, name, username, role) {
    currentUserId = id;
    document.getElementById('modal-title').textContent = 'Upravit uživatele';
    document.getElementById('u-name').value = name;
    document.getElementById('u-username').value = username;
    document.getElementById('u-password').value = '';
    document.getElementById('u-role').value = role;
    document.getElementById('u-username').disabled = true;
    document.getElementById('pw-hint-label').style.display = 'inline';
    clearMsg('user-msg');
    document.getElementById('user-overlay').classList.add('show');
    setTimeout(() => document.getElementById('u-name').focus(), 50);
  }

  function closeUserModal() {
    document.getElementById('user-overlay').classList.remove('show');
  }

  async function saveUser() {
    const name     = document.getElementById('u-name').value.trim();
    const username = document.getElementById('u-username').value.trim();
    const password = document.getElementById('u-password').value;
    const role     = document.getElementById('u-role').value;
    const msg      = document.getElementById('user-msg');

    if (!name) { setMsg(msg, 'err', 'Zadejte jméno.'); return; }

    let r, data;
    if (currentUserId === null) {
      // Nový uživatel
      if (!username) { setMsg(msg, 'err', 'Zadejte uživatelské jméno.'); return; }
      if (!password) { setMsg(msg, 'err', 'Zadejte heslo.'); return; }
      r = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, username, password, role })
      });
    } else {
      // Úprava
      const body = { name, role };
      if (password) body.password = password;
      r = await fetch(`/api/users/${currentUserId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }
    data = await r.json();
    if (data.ok) {
      closeUserModal();
      loadUsers();
    } else {
      setMsg(msg, 'err', data.msg || 'Chyba.');
    }
  }

  async function deleteUser(id, name) {
    if (!confirm(`Opravdu smazat uživatele „${name}"?`)) return;
    const r    = await fetch(`/api/users/${id}`, { method: 'DELETE' });
    const data = await r.json();
    if (data.ok) {
      loadUsers();
    } else {
      alert(data.msg || 'Chyba smazání.');
    }
  }

  // Změna vlastního hesla
  function closePwModal() {
    document.getElementById('pw-overlay').classList.remove('show');
    ['pw-old','pw-new','pw-new2'].forEach(id => document.getElementById(id).value = '');
    clearMsg('pw-msg');
  }
  async function changePassword() {
    const old  = document.getElementById('pw-old').value;
    const n1   = document.getElementById('pw-new').value;
    const n2   = document.getElementById('pw-new2').value;
    const msg  = document.getElementById('pw-msg');
    if (n1 !== n2) { setMsg(msg, 'err', 'Nová hesla se neshodují.'); return; }
    const r    = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldPassword: old, newPassword: n1 })
    });
    const data = await r.json();
    setMsg(msg, data.ok ? 'ok' : 'err', data.msg);
    if (data.ok) setTimeout(closePwModal, 1500);
  }

  // Helpery
  function setMsg(el, cls, text) {
    if (typeof el === 'string') el = document.getElementById(el);
    el.className = 'msg ' + cls;
    el.textContent = text;
  }
  function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'msg';
    el.textContent = '';
  }

  // Zavření modálů kliknutím mimo
  ['user-overlay','pw-overlay'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target.id === id) {
        if (id === 'user-overlay') closeUserModal();
        else closePwModal();
      }
    });
  });

  // Enter v polích spustí uložení
  document.getElementById('user-overlay').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveUser();
  });
</script>
</body>
</html>
