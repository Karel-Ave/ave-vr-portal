<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interní portál AVE</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="/static/theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: background .25s;
  }
  .card {
    background: var(--modal-bg);
    border-radius: 14px;
    padding: 44px 40px 36px;
    width: min(360px, calc(100vw - 32px));
    box-shadow: var(--modal-shadow);
    border: 1px solid var(--modal-border);
    position: relative;
  }
  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo img {
    height: 96px;
    object-fit: contain;
    filter: brightness(0);          /* light mode: logo černé */
  }
  [data-theme="dark"] .logo img {
    filter: brightness(0) invert(1); /* dark mode: logo bílé */
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 7px;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
  }
  input:focus { border-color: var(--border-strong); }
  .btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background .2s;
    font-family: inherit;
    margin-top: 4px;
  }
  .btn:hover { background: var(--accent-h); }
  .error {
    background: rgba(200,0,0,.12);
    border: 1px solid rgba(200,0,0,.35);
    color: #e05555;
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
  }
  .error.show { display: block; }
  /* Theme toggle — pod kartou, na mobilu na středu; landscape: vedle karty */
  #btn-theme {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--modal-bg);
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    line-height: 1;
    transition: all .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
    flex-shrink: 0;
  }
  #btn-theme:hover { background: var(--surface-alt); }

  /* Landscape mobile: karta vlevo, toggle vpravo uprostřed */
  @media (orientation: landscape) and (max-height: 600px) {
    body { flex-direction: row; align-items: center; justify-content: center; gap: 32px; }
  }

  /* ── Mobilní úpravy ── */
  @media (max-width: 480px) {
    body { padding: 16px 16px 32px; }
    .card { padding: 32px 20px 28px; border-radius: 12px; }
    .logo img { height: 66px; }
    input { padding: 12px; }
    .btn { padding: 14px; font-size: 15px; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/static/logo.png" alt="AVE Hotels" id="login-logo">
    <div class="logo-sub">Interní portál AVE</div>
  </div>
  <div class="error" id="err">Nesprávné přihlašovací údaje.</div>
  <form method="POST" action="/login" id="login-form">
    <input type="hidden" name="next" id="next-field" value="">
    <label>Uživatelské jméno</label>
    <input type="text" name="username" autocomplete="username" autofocus required>
    <label>Heslo</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button class="btn" type="submit">Přihlásit se</button>
  </form>
</div>
<button id="btn-theme" title="Přepnout světlé / tmavé téma">🌙</button>
<script>
  const _params = new URLSearchParams(location.search);
  if (_params.get('error') === '1') {
    document.getElementById('err').classList.add('show');
  }
  // Předej ?next= do formuláře (např. /widget → po přihlášení zpět na widget)
  const _next = _params.get('next') || '';
  document.getElementById('next-field').value = _next;
  // Pokud přicházíme z widgetu, zobraz podtitulek
  if (_next === '/widget') {
    document.querySelector('.logo-sub').textContent = 'Mini Rozpis';
  }
</script>
</body>
</html>
