<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVE Hotels – Přihlášení</title>
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="/static/theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    transition: background .25s;
  }
  .card {
    background: var(--modal-bg);
    border-radius: 14px;
    padding: 44px 40px 36px;
    width: 360px;
    box-shadow: var(--modal-shadow);
    border: 1px solid var(--modal-border);
    position: relative;
  }
  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo img {
    height: 52px;
    object-fit: contain;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 7px;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
  }
  input:focus { border-color: var(--border-strong); }
  .btn {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background .2s;
    font-family: inherit;
    margin-top: 4px;
  }
  .btn:hover { background: var(--accent-h); }
  .error {
    background: rgba(200,0,0,.12);
    border: 1px solid rgba(200,0,0,.35);
    color: #e05555;
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
  }
  .error.show { display: block; }
  /* Theme toggle – bottom right corner of card */
  #btn-theme {
    position: absolute;
    bottom: 12px;
    right: 14px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    line-height: 1;
    transition: all .15s;
  }
  #btn-theme:hover { background: var(--surface-alt); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/static/logo.png" alt="AVE Hotels" id="login-logo">
    <div class="logo-sub">Interní portál</div>
  </div>
  <div class="error" id="err">Nesprávné přihlašovací údaje.</div>
  <form method="POST" action="/login">
    <label>Uživatelské jméno</label>
    <input type="text" name="username" autocomplete="username" autofocus required>
    <label>Heslo</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button class="btn" type="submit">Přihlásit se</button>
  </form>
  <button id="btn-theme" title="Přepnout světlé / tmavé téma">🌙</button>
</div>
<script>
  if (location.search.includes('error=1')) {
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>
