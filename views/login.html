<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVE Hotels – Přihlášení</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    background: #1e1e1e;
    border-radius: 14px;
    padding: 44px 40px 36px;
    width: 360px;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
    border: 1px solid #2e2e2e;
  }
  .logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo img {
    height: 52px;
    object-fit: contain;
  }
  .logo-sub {
    font-size: 11px;
    color: #555;
    margin-top: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #777;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    background: #111;
    border: 1px solid #333;
    border-radius: 7px;
    font-size: 14px;
    color: #e0e0e0;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
  }
  input:focus { border-color: #555; }
  .btn {
    width: 100%;
    padding: 11px;
    background: #e0e0e0;
    color: #111;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background .2s;
    font-family: inherit;
    margin-top: 4px;
  }
  .btn:hover { background: #fff; }
  .error {
    background: rgba(200,0,0,.15);
    border: 1px solid rgba(200,0,0,.4);
    color: #ff6b6b;
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 12px;
    margin-bottom: 16px;
    display: none;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/static/logo.png" alt="AVE Hotels">
    <div class="logo-sub">Interní portál</div>
  </div>
  <div class="error" id="err">Nesprávné přihlašovací údaje.</div>
  <form method="POST" action="/login">
    <label>Uživatelské jméno</label>
    <input type="text" name="username" autocomplete="username" autofocus required>
    <label>Heslo</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button class="btn" type="submit">Přihlásit se</button>
  </form>
</div>
<script>
  if (location.search.includes('error=1')) {
    document.getElementById('err').classList.add('show');
  }
</script>
</body>
</html>
