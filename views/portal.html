<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VR AVE</title>
<meta name="apple-mobile-web-app-title" content="VR AVE">
<link rel="icon" type="image/png" href="/static/logo.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="/static/theme.css">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    padding-top: 58px;
    transition: background .25s, color .25s;
  }

  /* ── Horní lišta ── */
  #topbar {
    background: var(--bg-topbar);
    height: 58px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    border-bottom: 1px solid var(--bg-controls-border);
    box-shadow: 0 1px 0 rgba(16,34,51,.04);
  }
  [data-theme="dark"] #topbar {
    background: var(--bg-topbar);
    border-bottom-color: var(--border);
    box-shadow: none;
  }
  .portal-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 260px;
  }
  .portal-brand img {
    height: 42px;
    object-fit: contain;
    filter: brightness(0) saturate(100%) invert(18%) sepia(26%) saturate(1338%) hue-rotate(166deg) brightness(91%) contrast(91%);
  }
  [data-theme="dark"] .portal-brand img {
    filter: brightness(0) invert(1);
  }
  .portal-copy {
    font-size: 11px;
    color: var(--text-topbar);
    white-space: nowrap;
  }
  #app-nav {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: max-content;
    padding: 0;
    background: transparent;
    border: none;
    overflow: visible;
  }
  [data-theme="dark"] #app-nav {
    background: transparent;
    border-color: transparent;
  }
  #app-nav-current {
    position: relative;
    width: max-content;
    height: 36px;
    padding: 0 28px 0 13px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: var(--surface);
    color: var(--accent-h);
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(20,20,20,.10);
    transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
  }
  #app-nav-current::after {
    content: "⌄";
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    opacity: .75;
    margin-top: 1px;
  }
  #app-nav.open #app-nav-current,
  #app-nav-current:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 12px rgba(20,20,20,.18);
  }
  #app-nav-menu {
    position: absolute;
    top: 43px;
    left: 50%;
    transform: translateX(-50%);
    width: max-content;
    padding: 6px;
    display: none;
    gap: 4px;
    background: #F9FCFE;
    border: 1px solid var(--btn-top-border);
    border-radius: 10px;
    box-shadow: 0 12px 30px rgba(20,60,90,.18);
  }
  #app-nav.open #app-nav-menu { display: grid; }
  .app-nav-btn {
    height: 32px;
    width: 100%;
    min-width: 168px;
    padding: 0 10px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    transition: background .15s, border-color .15s, color .15s;
  }
  [data-theme="dark"] .app-nav-btn { color: var(--text-topbar); }
  [data-theme="dark"] #app-nav-current {
    background: var(--accent);
    border-color: var(--accent);
    color: #1A1A18;
  }
  [data-theme="dark"] #app-nav-menu {
    background: var(--surface);
    border-color: var(--border);
    box-shadow: 0 14px 32px rgba(0,0,0,.35);
  }
  .app-nav-btn:hover:not(.active) {
    background: var(--accent-light);
    border-color: var(--btn-top-border);
    color: var(--accent-h);
  }
  .app-nav-btn.active {
    background: var(--thead-bg);
    border-color: var(--thead-bg);
    color: #fff;
  }
  [data-theme="dark"] .app-nav-btn:hover:not(.active) {
    background: var(--accent-light);
    border-color: var(--accent);
    color: var(--accent-h);
  }
  [data-theme="dark"] .app-nav-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #1A1A18;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-badge {
    color: var(--text-topbar);
    font-size: 13px;
  }
  .btn-top {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--btn-top-border);
    background: transparent;
    color: var(--btn-top-color);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-top:hover { background: var(--btn-top-hover-bg); color: var(--text-topbar); border-color: var(--border-strong); }
  [data-theme="dark"] .btn-top {
    border-color: var(--btn-top-border);
    color: var(--btn-top-color);
  }
  [data-theme="dark"] .btn-top:hover {
    background: var(--accent-light);
    color: var(--accent-h);
    border-color: var(--accent);
  }

  /* ── Obsah ── */
  #cards-view {
    min-height: calc(100vh - 58px);
    display: none;
    align-items: center;
  }
  .main {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 28px;
  }
  .welcome h1 {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Grid karet ── */
  .grid { margin-top: 20px; }
  /* Drag-and-drop: přetahovaná karta */
  .card-dragging {
    opacity: 0.4;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* ── Uvítací oddělovač ── */
  .welcome {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 28px;
  }

  /* ── Mřížka karet ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ── Karta ── */
  .card {
    background: var(--portal-card-bg);
    border: 1px solid var(--portal-card-border);
    border-radius: 14px;
    padding: 32px 24px 28px;
    cursor: pointer;
    transition: background .18s, border-color .18s, transform .18s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    /* Prevent text/icon selection on long-press (mobile drag) */
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .card:hover {
    background: var(--portal-card-hover-bg);
    border-color: var(--border-strong);
    transform: translateY(-3px);
  }
  .card.disabled {
    opacity: 0.38;
    cursor: not-allowed;
    /* pointer-events: none removed — SortableJS needs events to drag disabled cards */
  }
  .card.disabled:hover {
    background: var(--portal-card-bg);
    border-color: var(--portal-card-border);
    transform: none;
  }
  .card-icon {
    font-size: 52px;
    height: 68px;           /* fixed height — aligns all icon types */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    line-height: 1;
  }
  /* Dynamic calendar icon for Raspis card */
  .cal-icon {
    display: inline-flex; flex-direction: column; align-items: center;
    width: 52px; height: 52px; background: #fff; border-radius: 8px;
    overflow: hidden; line-height: 1; box-shadow: 0 2px 5px rgba(0,0,0,.28);
    border: 1.5px solid #e0e0e0;
  }
  .cal-mon {
    background: #e53030; width: 100%; color: #fff;
    font-size: 10px; font-weight: 700; text-align: center;
    padding: 4px 0 3px; text-transform: uppercase; letter-spacing: .05em;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .cal-day {
    color: #e53030; font-size: 24px; font-weight: 800;
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--portal-card-text);
    margin-bottom: 0;
  }
  .card-desc { display: none; }
  .badge-soon {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--portal-badge-bg);
    color: var(--portal-badge-text);
    border: 1px solid var(--portal-badge-border);
    border-radius: 4px;
    padding: 2px 7px;
    margin-top: 8px;
    text-transform: uppercase;
  }


  /* ── iframe ── */
  #app-frame {
    display: none;
    position: fixed;
    top: 58px;
    left: 0;
    width: 100%;
    height: calc(100vh - 58px);
    border: none;
    background: var(--bg);
  }
  #app-frame.visible {
    display: block;
  }

  /* ── Loading overlay ── */
  #app-loading {
    display: flex;
    opacity: 0;
    pointer-events: none;
    position: fixed;
    top: 58px;
    left: 0;
    width: 100%;
    height: calc(100vh - 58px);
    background: var(--bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-muted);
    font-size: 13px;
    transition: opacity .2s;
  }
  #app-loading.visible { opacity: 1; pointer-events: auto; }
  #app-frame { transition: opacity .15s; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--spinner-border);
    border-top-color: var(--spinner-top);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modální okno ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--modal-bg);
    border: 1px solid var(--modal-border);
    border-radius: 12px;
    padding: 22px;
    width: 360px;
    box-shadow: var(--modal-shadow);
  }
  .modal.modal-wide {
    width: min(760px, calc(100vw - 32px));
    max-height: min(760px, calc(100vh - 32px));
    overflow-y: auto;
  }
  .modal h2 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .modal label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }
  .modal input {
    width: 100%;
    padding: 9px 11px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  .modal input:focus { border-color: var(--border-strong); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .btn-secondary {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .btn-secondary:hover { background: var(--surface-alt); color: var(--text); }
  .btn-primary {
    padding: 7px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--accent-h); }
  .theme-mode-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .theme-mode-btn {
    flex: 1; padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text); font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .theme-mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .skin-grid { display: grid; grid-template-columns: repeat(11, minmax(0, 1fr)); gap: 5px; }
  .public-hotel-picks { display: flex; flex-wrap: wrap; gap: 4px; }
  .public-hotel-pick {
    min-width: 30px;
    height: 24px;
    padding: 0 7px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text);
    font: inherit;
    font-size: 13px;
    line-height: 1;
    font-weight: 700;
    cursor: pointer;
  }
  .public-hotel-pick:hover { border-color: var(--accent); background: var(--accent-light); }
  .public-hotel-pick.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .skin-card {
    border: 1px solid var(--border); border-radius: 10px; background: var(--surface);
    padding: 4px; cursor: pointer; color: var(--text); font-family: inherit; text-align: left;
    transition: border-color .15s, background .15s, transform .15s;
  }
  .skin-card:hover { border-color: var(--accent); background: var(--accent-light); }
  .skin-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 22%, transparent); }
  .skin-preview {
    height: 18px; border-radius: 5px; border: 1px solid rgba(0,0,0,.12);
    display: grid; grid-template-columns: 1.1fr .9fr; overflow: hidden; margin-bottom: 3px;
  }
  .skin-preview span:first-child { display: block; }
  .skin-preview span:last-child { display: block; }
  .skin-label { display: block; font-size: 9px; font-weight: 700; text-align: center; color: var(--text) !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  [data-theme="dark"] .skin-card { color: var(--text) !important; }
  [data-theme="dark"] .skin-label { color: #E8E6DC !important; }
  .settings-note { font-size: 11px; color: var(--text-muted); margin: -5px 0 10px; }
  .settings-choice-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
  .settings-choice {
    height: 25px; padding: 0 9px; border: 1px solid var(--border); border-radius: 7px;
    background: var(--surface); color: var(--text); font: inherit; font-size: 12px;
    font-weight: 700; cursor: pointer;
  }
  .settings-choice:hover { border-color: var(--accent); background: var(--accent-light); }
  .settings-choice.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Theme toggle button */
  #btn-theme {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--btn-top-border);
    background: transparent;
    color: var(--btn-top-color);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    line-height: 1;
    font-family: inherit;
  }
  #btn-theme:hover { background: var(--btn-top-hover-bg); color: var(--text-topbar); }
  [data-theme="dark"] #btn-theme {
    border-color: var(--btn-top-border);
    color: var(--btn-top-color);
  }
  [data-theme="dark"] #btn-theme:hover {
    background: var(--accent-light);
    color: var(--accent-h);
    border-color: var(--accent);
  }

  .msg { font-size: 12px; min-height: 18px; margin-top: 6px; }
  .msg.ok  { color: #5cb85c; }
  .msg.err { color: #e05555; }

  /* ── Hamburger tlačítko (skryté na desktopu) ── */
  #btn-hamburger {
    display: none;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--btn-top-border);
    background: transparent;
    color: var(--btn-top-color);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    transition: all .15s;
    font-family: inherit;
  }
  #btn-hamburger:hover { background: var(--btn-top-hover-bg); color: var(--text-topbar); }
  [data-theme="dark"] #btn-hamburger {
    border-color: var(--btn-top-border);
    color: var(--btn-top-color);
  }
  [data-theme="dark"] #btn-hamburger:hover {
    background: var(--btn-top-hover-bg);
    color: var(--text-topbar);
  }

  /* ── Mobilní slide-down menu ── */
  #mobile-menu {
    display: none;
    position: fixed;
    top: 58px;
    left: 0;
    width: 100%;
    background: var(--bg-topbar);
    border-bottom: 2px solid rgba(0,0,0,.5);
    z-index: 9998;
    flex-direction: column;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  #mobile-menu.open { display: flex; }
  #mobile-menu-user {
    padding: 12px 20px 6px;
    font-size: 11px;
    color: rgba(255,255,255,.38);
    text-transform: uppercase;
    letter-spacing: .09em;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .mob-menu-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 15px 20px;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.05);
    color: var(--text-topbar);
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    transition: background .15s;
  }
  .mob-menu-btn:last-child { border-bottom: none; }
  .mob-menu-btn:hover { background: rgba(255,255,255,.08); }

  /* ── Responzivita portálu ── */
  @media (max-width: 640px) {

    /* Karty: zarovnat nahoru (ne na střed), aby nevznikala mezera nahoře */
    #cards-view { align-items: flex-start; }

    /* Topbar: kompaktní */
    #topbar { padding: 0 12px; }
    .portal-brand { min-width: 0; }
    .portal-brand img { height: 34px; }
    .portal-copy { display: none; }
    #app-nav {
      left: 74px;
      right: 54px;
      width: auto;
      transform: none;
      justify-content: flex-start;
      max-width: none;
    }
    .app-nav-btn {
      height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    /* Schovat desktop prvky, ukázat hamburger */
    .user-badge { display: none; }
    #btn-pw-change, #btn-user-settings { display: none; }
    #btn-logout    { display: none; }
    #btn-hamburger { display: inline-flex; align-items: center; justify-content: center; }

    /* Sjednocení velikosti topbar tlačítek na mobilu — fixní výška, všechny inline-flex */
    #btn-theme, #btn-hamburger {
      height: 32px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      box-sizing: border-box;
    }

    /* Karty: menší padding */
    .main { padding: 20px 14px; }
    .welcome { padding-bottom: 16px; margin-bottom: 20px; }
    .welcome h1 { font-size: 20px; }
    .welcome p  { font-size: 13px; }
    .section-label { font-size: 9px; }
    .section-block { margin-top: 22px; }

    /* Mřížka karet: min šířka menší pro 2 sloupce na větších telefonech */
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    /* Karta: zachovat stávající velikost, obsah uprostřed */
    .card { padding: 18px 12px 16px; align-items: center; text-align: center; }
    .card-icon { font-size: 36px; margin-bottom: 10px; }
    /* Kalendářní ikona Raspis — přizpůsobit mobilní velikosti */
    .cal-icon { width: 38px; height: 38px; border-radius: 6px; }
    .cal-mon { font-size: 8px; padding: 3px 0 2px; }
    .cal-day { font-size: 18px; }
    /* Blacklist SVG ikona — přizpůsobit mobilní velikosti (SVG ignoruje font-size) */
    .card-icon svg { width: 38px; height: 38px; }
    .card-title { font-size: 14px; }
    .card-title { font-size: 14px; }

    /* Modál změny hesla: full width přes theme.css, ale parent má padding */
    .modal h2   { font-size: 14px; }
    .modal input { min-height: 46px; }
    .skin-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  /* Landscape mobile — hide overlapping topbar elements */
  @media (max-width: 1000px) and (orientation: landscape) {
    #topbar { padding: 0 env(safe-area-inset-right, 12px) 0 env(safe-area-inset-left, 12px); }
    .portal-copy { display: none; }
    .user-badge  { display: none; }
    #btn-pw-change, #btn-user-settings { display: none; }
    #btn-logout    { display: none; }
    #btn-hamburger { display: inline-flex; align-items: center; justify-content: center; }
    .home-label    { display: none; }
    .portal-brand { min-width: 0; }
    .portal-brand img { height: 32px; }
    #app-nav {
      left: 74px;
      right: 104px;
      width: auto;
      transform: none;
      justify-content: flex-start;
      max-width: none;
    }
  }

  @media (max-width: 380px) {
    /* Na nejmenších displejích: 1 sloupec karet */
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <div class="topbar-left">
    <div class="portal-brand">
      <img src="/static/logo.png" alt="AVE Hotels">
      <span class="portal-copy">&copy; 2026 Karel Dvořák</span>
    </div>

  <nav id="app-nav" aria-label="Aplikace"></nav>

  <!-- Right: User controls -->
  <div class="topbar-right">

    <button id="btn-user-settings" class="btn-top" onclick="openUserSettings()">Nastavení</button>
<button id="btn-pw-change" class="btn-top" onclick="document.getElementById('pw-overlay').classList.add('show')">Změnit heslo</button>
    <a id="btn-logout" href="/logout" class="btn-top">Odhlásit</a>
    <button id="btn-theme" title="Přepnout světlé / tmavé téma">🌙</button>

<!-- Mobilní slide-down menu (skryté na desktopu) -->

<!-- Cards view -->
<div id="cards-view">

    <!-- Boxíky aplikací -->
    <div class="grid" id="grid-all"></div>
  </div>
</div>

<!-- Loading overlay -->
<div id="app-loading">
  <div class="spinner"></div>
  <span>Načítám…</span>
</div>

<!-- App iframe (hidden by default) -->
<iframe id="app-frame" src="about:blank" title="Aplikace"></iframe>

<!-- Modál: Změna hesla -->
<div class="overlay" id="pw-overlay">
  <div class="modal">
    <h2>Změna hesla</h2>
    <label>Současné heslo</label>
    <input type="password" id="pw-old" placeholder="">
    <label>Nové heslo</label>
    <input type="password" id="pw-new" placeholder="min. 6 znaků">
    <label>Nové heslo znovu</label>
    <input type="password" id="pw-new2" placeholder="">
    <div class="msg" id="pw-msg"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closePwModal()">Zrušit</button>
      <button class="btn-primary" onclick="changePassword()">Uložit</button>
    </div>
  </div>
</div>

<!-- Modál: Nastavení vzhledu -->
<div class="overlay" id="settings-overlay">
  <div class="modal modal-wide">
    <h2>Nastavení vzhledu</h2>
    <p class="settings-note">Vybraný vzhled se uloží k vašemu účtu a použije se v celém portálu.</p>
    <label>Režim</label>
    <div class="theme-mode-row">
      <button class="theme-mode-btn" id="mode-light" type="button" onclick="setPortalMode(false)">Světlý</button>
      <button class="theme-mode-btn" id="mode-dark" type="button" onclick="setPortalMode(true)">Tmavý</button>
    </div>
    <label>Barevný design</label>
    <div class="skin-grid" id="skin-grid"></div>
    <div class="settings-section" style="margin-top:10px">
      <label>Automatick&eacute; odhl&aacute;&scaron;en&iacute; p&rcaron;i ne&ccaron;innosti</label>
      <div class="settings-choice-row" id="auto-logout-picks"></div>
    </div>
    <div class="settings-section" id="public-raspis-pref" style="display:none;margin-top:12px">
      <label>V&yacute;choz&iacute; zobrazen&iacute; Rozpisu</label>
      <div class="public-hotel-picks" id="default-public-hotels"></div>
      <p class="settings-note" style="margin:6px 0 0">Pou&zcaron;ije se p&rcaron;i otev&rcaron;en&iacute; listu Rozpis.</p>
    </div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="closeUserSettings()">Hotovo</button>
    </div>
  </div>
</div>

<script>
  // ── Blacklist icon: black document + red diagonal ────────────────────────
  function blacklistIcon() {
    return `<svg width="56" height="56" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <path d="M7 3 H27 L35 11 V39 H7 Z" fill="#1a1a1a"/>
      <path d="M27 3 L27 11 H35 Z" fill="#3a3a3a"/>
      <line x1="10" y1="8" x2="32" y2="34" stroke="#e53030" stroke-width="3.5" stroke-linecap="round"/>
    </svg>`;
  }

  // ── Dynamic calendar icon (shows today's date like iOS calendar icon) ──────
  function calendarIcon() {
    const now = new Date();
    const months = ['led','úno','bře','dub','kvě','čvn','čvc','srp','zář','říj','lis','pro'];
    return `<span class="cal-icon"><span class="cal-mon">${months[now.getMonth()]}</span><span class="cal-day">${now.getDate()}</span></span>`;
  }

  // ── Card definitions ──────────────────────────────────────────────────────
  // ── Všechny karty aplikací (jednotný seznam) ─────────────────────────────
  const ALL_CARDS = [
    { id: 'raspis',      title: 'Rozpis a požadavky', href: '/raspis-test',  permKey: 'raspis' },
    { id: 'priplatky',   title: 'Příplatky a pokuty', href: '/priplatky',    permKey: 'priplatky' },
    { id: 'blacklist',   title: 'Blacklist',          href: '/blacklist',    permKey: 'blacklist' },
    { id: 'admin',       title: 'Správa uživatelů',   href: '/admin',        permKey: 'admin', adminOnly: true }
  ];

  // ── Build a card element ──────────────────────────────────────────────────
  function makeCard(c) {
    const el = document.createElement('div');
    el.className = 'card' + (c.href ? '' : ' disabled');
    el.dataset.appId = c.id;
    el.innerHTML = `
      <div class="card-title">${c.title}</div>
      ${!c.href ? '<span class="badge-soon">Připravuje se</span>' : ''}
    `;
    if (c.href) {
      el.addEventListener('click', () => loadApp(c.href));
    } else {
      // Disabled cards: block click but allow drag (pointer-events kept on for SortableJS)
      el.addEventListener('click', e => e.preventDefault());
    }
    return el;
  }

  let portalCards = [];
  let portalDefaultUrl = null;
  let currentAppUrl = null;
  let portalUser = null;
  let portalPrefs = {};

  function makeAppNavButton(c) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'app-nav-btn';
    btn.dataset.href = c.href || '';
    btn.dataset.appId = c.id;
    btn.textContent = c.title;
    btn.addEventListener('click', () => loadApp(c.href));
    return btn;
  }

  function updateActiveAppNav(url) {
    let active = null;
    document.querySelectorAll('#app-nav .app-nav-btn').forEach(btn => {
      const isActive = btn.dataset.href === url;
      btn.classList.toggle('active', isActive);
      if (isActive) active = btn;
    });
    const current = document.getElementById('app-nav-current');
    if (current) current.textContent = active?.textContent || 'Vybrat kartu';
    document.getElementById('app-nav')?.classList.remove('open');
  }

  function renderAppNav(cards) {
    const nav = document.getElementById('app-nav');
    nav.innerHTML = '<button id="app-nav-current" type="button">Vybrat kartu</button><div id="app-nav-menu"></div>';
    const menu = document.getElementById('app-nav-menu');
    cards.filter(c => c.href).forEach(c => menu.appendChild(makeAppNavButton(c)));
    document.getElementById('app-nav-current').addEventListener('click', e => {
      e.stopPropagation();
      nav.classList.toggle('open');
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('#app-nav')) nav.classList.remove('open');
    });
  }

  function getDefaultApp(cards, user, perms) {
    const defaultRoles = ['admin', 'vedoucí', 'recepční'];
    const preferredId = perms?.__defaultApp || (defaultRoles.includes(user?.role) ? 'raspis' : null);
    const preferred = preferredId ? cards.find(c => c.id === preferredId && c.href) : null;
    return preferred?.href || cards.find(c => c.href)?.href || null;
  }

  try { history.replaceState({ app: null }, '', '/portal'); } catch(e) {}

  function replaceFrameUrl(frame, url) {
    try {
      frame.contentWindow.location.replace(url);
    } catch(e) {
      frame.src = url;
    }
  }

  // ── Load app into iframe ──────────────────────────────────────────────────
  function loadApp(url, pushHistory = true) {
    if (!url) return;
    const frame = document.getElementById('app-frame');
    const cardsView = document.getElementById('cards-view');
    const btnHome = document.getElementById('btn-home');
    const loading = document.getElementById('app-loading');

    cardsView.style.display = 'none';
    if (btnHome) btnHome.classList.remove('visible');
    loading.classList.add('visible');
    frame.classList.remove('visible');
    currentAppUrl = url;
    updateActiveAppNav(url);

    frame.onload = function() {
      loading.classList.remove('visible');
      frame.classList.add('visible');
      bindIdleEventsInFrame();
    };
    replaceFrameUrl(frame, url);
    // Keep URL as /portal — app name stays hidden. State stored in sessionStorage for F5 restore.
    if (pushHistory) history.pushState({ app: url }, '', '/portal');
    try { sessionStorage.setItem('portal-last-app', url); } catch(e) {}
  }

  // ── Return to home / card grid ────────────────────────────────────────────
  function goHome(pushHistory = true) {
    loadApp(portalDefaultUrl || portalCards[0]?.href || '/raspis-test', pushHistory);
  }

  // Handle browser back/forward
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.app) {
      loadApp(e.state.app, false);
    } else {
      loadApp(portalDefaultUrl || currentAppUrl || '/raspis-test', false);
    }
  });

  // ── Early restore: synchronously hide dashboard before any async fetch ──
  // Runs immediately so the user never sees the card grid flash before the app loads.
  // Obnova poslední aplikace probíhá POUZE při F5/reload — ne při zadání URL z adresního řádku.
  (function() {
    const navEntry = performance.getEntriesByType('navigation')[0];
    const isReload = navEntry ? navEntry.type === 'reload'
                              : (performance.navigation && performance.navigation.type === 1);
    if (!isReload) {
      // Čerstvá navigace (nová URL, back/forward…) — výchozí aplikaci vybereme po načtení práv.
      try { sessionStorage.removeItem('portal-last-app'); } catch(e) {}
      return;
    }
    const validHrefs = ALL_CARDS.filter(c => c.href).map(c => c.href);
    const storedUrl = (() => { try { return sessionStorage.getItem('portal-last-app'); } catch(e) { return null; } })();
    const url = (storedUrl && validHrefs.includes(storedUrl)) ? storedUrl : null;
    if (url) {
      document.getElementById('app-loading').classList.add('visible');
      window._portalRestoreUrl = url;
    }
  })();

  // ── Init: fetch user + permissions + app order, render cards ────────────
  (async () => {
    const [user, perms, orderData, prefData] = await Promise.all([
      fetch('/api/me').then(r => r.json()).catch(() => null),
      fetch('/api/my-permissions').then(r => r.json()).catch(() => null),
      fetch('/api/user-prefs/app-order').then(r => r.json()).catch(() => null),
      fetch('/api/user-prefs').then(r => r.json()).catch(() => null)
    ]);
    if (!user) return;
    portalUser = user;
    portalPrefs = prefData || {};
    setupIdleLogout();

    document.getElementById('user-label').textContent = user.username;
    document.getElementById('greet-name').textContent = user.name;
    const isAdmin = user.role === 'admin';

    // Určení pořadí karet (uložené nebo výchozí)
    const savedOrder = [];
    let cards = [...ALL_CARDS];
    if (savedOrder.length) {
      cards.sort((a, b) => {
        const ai = savedOrder.indexOf(a.id);
        const bi = savedOrder.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    }

    // Připravit dostupné aplikace s ohledem na oprávnění
    const grid = document.getElementById('grid-all');
    const visibleCards = cards.filter(c => {
      if (c.adminOnly && !isAdmin) return false; // Admin-only → skrýt
      // Zkontroluj viditelnost přes oprávnění
      if (perms && c.permKey && perms[c.permKey]) {
        if (perms[c.permKey].visible === false) return false; // Skryto adminem
      }
      return true;
    });

    portalCards = visibleCards;
    portalDefaultUrl = getDefaultApp(visibleCards, user, perms);
    renderAppNav(visibleCards);
    visibleCards.forEach(c => {
      grid.appendChild(makeCard(c));
    });

    // ── Drag-and-drop (SortableJS) ──────────────────────────────────────
    if (typeof Sortable !== 'undefined') {
      Sortable.create(grid, {
        animation: 150,
        delay: 200,          // dlouhý stisk pro dotykové ovládání
        delayOnTouchOnly: true,
        ghostClass: 'card-dragging',
        onEnd() {
          const order = [...grid.querySelectorAll('.card[data-app-id]')].map(c => c.dataset.appId);
          fetch('/api/user-prefs/app-order', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order })
          }).catch(() => {});
        }
      });
    }

    // ── Restore last app after F5 ────────────────────────────────────────
    // URL was already validated synchronously above; just call loadApp().
    loadApp(window._portalRestoreUrl || portalDefaultUrl || visibleCards[0]?.href);
  })();

  // ── User appearance settings ──────────────────────────────────────────────
  const SKIN_PREVIEWS = {
    default:  ['#F5FAFE', '#2879B6'],
    graphite: ['#F4F4F5', '#17181B'],
    slate:    ['#F6F8FA', '#26323F'],
    blue:     ['#F5FAFE', '#2879B6'],
    teal:     ['#F4FBFA', '#167A73'],
    green:    ['#F6FBF6', '#3D7B32'],
    olive:    ['#FAFAF3', '#70752A'],
    amber:    ['#FCF8F0', '#9A6422'],
    rose:     ['#FCF7F8', '#9B3F5B'],
    violet:   ['#F9F7FC', '#64428A'],
    indigo:   ['#F6F7FF', '#3F51B5'],
    cyan:     ['#F2FBFD', '#0E88A8'],
    mint:     ['#F3FBF7', '#2E9273'],
    lime:     ['#F9FBF1', '#7D9A20'],
    yellow:   ['#FEFAEF', '#B08A00'],
    orange:   ['#FFF7F0', '#C25B1E'],
    red:      ['#FFF6F4', '#B63A32'],
    pink:     ['#FEF6FA', '#C0447E'],
    plum:     ['#FBF6FC', '#7E3C8C'],
    coffee:   ['#FAF7F3', '#6B4A2E'],
    navy:     ['#F4F8FC', '#173E70']
  };
  const SKIN_PREVIEWS_DARK = {
    default:  ['#141618', '#C4A96A'],
    graphite: ['#15171A', '#D7D9DD'],
    slate:    ['#111820', '#8FA7C2'],
    blue:     ['#101820', '#6BAFE3'],
    teal:     ['#101918', '#6ECFC4'],
    green:    ['#111911', '#93D27F'],
    olive:    ['#17170F', '#D1D47A'],
    amber:    ['#18130D', '#E2B86A'],
    rose:     ['#180F13', '#E18AA5'],
    violet:   ['#131018', '#C2A0E6'],
    indigo:   ['#10121A', '#A8B7FF'],
    cyan:     ['#0E1518', '#70D5EA'],
    mint:     ['#0F1713', '#77D7B1'],
    lime:     ['#15170F', '#C6DB6D'],
    yellow:   ['#17130C', '#E4C451'],
    orange:   ['#180F0B', '#F2A15F'],
    red:      ['#180F0E', '#EC8B82'],
    pink:     ['#180F14', '#EF8FC0'],
    plum:     ['#151018', '#D59AE5'],
    coffee:   ['#17120E', '#D2AD84'],
    navy:     ['#10151B', '#89B7EA']
  };

  function renderSkinGrid() {
    const grid = document.getElementById('skin-grid');
    if (!grid) return;
    const skins = window.AVE_THEME_SKINS || [];
    const active = window.AVE_THEME?.getSkin?.() || 'default';
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const previewSet = dark ? SKIN_PREVIEWS_DARK : SKIN_PREVIEWS;
    grid.innerHTML = skins.map(s => {
      const c = previewSet[s.id] || previewSet.default;
      return `<button class="skin-card${s.id === active ? ' active' : ''}" type="button" data-skin="${s.id}" onclick="selectPortalSkin('${s.id}')">
        <span class="skin-preview"><span style="background:${c[0]}"></span><span style="background:${c[1]}"></span></span>
        <span class="skin-label">${s.label}</span>
      </button>`;
    }).join('');
  }

  function refreshThemeSettingsState() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('mode-light')?.classList.toggle('active', !dark);
    document.getElementById('mode-dark')?.classList.toggle('active', dark);
    renderSkinGrid();
    refreshAutoLogoutPref();
    refreshPublicRaspisPref();
  }

  function refreshAutoLogoutPref() {
    const wrap = document.getElementById('auto-logout-picks');
    if (!wrap) return;
    const value = Number(portalPrefs.auto_logout_minutes ?? portalUser?.auto_logout_minutes ?? 30);
    const options = [
      [10, '10 min.'],
      [30, '30 min.'],
      [60, '1 hod.'],
      [720, '12 hod.'],
      [0, 'Nikdy']
    ];
    wrap.innerHTML = options.map(([minutes, label]) =>
      `<button type="button" class="settings-choice${minutes === value ? ' active' : ''}" onclick="saveAutoLogout(${minutes})">${label}</button>`
    ).join('');
  }

  function refreshPublicRaspisPref() {
    const wrap = document.getElementById('public-raspis-pref');
    const grid = document.getElementById('default-public-hotels');
    if (!wrap || !grid) return;
    const isReception = String(portalUser?.role || '').toLowerCase().includes('recep');
    wrap.style.display = isReception ? '' : 'none';
    if (!isReception) return;
    const value = String(portalPrefs.default_public_hotel || 'ALL').toUpperCase();
    const active = new Set(value === 'ALL' ? ['ALL'] : value.split(',').filter(Boolean));
    const hotels = ['ALL','A','B','C','D','E','G','H','I','J','L','M','N','S','T','U'];
    grid.innerHTML = hotels.map(h => `<button type="button" class="public-hotel-pick${active.has(h) ? ' active' : ''}" data-hotel="${h}" onclick="toggleDefaultPublicHotel('${h}')">${h === 'ALL' ? 'V&Scaron;E' : h}</button>`).join('');
  }

  function openUserSettings() {
    closeMobileMenu();
    refreshThemeSettingsState();
    document.getElementById('settings-overlay').classList.add('show');
  }

  function closeUserSettings() {
    document.getElementById('settings-overlay').classList.remove('show');
  }

  function setPortalMode(dark) {
    window.AVE_THEME?.setMode?.(dark, true);
    refreshThemeSettingsState();
  }

  function selectPortalSkin(skin) {
    window.AVE_THEME?.setSkin?.(skin, true);
    refreshThemeSettingsState();
  }

  function toggleDefaultPublicHotel(hotel) {
    const h = String(hotel || 'ALL').toUpperCase();
    const current = String(portalPrefs.default_public_hotel || 'ALL').toUpperCase();
    const set = current === 'ALL' ? new Set(['ALL']) : new Set(current.split(',').filter(Boolean));
    if (h === 'ALL') {
      set.clear();
      set.add('ALL');
    } else {
      set.delete('ALL');
      if (set.has(h)) set.delete(h);
      else set.add(h);
      if (!set.size) set.add('ALL');
    }
    saveDefaultPublicHotel(Array.from(set).join(','));
  }

  async function saveDefaultPublicHotel(hotel) {
    const val = String(hotel || 'ALL').toUpperCase();
    portalPrefs.default_public_hotel = val;
    refreshPublicRaspisPref();
    try {
      await fetch('/api/user-prefs/default-public-hotel', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hotel: val })
      });
      document.getElementById('app-frame')?.contentWindow?.postMessage({ type: 'ave-public-default-hotel', hotel: val }, '*');
    } catch(e) {}
  }

  async function saveAutoLogout(minutes) {
    const val = Number(minutes);
    portalPrefs.auto_logout_minutes = val;
    if (portalUser) portalUser.auto_logout_minutes = val;
    refreshAutoLogoutPref();
    setupIdleLogout();
    try {
      await fetch('/api/user-prefs/auto-logout', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ minutes: val })
      });
    } catch(e) {}
  }

  let _modalPointerDownInside = false;
  function modalSelectionDragActive() {
    const sel = window.getSelection ? window.getSelection() : null;
    const keep = _modalPointerDownInside || !!(sel && !sel.isCollapsed && String(sel).length);
    _modalPointerDownInside = false;
    return keep;
  }
  document.addEventListener('pointerdown', e => {
    _modalPointerDownInside = !!e.target.closest('.modal');
  }, true);

  document.getElementById('settings-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('settings-overlay') && !modalSelectionDragActive()) closeUserSettings();
  });

  // ── Password change ───────────────────────────────────────────────────────
  function closePwModal() {
    document.getElementById('pw-overlay').classList.remove('show');
    ['pw-old', 'pw-new', 'pw-new2'].forEach(id => document.getElementById(id).value = '');
    const msg = document.getElementById('pw-msg');
    msg.textContent = '';
    msg.className = 'msg';
  }

  async function changePassword() {
    const old  = document.getElementById('pw-old').value;
    const n1   = document.getElementById('pw-new').value;
    const n2   = document.getElementById('pw-new2').value;
    const msg  = document.getElementById('pw-msg');
    if (n1 !== n2) { msg.className = 'msg err'; msg.textContent = 'Nová hesla se neshodují.'; return; }
    const r    = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldPassword: old, newPassword: n1 })
    });
    const data = await r.json();
    msg.className = 'msg ' + (data.ok ? 'ok' : 'err');
    msg.textContent = data.msg;
    if (data.ok) setTimeout(closePwModal, 1500);
  }

  document.getElementById('pw-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('pw-overlay') && !modalSelectionDragActive()) closePwModal();
  });

  // Otevřít modál změny hesla (přes hamburger menu i desktop tlačítko)
  function openPwModal() {
    closeMobileMenu();
    document.getElementById('pw-overlay').classList.add('show');
  }
  // Přepsat onclick původního tlačítka
  document.getElementById('btn-pw-change').onclick = openPwModal;

  // ── Mobilní hamburger menu ─────────────────────────────────────────
  function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    if (menu.classList.contains('open')) closeMobileMenu();
    else openMobileMenu();
  }

  function openMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.add('open');
    menu.setAttribute('aria-hidden', 'false');
    // Aktualizovat jméno uživatele v menu
    const username = document.getElementById('user-label').textContent;
    const userEl = document.getElementById('mobile-menu-user');
    if (userEl && username) userEl.textContent = username;
  }

  function closeMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.remove('open');
    menu.setAttribute('aria-hidden', 'true');
  }

  // Zavřít menu kliknutím mimo
  document.addEventListener('click', function(e) {
    const menu = document.getElementById('mobile-menu');
    const btn  = document.getElementById('btn-hamburger');
    if (menu && menu.classList.contains('open') &&
        !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
      closeMobileMenu();
    }
  });

  // ── Auto-logout after 10 min inactivity ──────────────────────────────────
  // Activity is shared across ALL browser windows/tabs via localStorage,
  // so moving the mouse on another monitor (another window of the same
  // browser) also counts as activity and resets the timer here.
  const IDLE_LS_KEY = 'ave-last-activity';
  let idleTimer = null;

  function getAutoLogoutMinutes() {
    return Number(portalPrefs.auto_logout_minutes ?? portalUser?.auto_logout_minutes ?? 30);
  }

  function resetIdleTimer() {
    clearTimeout(idleTimer);
    const minutes = getAutoLogoutMinutes();
    if (!minutes) return;
    idleTimer = setTimeout(() => { window.location.href = '/logout'; }, minutes * 60 * 1000);
  }

  function signalActivity() {
    try { localStorage.setItem(IDLE_LS_KEY, String(Date.now())); } catch(e) {}
    resetIdleTimer();
  }

  function bindIdleEventsInFrame() {
    const frame = document.getElementById('app-frame');
    if (!frame) return;
    try {
      const d = frame.contentDocument || frame.contentWindow.document;
      ['mousemove', 'keydown', 'click', 'touchstart', 'wheel'].forEach(ev => {
        d.removeEventListener(ev, signalActivity, true);
        d.addEventListener(ev, signalActivity, true);
      });
    } catch(e) {}
  }

  function handleIdleStorage(e) {
    if (e.key === IDLE_LS_KEY) resetIdleTimer();
  }

  function setupIdleLogout() {
    ['mousemove', 'keydown', 'click', 'touchstart', 'wheel'].forEach(ev => {
      document.removeEventListener(ev, signalActivity, true);
      document.addEventListener(ev, signalActivity, true);
    });
    window.removeEventListener('storage', handleIdleStorage);
    window.addEventListener('storage', handleIdleStorage);
    bindIdleEventsInFrame();
    resetIdleTimer();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
