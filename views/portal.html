<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VR AVE</title>
<meta name="apple-mobile-web-app-title" content="VR AVE">
<link rel="icon" type="image/png" href="/static/logo.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="/static/theme.css">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    padding-top: 58px;
    transition: background .25s, color .25s;
  }

  /* ── Horní lišta ── */
  #topbar {
    background: var(--bg-topbar);
    height: 58px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    border-bottom: 1px solid rgba(0,0,0,.4);
  }
  .topbar-logo {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    pointer-events: none;
  }
  .topbar-logo img {
    height: 52px;
    object-fit: contain;
    filter: brightness(0) invert(1);
  }
  .topbar-copy {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-badge {
    color: var(--text-muted);
    font-size: 13px;
  }
  .btn-top {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--btn-top-border);
    background: transparent;
    color: var(--btn-top-color);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    text-decoration: none;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-top:hover { background: var(--btn-top-hover-bg); color: #fff; border-color: #666; }

  /* ── Home button (hidden by default) ── */
  #btn-home {
    display: none;
  }
  #btn-home.visible {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 8px;
    border: 2px solid var(--btn-top-border);
    background: var(--portal-card-bg, rgba(255,255,255,0.08));
    color: var(--btn-top-color);
    line-height: 1;
    min-width: 44px;
    min-height: 34px;
  }
  #btn-home.visible:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Obsah ── */
  #cards-view {
    min-height: calc(100vh - 58px);
    display: flex;
    align-items: center;
  }
  .main {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 28px;
  }
  .welcome h1 {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* ── Grid karet ── */
  .grid { margin-top: 20px; }
  /* Drag-and-drop: přetahovaná karta */
  .card-dragging {
    opacity: 0.4;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }

  /* ── Uvítací oddělovač ── */
  .welcome {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 28px;
  }

  /* ── Mřížka karet ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }

  /* ── Karta ── */
  .card {
    background: var(--portal-card-bg);
    border: 1px solid var(--portal-card-border);
    border-radius: 14px;
    padding: 32px 24px 28px;
    cursor: pointer;
    transition: background .18s, border-color .18s, transform .18s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    /* Prevent text/icon selection on long-press (mobile drag) */
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .card:hover {
    background: var(--portal-card-hover-bg);
    border-color: var(--border-strong);
    transform: translateY(-3px);
  }
  .card.disabled {
    opacity: 0.38;
    cursor: not-allowed;
    /* pointer-events: none removed — SortableJS needs events to drag disabled cards */
  }
  .card.disabled:hover {
    background: var(--portal-card-bg);
    border-color: var(--portal-card-border);
    transform: none;
  }
  .card-icon {
    font-size: 52px;
    height: 68px;           /* fixed height — aligns all icon types */
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    line-height: 1;
  }
  /* Dynamic calendar icon for Raspis card */
  .cal-icon {
    display: inline-flex; flex-direction: column; align-items: center;
    width: 52px; height: 52px; background: #fff; border-radius: 8px;
    overflow: hidden; line-height: 1; box-shadow: 0 2px 5px rgba(0,0,0,.28);
    border: 1.5px solid #e0e0e0;
  }
  .cal-mon {
    background: #e53030; width: 100%; color: #fff;
    font-size: 10px; font-weight: 700; text-align: center;
    padding: 4px 0 3px; text-transform: uppercase; letter-spacing: .05em;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .cal-day {
    color: #e53030; font-size: 24px; font-weight: 800;
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--portal-card-text);
    margin-bottom: 0;
  }
  .card-desc { display: none; }
  .badge-soon {
    display: inline-block;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: var(--portal-badge-bg);
    color: var(--portal-badge-text);
    border: 1px solid var(--portal-badge-border);
    border-radius: 4px;
    padding: 2px 7px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* ── Zprávy ── */
  #messages-section {
    margin-bottom: 24px;
  }
  /* Mobile: each card its own height (align-items: start prevents stretching in same row) */
  #messages-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    align-items: start;
  }
  /* Desktop: all cards in a row match the tallest one */
  @media (min-width: 960px) {
    #messages-list {
      grid-template-columns: repeat(3, 1fr);
      align-items: stretch;
    }
  }
  .msg-card {
    background: var(--modal-bg);
    border: 1px solid var(--modal-border);
    border-left: 4px solid #e8a020;
    border-radius: 10px;
    padding: 14px 16px 12px;
    box-shadow: 0 2px 10px rgba(0,0,0,.1);
    box-sizing: border-box;
    /* Flex column so actions always sit at bottom */
    display: flex;
    flex-direction: column;
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .msg-author { font-size: 12px; font-weight: 700; color: var(--text); }
  .msg-date { font-size: 11px; color: var(--text-muted); }
  .msg-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
    margin-bottom: 12px;
    word-break: break-word;
    flex: 1;  /* grows to push actions to bottom */
  }
  .msg-content b { font-weight: 700; }
  .msg-content i { font-style: italic; }
  .msg-actions { display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
  .msg-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .msg-btn-hide {
    border: 1px solid var(--border);
    background: var(--surface-alt, #f5f5f5);
    color: var(--text-muted);
  }
  .msg-btn-hide:hover { background: #fdecea; border-color: #c0392b; color: #c0392b; }
  .msg-btn-delete {
    border: 1px solid #c0392b;
    background: none;
    color: #c0392b;
    margin-left: auto;
  }
  .msg-btn-delete:hover { background: #fdd; }
  /* Compose tlačítko v topbaru */
  #btn-compose-topbar { display: none; }
  #btn-compose-topbar .compose-desk { display: inline; }
  #btn-compose-topbar .compose-mob  { display: none; }
  @media (max-width: 640px) {
    #btn-compose-topbar .compose-desk { display: none; }
    #btn-compose-topbar .compose-mob  { display: inline; font-size: 16px; }
  }
  /* Compose modal */
  #compose-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 8000;
    background: rgba(0,0,0,.45);
    align-items: center; justify-content: center;
  }
  #compose-overlay.show { display: flex; }
  #compose-modal {
    background: var(--modal-bg);
    border-radius: 14px;
    padding: 28px 28px 22px;
    width: min(500px, calc(100vw - 32px));
    box-shadow: 0 8px 32px rgba(0,0,0,.25);
    max-height: 90vh;
    overflow-y: auto;
  }
  #compose-modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--text); }
  .compose-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 5px; display: block; }
  .compose-rte-toolbar { display: flex; gap: 5px; margin-bottom: 6px; }
  .compose-rte-btn { padding: 3px 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--modal-bg); color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; }
  .compose-rte-btn:hover { background: var(--surface-alt); }
  #compose-content {
    min-height: 80px;
    border: 1px solid var(--input-border);
    border-radius: 7px;
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text);
    background: var(--input-bg);
    outline: none;
    line-height: 1.5;
    word-break: break-word;
  }
  #compose-content:focus { border-color: var(--border-strong); }
  .compose-select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--input-border);
    border-radius: 7px;
    font-size: 13px;
    color: var(--text);
    background: var(--input-bg);
    font-family: inherit;
    outline: none;
  }
  #compose-targets { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
  .compose-target-cb { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text); cursor: pointer; }
  .compose-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── iframe ── */
  #app-frame {
    display: none;
    position: fixed;
    top: 58px;
    left: 0;
    width: 100%;
    height: calc(100vh - 58px);
    border: none;
    background: var(--bg);
  }
  #app-frame.visible {
    display: block;
  }

  /* ── Loading overlay ── */
  #app-loading {
    display: flex;
    opacity: 0;
    pointer-events: none;
    position: fixed;
    top: 58px;
    left: 0;
    width: 100%;
    height: calc(100vh - 58px);
    background: var(--bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: var(--text-muted);
    font-size: 13px;
    transition: opacity .2s;
  }
  #app-loading.visible { opacity: 1; pointer-events: auto; }
  #app-frame { transition: opacity .15s; }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--spinner-border);
    border-top-color: var(--spinner-top);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modální okno ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 10000;
    align-items: center;
    justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--modal-bg);
    border: 1px solid var(--modal-border);
    border-radius: 12px;
    padding: 28px;
    width: 360px;
    box-shadow: var(--modal-shadow);
  }
  .modal h2 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 20px; }
  .modal label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 5px;
  }
  .modal input {
    width: 100%;
    padding: 9px 11px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  .modal input:focus { border-color: var(--border-strong); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  .btn-secondary {
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s;
  }
  .btn-secondary:hover { background: var(--surface-alt); color: var(--text); }
  .btn-primary {
    padding: 7px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .btn-primary:hover { background: var(--accent-h); }

  /* Theme toggle button */
  #btn-theme {
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--btn-top-border);
    background: transparent;
    color: var(--btn-top-color);
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    line-height: 1;
    font-family: inherit;
  }
  #btn-theme:hover { background: var(--btn-top-hover-bg); color: #fff; }

  .msg { font-size: 12px; min-height: 18px; margin-top: 6px; }
  .msg.ok  { color: #5cb85c; }
  .msg.err { color: #e05555; }

  /* ── Hamburger tlačítko (skryté na desktopu) ── */
  #btn-hamburger {
    display: none;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid var(--btn-top-border);
    background: transparent;
    color: var(--btn-top-color);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
    transition: all .15s;
    font-family: inherit;
  }
  #btn-hamburger:hover { background: var(--btn-top-hover-bg); color: #fff; }

  /* ── Mobilní slide-down menu ── */
  #mobile-menu {
    display: none;
    position: fixed;
    top: 58px;
    left: 0;
    width: 100%;
    background: var(--bg-topbar);
    border-bottom: 2px solid rgba(0,0,0,.5);
    z-index: 9998;
    flex-direction: column;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  #mobile-menu.open { display: flex; }
  #mobile-menu-user {
    padding: 12px 20px 6px;
    font-size: 11px;
    color: rgba(255,255,255,.38);
    text-transform: uppercase;
    letter-spacing: .09em;
    border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .mob-menu-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 15px 20px;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.05);
    color: var(--text-topbar);
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    transition: background .15s;
  }
  .mob-menu-btn:last-child { border-bottom: none; }
  .mob-menu-btn:hover { background: rgba(255,255,255,.08); }

  /* ── Responzivita portálu ── */
  @media (max-width: 640px) {

    /* Karty: zarovnat nahoru (ne na střed), aby nevznikala mezera nahoře */
    #cards-view { align-items: flex-start; }

    /* Topbar: kompaktní */
    #topbar { padding: 0 12px; }
    .topbar-logo img { height: 40px; }
    .topbar-copy { display: none; }

    /* Schovat desktop prvky, ukázat hamburger */
    .user-badge { display: none; }
    #btn-pw-change { display: none; }
    #btn-logout    { display: none; }
    #btn-hamburger { display: inline-flex; align-items: center; justify-content: center; }

    /* Sjednocení velikosti topbar tlačítek na mobilu — fixní výška, všechny inline-flex */
    #btn-theme, #btn-hamburger, #btn-compose-topbar {
      height: 32px;
      padding: 0 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      box-sizing: border-box;
    }
    #btn-compose-topbar .compose-mob { font-size: 16px; line-height: 1; }

    /* Karty: menší padding */
    .main { padding: 20px 14px; }
    .welcome { padding-bottom: 16px; margin-bottom: 20px; }
    .welcome h1 { font-size: 20px; }
    .welcome p  { font-size: 13px; }
    .section-label { font-size: 9px; }
    .section-block { margin-top: 22px; }

    /* Mřížka karet: min šířka menší pro 2 sloupce na větších telefonech */
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    /* Karta: zachovat stávající velikost, obsah uprostřed */
    .card { padding: 18px 12px 16px; align-items: center; text-align: center; }
    .card-icon { font-size: 36px; margin-bottom: 10px; }
    /* Kalendářní ikona Raspis — přizpůsobit mobilní velikosti */
    .cal-icon { width: 38px; height: 38px; border-radius: 6px; }
    .cal-mon { font-size: 8px; padding: 3px 0 2px; }
    .cal-day { font-size: 18px; }
    /* Blacklist SVG ikona — přizpůsobit mobilní velikosti (SVG ignoruje font-size) */
    .card-icon svg { width: 38px; height: 38px; }
    .card-title { font-size: 14px; }
    .card-title { font-size: 14px; }

    /* Modál změny hesla: full width přes theme.css, ale parent má padding */
    .modal h2   { font-size: 14px; }
    .modal input { min-height: 46px; }
  }

  /* Landscape mobile — hide overlapping topbar elements */
  @media (max-width: 1000px) and (orientation: landscape) {
    #topbar { padding: 0 env(safe-area-inset-right, 12px) 0 env(safe-area-inset-left, 12px); }
    .topbar-copy { display: none; }
    .user-badge  { display: none; }
    #btn-pw-change { display: none; }
    #btn-logout    { display: none; }
    #btn-hamburger { display: inline-flex; align-items: center; justify-content: center; }
    .home-label    { display: none; }
    .topbar-logo img { height: 36px; }
  }

  @media (max-width: 380px) {
    /* Na nejmenších displejích: 1 sloupec karet */
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="topbar">
  <!-- Left: Home button (visible only when app is loaded) -->
  <div class="topbar-left">
    <button id="btn-home" class="btn-top" onclick="goHome()" title="Zpět na přehled">&#8592;</button>
  </div>

  <!-- Center: Logo (always visible) -->
  <div class="topbar-logo">
    <img src="/static/logo.png" alt="AVE Hotels">
    <span class="topbar-copy">&copy; 2026 Karel Dvo&rcaron;&aacute;k</span>
  </div>

  <!-- Right: User controls -->
  <div class="topbar-right">
    <span class="user-badge" id="user-label"></span>
    <button id="btn-compose-topbar" class="btn-top" onclick="openComposeModal()" title="Napsat zprávu uživatelům">
      <span class="compose-desk">✉&nbsp;Napsat zprávu</span><span class="compose-mob">✏</span>
    </button>
    <button id="btn-pw-change" class="btn-top" onclick="document.getElementById('pw-overlay').classList.add('show')">Změnit heslo</button>
    <a id="btn-logout" href="/logout" class="btn-top">Odhlásit</a>
    <button id="btn-theme" title="Přepnout světlé / tmavé téma">🌙</button>
    <button id="btn-hamburger" onclick="toggleMobileMenu()" aria-label="Menu" title="Menu">☰</button>
  </div>
</div>

<!-- Mobilní slide-down menu (skryté na desktopu) -->
<div id="mobile-menu" aria-hidden="true">
  <div id="mobile-menu-user"></div>
  <button class="mob-menu-btn" onclick="openPwModal()">🔑&nbsp; Změnit heslo</button>
  <a class="mob-menu-btn" href="/logout">⎋&nbsp; Odhlásit</a>
</div>

<!-- Cards view -->
<div id="cards-view">
  <div class="main">
    <div class="welcome">
      <h1>Vítej, <span id="greet-name"></span>!</h1>
    </div>
    <!-- Zprávy nad boxíky aplikací -->
    <div id="messages-section" style="display:none;">
      <div id="messages-list"></div>
    </div>
    <!-- Boxíky aplikací -->
    <div class="grid" id="grid-all"></div>
  </div>
</div>

<!-- Modal: Napsat zprávu -->
<div id="compose-overlay">
  <div id="compose-modal">
    <h3>✉ Napsat zprávu uživatelům</h3>

    <span class="compose-label">Zpráva</span>
    <div class="compose-rte-toolbar">
      <button class="compose-rte-btn" onclick="composeCmd('bold')" title="Tučné"><b>B</b></button>
      <button class="compose-rte-btn" onclick="composeCmd('italic')" title="Kurzíva"><i>I</i></button>
      <button class="compose-rte-btn" onclick="composeCmd('insertUnorderedList')" title="Seznam">☰</button>
    </div>
    <div id="compose-content" contenteditable="true" placeholder="Text zprávy…"></div>

    <span class="compose-label">Příjemci</span>
    <select class="compose-select" id="compose-target-type" onchange="updateTargetPicker()">
      <option value="all">Všichni uživatelé</option>
      <option value="groups">Vybrané skupiny</option>
      <option value="users">Vybraní uživatelé</option>
    </select>
    <div id="compose-targets"></div>

    <span class="compose-label">Platnost (volitelné)</span>
    <input type="date" id="compose-expires" class="compose-select">

    <div class="compose-actions">
      <button class="msg-btn msg-btn-dismiss" onclick="closeComposeModal()">Zrušit</button>
      <button class="msg-btn" style="background:#e8a020;border:none;color:#fff;" onclick="sendMessage()">Odeslat zprávu</button>
    </div>
  </div>
</div>

<!-- Loading overlay -->
<div id="app-loading">
  <div class="spinner"></div>
  <span>Načítám…</span>
</div>

<!-- App iframe (hidden by default) -->
<iframe id="app-frame" src="about:blank" title="Aplikace"></iframe>

<!-- Modál: Změna hesla -->
<div class="overlay" id="pw-overlay">
  <div class="modal">
    <h2>Změna hesla</h2>
    <label>Současné heslo</label>
    <input type="password" id="pw-old" placeholder="">
    <label>Nové heslo</label>
    <input type="password" id="pw-new" placeholder="min. 6 znaků">
    <label>Nové heslo znovu</label>
    <input type="password" id="pw-new2" placeholder="">
    <div class="msg" id="pw-msg"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closePwModal()">Zrušit</button>
      <button class="btn-primary" onclick="changePassword()">Uložit</button>
    </div>
  </div>
</div>

<script>
  // ── Blacklist icon: black document + red diagonal ────────────────────────
  function blacklistIcon() {
    return `<svg width="56" height="56" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <path d="M7 3 H27 L35 11 V39 H7 Z" fill="#1a1a1a"/>
      <path d="M27 3 L27 11 H35 Z" fill="#3a3a3a"/>
      <line x1="10" y1="8" x2="32" y2="34" stroke="#e53030" stroke-width="3.5" stroke-linecap="round"/>
    </svg>`;
  }

  // ── Dynamic calendar icon (shows today's date like iOS calendar icon) ──────
  function calendarIcon() {
    const now = new Date();
    const months = ['led','úno','bře','dub','kvě','čvn','čvc','srp','zář','říj','lis','pro'];
    return `<span class="cal-icon"><span class="cal-mon">${months[now.getMonth()]}</span><span class="cal-day">${now.getDate()}</span></span>`;
  }

  // ── Card definitions ──────────────────────────────────────────────────────
  // ── Všechny karty aplikací (jednotný seznam) ─────────────────────────────
  const ALL_CARDS = [
    { id: 'raspis',   icon: calendarIcon(), title: 'Rozpis',             href: '/rozpis-view', permKey: 'raspis'   },
    { id: 'odmeny',   icon: '⭐',           title: 'Odměny',             href: null,           permKey: 'odmeny'   },
    { id: 'provize',  icon: '💰',           title: 'Provize',            href: null,           permKey: 'provize'  },
    { id: 'smlouvy',  icon: '📄',           title: 'Pracovní smlouvy',   href: '/smlouvy',     permKey: 'smlouvy'  },
    { id: 'priplatky',icon: '💵',          title: 'Příplatky a pokuty', href: '/priplatky',   permKey: 'priplatky'},
    { id: 'blacklist',icon: blacklistIcon(), title: 'Blacklist',          href: '/blacklist',   permKey: 'blacklist'},
    { id: 'admin',    icon: '👥',           title: 'Správa uživatelů',   href: '/admin',       permKey: 'admin', adminOnly: true }
  ];

  // ── Build a card element ──────────────────────────────────────────────────
  function makeCard(c) {
    const el = document.createElement('div');
    el.className = 'card' + (c.href ? '' : ' disabled');
    el.dataset.appId = c.id;
    el.innerHTML = `
      <div class="card-icon">${c.icon}</div>
      <div class="card-title">${c.title}</div>
      ${!c.href ? '<span class="badge-soon">Připravuje se</span>' : ''}
    `;
    if (c.href) {
      el.addEventListener('click', () => loadApp(c.href));
    } else {
      // Disabled cards: block click but allow drag (pointer-events kept on for SortableJS)
      el.addEventListener('click', e => e.preventDefault());
    }
    return el;
  }

  // ── Load app into iframe ──────────────────────────────────────────────────
  function loadApp(url) {
    const frame = document.getElementById('app-frame');
    const cardsView = document.getElementById('cards-view');
    const btnHome = document.getElementById('btn-home');
    const loading = document.getElementById('app-loading');

    cardsView.style.display = 'none';
    btnHome.classList.add('visible');
    loading.classList.add('visible');
    frame.classList.remove('visible');

    frame.onload = function() {
      loading.classList.remove('visible');
      frame.classList.add('visible');
    };
    frame.src = url;
    // Use hash so F5 always reloads /portal (not the sub-app URL directly)
    history.pushState({ app: url }, '', '/portal#' + url.replace(/^\//, ''));
  }

  // ── Return to home / card grid ────────────────────────────────────────────
  function goHome() {
    const frame = document.getElementById('app-frame');
    const cardsView = document.getElementById('cards-view');
    const btnHome = document.getElementById('btn-home');
    const loading = document.getElementById('app-loading');

    frame.onload = null;
    frame.src = 'about:blank';
    frame.classList.remove('visible');
    loading.classList.remove('visible');
    cardsView.style.display = '';
    btnHome.classList.remove('visible');

    history.pushState({}, '', '/portal');
  }

  // Handle browser back/forward
  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.app) {
      loadApp(e.state.app);
    } else {
      const frame = document.getElementById('app-frame');
      const cardsView = document.getElementById('cards-view');
      const btnHome = document.getElementById('btn-home');
      const loading = document.getElementById('app-loading');
      frame.onload = null;
      frame.src = 'about:blank';
      frame.classList.remove('visible');
      if (loading) loading.classList.remove('visible');
      cardsView.style.display = '';
      btnHome.classList.remove('visible');
    }
  });

  // ── Init: fetch user + permissions + app order, render cards ────────────
  (async () => {
    const [user, perms, orderData] = await Promise.all([
      fetch('/api/me').then(r => r.json()).catch(() => null),
      fetch('/api/my-permissions').then(r => r.json()).catch(() => null),
      fetch('/api/user-prefs/app-order').then(r => r.json()).catch(() => null)
    ]);
    if (!user) return;

    document.getElementById('user-label').textContent = user.username;
    document.getElementById('greet-name').textContent = user.name;
    const isAdmin = user.role === 'admin';

    // Určení pořadí karet (uložené nebo výchozí)
    const savedOrder = orderData?.order || [];
    let cards = [...ALL_CARDS];
    if (savedOrder.length) {
      cards.sort((a, b) => {
        const ai = savedOrder.indexOf(a.id);
        const bi = savedOrder.indexOf(b.id);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    }

    // Vykreslit karty do jednotného gridu s ohledem na oprávnění
    const grid = document.getElementById('grid-all');
    cards.forEach(c => {
      if (c.adminOnly && !isAdmin) return; // Admin-only → skrýt
      // Zkontroluj viditelnost přes oprávnění
      if (perms && c.permKey && perms[c.permKey]) {
        if (perms[c.permKey].visible === false) return; // Skryto adminem
      }
      grid.appendChild(makeCard(c));
    });

    // ── Drag-and-drop (SortableJS) ──────────────────────────────────────
    if (typeof Sortable !== 'undefined') {
      Sortable.create(grid, {
        animation: 150,
        delay: 200,          // dlouhý stisk pro dotykové ovládání
        delayOnTouchOnly: true,
        ghostClass: 'card-dragging',
        onEnd() {
          const order = [...grid.querySelectorAll('.card[data-app-id]')].map(c => c.dataset.appId);
          fetch('/api/user-prefs/app-order', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order })
          }).catch(() => {});
        }
      });
    }
  })();

  // ── Password change ───────────────────────────────────────────────────────
  function closePwModal() {
    document.getElementById('pw-overlay').classList.remove('show');
    ['pw-old', 'pw-new', 'pw-new2'].forEach(id => document.getElementById(id).value = '');
    const msg = document.getElementById('pw-msg');
    msg.textContent = '';
    msg.className = 'msg';
  }

  async function changePassword() {
    const old  = document.getElementById('pw-old').value;
    const n1   = document.getElementById('pw-new').value;
    const n2   = document.getElementById('pw-new2').value;
    const msg  = document.getElementById('pw-msg');
    if (n1 !== n2) { msg.className = 'msg err'; msg.textContent = 'Nová hesla se neshodují.'; return; }
    const r    = await fetch('/api/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldPassword: old, newPassword: n1 })
    });
    const data = await r.json();
    msg.className = 'msg ' + (data.ok ? 'ok' : 'err');
    msg.textContent = data.msg;
    if (data.ok) setTimeout(closePwModal, 1500);
  }

  document.getElementById('pw-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('pw-overlay')) closePwModal();
  });

  // Otevřít modál změny hesla (přes hamburger menu i desktop tlačítko)
  function openPwModal() {
    closeMobileMenu();
    document.getElementById('pw-overlay').classList.add('show');
  }
  // Přepsat onclick původního tlačítka
  document.getElementById('btn-pw-change').onclick = openPwModal;

  // ── Mobilní hamburger menu ─────────────────────────────────────────
  function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    if (menu.classList.contains('open')) closeMobileMenu();
    else openMobileMenu();
  }

  function openMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.add('open');
    menu.setAttribute('aria-hidden', 'false');
    // Aktualizovat jméno uživatele v menu
    const username = document.getElementById('user-label').textContent;
    const userEl = document.getElementById('mobile-menu-user');
    if (userEl && username) userEl.textContent = username;
  }

  function closeMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    menu.classList.remove('open');
    menu.setAttribute('aria-hidden', 'true');
  }

  // Zavřít menu kliknutím mimo
  document.addEventListener('click', function(e) {
    const menu = document.getElementById('mobile-menu');
    const btn  = document.getElementById('btn-hamburger');
    if (menu && menu.classList.contains('open') &&
        !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
      closeMobileMenu();
    }
  });

  // ── Auto-logout after 10 min inactivity ──────────────────────────────────
  // Activity is shared across ALL browser windows/tabs via localStorage,
  // so moving the mouse on another monitor (another window of the same
  // browser) also counts as activity and resets the timer here.
  (function() {
    const IDLE_MS   = 10 * 60 * 1000;
    const LS_KEY    = 'ave-last-activity';
    let idleTimer;

    function resetIdle() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { window.location.href = '/logout'; }, IDLE_MS);
    }

    function signalActivity() {
      // Write timestamp so other windows/tabs pick it up via storage event
      try { localStorage.setItem(LS_KEY, Date.now()); } catch(e) {}
      resetIdle();
    }

    // Listen for activity signals from other windows / monitors
    window.addEventListener('storage', function(e) {
      if (e.key === LS_KEY) resetIdle();
    });

    // This window's own events
    document.addEventListener('mousemove',  signalActivity, true);
    document.addEventListener('keydown',    signalActivity, true);
    document.addEventListener('click',      signalActivity, true);
    document.addEventListener('touchstart', signalActivity, true);

    // Also track activity inside the iframe
    const frame = document.getElementById('app-frame');
    if (frame) {
      frame.addEventListener('load', function() {
        try {
          const d = frame.contentDocument || frame.contentWindow.document;
          d.addEventListener('mousemove',  signalActivity, true);
          d.addEventListener('keydown',    signalActivity, true);
          d.addEventListener('click',      signalActivity, true);
        } catch(e) {}
      });
    }

    // Start the timer
    resetIdle();
  })();

  // ── ZPRÁVY PRO UŽIVATELE ──────────────────────────────────────────────────
  let _currentUserId = null;
  let _currentUserRole = null;
  let _groupsList = [];
  let _usersList = [];

  function formatMsgDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return d.toLocaleDateString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
           ' ' + d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
  }

  function renderMessage(msg, isAuthorOrAdmin) {
    const editBtn = isAuthorOrAdmin
      ? `<button class="msg-btn" style="border:1px solid #5b8de8;background:#eef2ff;color:#1a3a9a;" onclick="openEditMsg(${msg.id})">✏ Upravit</button>`
      : '';
    const deleteBtn = isAuthorOrAdmin
      ? `<button class="msg-btn msg-btn-delete" onclick="deleteMsg(${msg.id})">🗑</button>`
      : '';
    return `<div class="msg-card" id="msgcard-${msg.id}">
      <div class="msg-header">
        <span class="msg-author">${esc(msg.author_name)}</span>
        <span class="msg-date">${formatMsgDate(msg.created_at)}</span>
      </div>
      <div class="msg-content">${msg.content}</div>
      <div class="msg-actions">
        <button class="msg-btn msg-btn-hide" onclick="dismissMsg(${msg.id})">Skrýt</button>
        ${editBtn}
        ${deleteBtn}
      </div>
    </div>`;
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  async function loadMessages() {
    try {
      const data = await fetch('/api/messages').then(r => r.json());
      const section = document.getElementById('messages-section');
      const list = document.getElementById('messages-list');
      const composeBtn = document.getElementById('btn-compose-topbar');

      if (data.canWrite) composeBtn.style.display = 'inline-flex';

      if (!data.messages || data.messages.length === 0) {
        list.innerHTML = '';
        section.style.display = 'none';
        return;
      }

      section.style.display = '';
      list.innerHTML = data.messages.map(msg => {
        const isAuthorOrAdmin = _currentUserRole === 'admin' || msg.author_id === _currentUserId;
        return renderMessage(msg, isAuthorOrAdmin);
      }).join('');
    } catch(e) {}
  }

  async function markRead(msgId, btn) {
    await fetch(`/api/messages/${msgId}/read`, { method: 'POST' });
    if (btn) btn.remove();
  }

  async function dismissMsg(msgId) {
    await fetch(`/api/messages/${msgId}/dismiss`, { method: 'POST' });
    const card = document.getElementById(`msgcard-${msgId}`);
    if (card) card.remove();
    // Hide section if no more messages
    const list = document.getElementById('messages-list');
    if (!list.children.length) {
      document.getElementById('messages-section').style.display = 'none';
    }
  }

  async function deleteMsg(msgId) {
    if (!confirm('Smazat tuto zprávu pro všechny uživatele?')) return;
    await fetch(`/api/messages/${msgId}`, { method: 'DELETE' });
    await loadMessages();
  }

  // ── Compose modal ──────────────────────────────────────────────────────────
  function composeCmd(cmd) {
    document.getElementById('compose-content').focus();
    document.execCommand(cmd, false, null);
  }

  let _editingMsgId = null; // null = nová zpráva, number = editace existující

  async function openComposeModal() {
    _editingMsgId = null;
    document.querySelector('#compose-modal h3').textContent = '✉ Napsat zprávu uživatelům';
    document.getElementById('compose-content').innerHTML = '';
    document.getElementById('compose-target-type').value = 'all';
    document.getElementById('compose-targets').innerHTML = '';
    document.getElementById('compose-expires').value = '';
    document.getElementById('compose-overlay').classList.add('show');
    await _loadComposePickers();
  }

  async function openEditMsg(msgId) {
    // Fetch message data
    const data = await fetch('/api/messages').then(r => r.json()).catch(() => null);
    const msg = data?.messages?.find(m => m.id === msgId);
    if (!msg) { alert('Zpráva nenalezena.'); return; }

    _editingMsgId = msgId;
    document.querySelector('#compose-modal h3').textContent = '✏ Upravit zprávu';
    document.getElementById('compose-content').innerHTML = msg.content;
    document.getElementById('compose-expires').value = msg.expires_at ? msg.expires_at.substring(0, 10) : '';
    document.getElementById('compose-overlay').classList.add('show');
    await _loadComposePickers();

    // Nastav typ příjemců a checkboxy
    const tt = document.getElementById('compose-target-type');
    tt.value = msg.target_type || 'all';
    updateTargetPicker();
    const ids = JSON.parse(msg.target_ids || '[]').map(String);
    document.querySelectorAll('#compose-targets input[type=checkbox]').forEach(cb => {
      cb.checked = ids.includes(String(cb.value));
    });
  }

  async function _loadComposePickers() {
    if (!_groupsList.length) {
      _groupsList = await fetch('/api/groups-list').then(r => r.json()).catch(() => []);
    }
    if (!_usersList.length) {
      _usersList = await fetch('/api/users-list').then(r => r.json()).catch(() => []);
    }
  }

  function closeComposeModal() {
    document.getElementById('compose-overlay').classList.remove('show');
    _editingMsgId = null;
  }

  function updateTargetPicker() {
    const type = document.getElementById('compose-target-type').value;
    const container = document.getElementById('compose-targets');
    container.innerHTML = '';
    if (type === 'groups') {
      _groupsList.forEach(g => {
        container.innerHTML += `<label class="compose-target-cb">
          <input type="checkbox" value="${esc(g.name)}"> ${esc(g.display_name)}
        </label>`;
      });
    } else if (type === 'users') {
      _usersList.forEach(u => {
        container.innerHTML += `<label class="compose-target-cb">
          <input type="checkbox" value="${u.id}"> ${esc(u.name)} (${esc(u.username)})
        </label>`;
      });
    }
  }

  async function sendMessage() {
    const content = document.getElementById('compose-content').innerHTML.trim();
    if (!content) { alert('Zadej text zprávy.'); return; }

    const targetType = document.getElementById('compose-target-type').value;
    const targetIds = [...document.querySelectorAll('#compose-targets input:checked')].map(cb => cb.value);
    const expires = document.getElementById('compose-expires').value || null;
    const payload = { content, target_type: targetType, target_ids: targetIds, expires_at: expires };

    const isEdit = _editingMsgId != null;
    const url = isEdit ? `/api/messages/${_editingMsgId}` : '/api/messages';
    const method = isEdit ? 'PUT' : 'POST';

    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await r.json();
    if (data.ok) {
      closeComposeModal();
      await loadMessages();
    } else {
      alert(data.msg || 'Chyba při odesílání.');
    }
  }

  // Close compose overlay on backdrop click
  document.getElementById('compose-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeComposeModal();
  });

  // Načti zprávy po načtení stránky
  fetch('/api/me').then(r => r.json()).then(user => {
    _currentUserId = user.id;
    _currentUserRole = user.role;
    loadMessages();
  }).catch(() => {});
</script>
</body>
</html>
