<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AVE VR</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<script src="/static/theme.js"></script>
<link rel="stylesheet" href="/static/theme.css">
<style>
/* Blacklist-specific aliases for shared accent vars */
:root {
  --accent-primary:   var(--accent);
  --accent-primary-h: var(--accent-h);
}


* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background .25s, color .25s;
}

/* ── Topbar ── */
#topbar {
  background: var(--bg-topbar);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  height: 48px;
  border-bottom: 1px solid #000;
  flex-shrink: 0;
  flex-wrap: wrap;
}
#topbar-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-topbar);
  margin-right: 10px;
  white-space: nowrap;
  letter-spacing: .04em;
}
.btn-top {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid var(--btn-top-border);
  background: transparent;
  color: var(--btn-top-color);
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  white-space: nowrap;
}
.btn-top:hover { background: var(--btn-top-hover-bg); color: #fff; border-color: #666; }
.btn-top.danger { border-color: #6b2a2a; color: #e07070; }
.btn-top.danger:hover { background: #4a1a1a; color: #ff9999; border-color: #c0392b; }
.btn-top.primary { border-color: #2e5a2e; color: #6fbf6f; }
.btn-top.primary:hover { background: #1e3e1e; color: #90e090; border-color: #4caf50; }


/* ── Main content ── */
#main-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom, 20px));
  transition: background .25s;
}
/* Extra spacer pro iOS home indicator */
#main-content::after {
  content: '';
  display: block;
  height: max(60px, env(safe-area-inset-bottom, 60px));
}

/* ── Email selection modal ── */
#email-select-list {
  max-height: 320px;
  overflow-y: auto;
  border: 1px solid #e0e0dc;
  border-radius: 6px;
  background: #fff;
  margin-bottom: 12px;
}
.email-select-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid #f0f0ec;
  cursor: pointer;
  user-select: none;
}
.email-select-row:last-child { border-bottom: none; }
.email-select-row:hover { background: #f8f8f5; }
.email-select-row input[type=checkbox] { flex-shrink: 0; margin-top: 3px; cursor: pointer; }
.email-select-info { flex: 1; min-width: 0; }
.email-select-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.email-select-meta { font-size: 11px; color: #888; margin-top: 2px; word-break: break-word; }
.email-select-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.email-select-actions button {
  padding: 3px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: transparent;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  color: #555;
}
.email-select-actions button:hover { background: #f0f0f0; }

/* ── Controls bar (sticky above scroll area) ── */
#controls-bar {
  flex-shrink: 0;
  background: var(--bg-controls);
  border-bottom: 1px solid var(--bg-controls-border);
  padding: 10px 18px 8px;
  transition: background .25s;
}
#controls-bar.hidden { display: none; }
#search-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
#hotel-filter-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.hotel-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing:.05em; }
#letter-filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 8px;
}
/* Písmena – stejná šířka pro rovnoměrnou mřížku */
.letter-btn {
  min-width: 34px;
  padding: 3px 6px !important;
  text-align: center;
}
.hotel-btn {
  padding: 3px 11px;
  font-size: 11px;
  font-family: inherit;
  border: 1px solid var(--hotel-btn-border);
  border-radius: 12px;
  background: var(--hotel-btn-bg);
  cursor: pointer;
  color: var(--hotel-btn-color);
  transition: all .15s;
}
.hotel-btn:hover { background: var(--thead-bg); border-color: var(--thead-bg); color: var(--thead-text); }
.hotel-btn.active { background: var(--hotel-btn-active-bg); border-color: var(--hotel-btn-active-border); color: var(--hotel-btn-active-color); font-weight: 600; }
#search {
  flex: 1;
  max-width: 380px;
  padding: 7px 12px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s, background .25s;
}
#search:focus { border-color: var(--accent-primary); }
#count-badge {
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ── Table ── */
#bl-table-wrap {
  overflow-x: auto;
  border-radius: 8px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
#bl-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  font-size: 12.5px;
  min-width: 800px;
  transition: background .25s;
}
#bl-table thead tr th {
  background: var(--thead-bg);
  color: var(--thead-text);
  font-weight: 600;
  padding: 8px 10px;
  text-align: left;
  border: 1px solid var(--thead-border);
  white-space: nowrap;
  font-size: 11.5px;
  letter-spacing: .03em;
  text-transform: uppercase;
}
#bl-table thead th.sortable { cursor: pointer; user-select: none; }
#bl-table thead th.sortable:hover { background: var(--thead-hover); }
#bl-table thead th.sort-active { background: var(--thead-active); }
.sort-arrow { display: inline-block; width: 10px; font-size: 9px; opacity: .4; }
th.sort-active .sort-arrow { opacity: 1; }
td.col-edit { width: 68px; text-align: center; padding: 4px; display: flex; gap: 4px; justify-content: center; align-items: center; }
.btn-edit-row {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 4px;
  width: 26px; height: 26px;
  cursor: pointer;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: auto;
  transition: all .15s;
}
.btn-edit-row:hover { background: var(--thead-bg); border-color: var(--thead-bg); color: var(--thead-text); }
.btn-del-row {
  background: none;
  border: 1px solid #c0392b;
  color: #c0392b;
  border-radius: 4px;
  width: 26px; height: 26px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.btn-del-row:hover { background: #c0392b; border-color: #c0392b; color: #fff; }
.btn-restore-hist {
  background: none;
  border: 1px solid #1a7a1a;
  color: #1a7a1a;
  border-radius: 4px;
  width: 26px; height: 26px;
  cursor: pointer;
  font-size: 13px;
  display: inline-flex; align-items: center; justify-content: center;
  transition: all .15s;
}
/* Obálka pro tlačítka ↩ a × v historii — zajistí mezeru na všech zařízeních */
.hist-action-btns {
  display: flex;
  gap: 8px;
  align-items: center;
  justify-content: center;
}
.btn-restore-hist:hover { background: #1a7a1a; color: #fff; }
.badge-action.EDIT { background: #fff3cd; color: #856404; border: 1px solid #ffc107; }
#history-table tbody tr.hist-selected { background: rgba(192,57,43,.12); }
#history-table tbody tr.hist-selected:hover { background: rgba(192,57,43,.18); }
#bl-table tbody tr {
  border-bottom: 1px solid var(--row-border);
  transition: background .1s;
}
#bl-table tbody tr:hover { background: var(--row-hover); }
#bl-table td {
  padding: 6px 10px;
  vertical-align: top;
  border: 1px solid var(--row-border);
  line-height: 1.4;
  color: var(--text);
}
#bl-table td.col-reason {
  max-width: 360px;
  word-break: break-word;
}
#empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-muted);
  font-size: 14px;
}

/* ── Footer info ── */
#footer-info {
  margin-top: 14px;
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
}

/* ── History view ── */
#history-view {
  display: none;
}
#history-view.show { display: block; }
#main-content.history-mode #list-view { display: none; }
#main-content.history-mode #history-view { display: block; }

.history-filters {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.history-filters label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.history-filters select,
.history-filters input {
  padding: 5px 10px;
  border: 1px solid var(--input-border);
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
}
#history-table-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
#history-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  font-size: 12px;
  min-width: 700px;
}
#history-table thead th {
  background: var(--thead-bg);
  color: var(--thead-text);
  font-weight: 600;
  padding: 7px 10px;
  text-align: left;
  border: 1px solid var(--thead-border);
  white-space: nowrap;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .03em;
}
#history-table tbody tr { border-bottom: 1px solid var(--row-border); }
#history-table tbody tr:hover { background: var(--row-hover); }
#history-table td {
  padding: 6px 10px;
  vertical-align: top;
  border: 1px solid var(--row-border);
  line-height: 1.4;
  color: var(--text);
}
.btn-hist-del {
  background: none;
  border: 1px solid #c0392b;
  color: #c0392b;
  border-radius: 4px;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  transition: all .15s;
}
.btn-hist-del:hover { background: #c0392b; color: #fff; }
/* Oprávnění: skryj mazání z historie */
body.no-hist-delete .btn-hist-del { display: none !important; }
body.no-hist-delete #btn-hist-del-sel { display: none !important; }
.badge-action {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.badge-action.ADD    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.badge-action.REMOVE { background: #fdecea; color: #b71c1c; border: 1px solid #ef9a9a; }
.badge-action.EDIT_INTRO { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

/* ── Modals ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  z-index: 1000;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
}
.overlay.show { display: flex; }
.modal {
  background: var(--modal-bg);
  border-radius: 10px;
  padding: 24px;
  width: 100%;
  max-width: 560px;
  box-shadow: var(--modal-shadow);
  position: relative;
  transition: background .25s;
}
.modal-lg { max-width: 720px; }
.modal h2 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
}
.modal label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input[type="text"],
.modal input[type="date"],
.modal textarea,
.modal select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s, background .25s;
}
.modal input:focus,
.modal textarea:focus { border-color: var(--accent-primary); }
.modal textarea { resize: vertical; min-height: 70px; }
.modal-btns {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 7px 18px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.btn-cancel:hover { background: var(--surface-alt, var(--bg-controls)); color: var(--text); }
.btn-save {
  padding: 7px 18px;
  border: 1px solid #2e5a2e;
  border-radius: 6px;
  background: #2e5a2e;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  font-weight: 600;
}
.btn-save:hover { background: #1e3e1e; }
.btn-del-red {
  padding: 7px 18px;
  border: 1px solid #c0392b;
  border-radius: 6px;
  background: #c0392b;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  font-weight: 600;
}
.btn-del-red:hover { background: #922b21; }

/* ── Person form block ── */
.person-block {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 12px;
  position: relative;
  transition: background .25s;
}
.person-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.person-block-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .07em;
}
.btn-remove-block {
  background: none;
  border: none;
  color: #c0392b;
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
  line-height: 1;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row.three { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; }
.form-field label { margin-top: 0; margin-bottom: 4px; }
.warning-dup {
  font-size: 11px;
  color: #b25900;
  background: #fff8ee;
  border: 1px solid #f0c060;
  border-radius: 4px;
  padding: 5px 9px;
  margin-top: 6px;
  display: none;
}
.btn-add-more {
  padding: 7px 14px;
  border: 1px dashed #999;
  border-radius: 6px;
  background: transparent;
  color: #555;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  width: 100%;
  transition: all .15s;
  margin-top: 4px;
}
.btn-add-more:hover { background: #f0f0f0; border-style: solid; }

/* ── Removal reasons blocks ── */
.removal-block {
  background: var(--removal-bg);
  border: 1px solid var(--removal-border);
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.removal-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

/* ── Rich text editor ── */
#rte-toolbar {
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  background: var(--card-bg);
  border: 1px solid var(--input-border);
  border-bottom: none;
  border-radius: 6px 6px 0 0;
}
.rte-btn {
  padding: 3px 9px;
  border: 1px solid var(--input-border);
  border-radius: 4px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  min-width: 28px;
  text-align: center;
}
.rte-btn:hover { background: var(--bg-controls); }
.rte-btn b { font-weight: 900; }
#rte-body {
  min-height: 140px;
  border: 1px solid var(--input-border);
  border-radius: 0 0 6px 6px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  outline: none;
  line-height: 1.55;
  background: var(--input-bg);
  color: var(--text);
}
#rte-body:focus { border-color: var(--accent-primary); }

/* ── Email preview ── */
#email-preview-wrap {
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: #FAFAF8;
  padding: 14px 16px;
  font-size: 12px;
  max-height: 340px;
  overflow-y: auto;
  margin-bottom: 12px;
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1a3a1a;
  color: #90e090;
  border: 1px solid #2e6e2e;
  border-radius: 8px;
  padding: 10px 18px;
  font-size: 13px;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.error { background: #3a1a1a; color: #e09090; border-color: #6e2e2e; }

/* ── Spinner ── */
.spinner-small {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid #ccc;
  border-top-color: #555;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Hamburger tlačítko blacklistu (skryté na desktopu) ── */
#bl-hamburger {
  display: none;
  padding: 4px 10px;
  border-radius: 5px;
  border: 1px solid var(--btn-top-border);
  background: transparent;
  color: var(--btn-top-color);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  font-family: inherit;
  transition: all .15s;
  margin-left: auto;
}
#bl-hamburger:hover { background: var(--btn-top-hover-bg); color: #fff; }

/* ── Mobilní slide-down menu blacklistu ── */
#bl-mobile-menu {
  display: none;
  flex-direction: column;
  background: var(--bg-topbar);
  border-bottom: 2px solid rgba(0,0,0,.5);
  box-shadow: 0 6px 20px rgba(0,0,0,.3);
  flex-shrink: 0;
}
#bl-mobile-menu.open { display: flex; }
.bl-mob-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,.05);
  color: var(--text-topbar);
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s;
}
.bl-mob-btn:last-child { border-bottom: none; }
.bl-mob-btn:hover { background: rgba(255,255,255,.08); }

/* ── Mobilní responzivita blacklistu ── */
@media (max-width: 640px) {

  /* Topbar: auto výška, bez wrappování */
  #topbar {
    height: auto;
    min-height: 48px;
    flex-wrap: nowrap;
    padding: 8px 12px;
    gap: 6px;
  }
  #topbar-title { font-size: 13px; flex-shrink: 0; }

  /* Schovat méně důležité akce do menu */
  #btn-pdf, #btn-email, #btn-intro, #btn-history { display: none; }
  #bl-hamburger { display: flex; align-items: center; justify-content: center; }

  /* Primární tlačítko + přidat: prominentní */
  #btn-add { padding: 7px 14px; font-size: 12px; min-height: 36px; }

  /* Controls bar: search přes celou šířku */
  #controls-bar { padding: 10px 12px 8px; }
  #search-row { flex-direction: column; align-items: stretch; gap: 6px; }
  #search { max-width: 100%; font-size: 16px; min-height: 42px; }
  #count-badge { font-size: 11px; text-align: right; }

  /* Hotel filtry: větší dotyk (doplnění k theme.css) */
  #hotel-filter-row { gap: 4px; margin-top: 4px; }

  /* Tabulka: scroll + text trochu větší pro lepší čitelnost */
  #bl-table { font-size: 13px; }
  #bl-table td { padding: 8px 10px; }

  /* Tlačítka v řádcích tabulky: větší dotykový cíl */

    width: 36px !important;

    font-size: 15px !important;
  }

  /* Historie: filtry → sloupec */
  .history-filters { flex-direction: column; align-items: stretch; gap: 6px; }
  .history-filters .cdp-wrap { width: 100%; }
  .history-filters .cdp-text { font-size: 16px; }

  /* Personální bloky (add modal): padding */
  .person-block { padding: 12px 12px; }

  /* Date picker: zarovnat do šířky */
  .cdp-popup { width: calc(100vw - 40px); max-width: 300px; }

  /* Footer info */

}

/* ── Custom date picker ── */
.cdp-wrap { position: relative; display: block; width: 100%; }
.cdp-row { display: flex; align-items: center; width: 100%; }
.cdp-text {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid var(--input-border);
  border-right: none;
  border-radius: 6px 0 0 6px;
  font-size: 13px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  cursor: text;
  transition: border-color .15s, background .25s;
  width: 0;
}
.cdp-text:focus { border-color: var(--accent-primary); }
.cdp-icon-btn {
  padding: 0 10px;
  height: 36px;
  border: 1px solid var(--input-border);
  border-left: none;
  border-radius: 0 6px 6px 0;
  background: var(--card-bg);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center;
  transition: background .15s;
}
.cdp-icon-btn:hover { background: var(--bg-controls); }
.cdp-popup {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  z-index: 10000;
  background: var(--modal-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--modal-shadow);
  width: 264px;
  padding: 12px;
  user-select: none;
}
.cdp-popup.cdp-above { top: auto; bottom: calc(100% + 4px); }
.cdp-head { display: flex; gap: 6px; margin-bottom: 10px; }
.cdp-sel {
  flex: 1;
  padding: 5px 6px;
  border: 1px solid var(--input-border);
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
}
.cdp-sel:focus { border-color: var(--accent-primary); }
.cdp-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  margin-bottom: 4px;
}
.cdp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cdp-day {
  text-align: center;
  padding: 5px 2px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  transition: background .1s;
}
.cdp-day:hover:not(.cdp-empty):not(.cdp-disabled) { background: #e8f0fe; }
.cdp-day { color: var(--text); }
.cdp-day.cdp-selected { background: var(--accent-primary); color: #fff !important; font-weight: 600; }
.cdp-day.cdp-today:not(.cdp-selected) { font-weight: 700; color: var(--accent-primary); }
.cdp-day.cdp-other { color: var(--border); cursor: default; }
.cdp-day.cdp-empty { cursor: default; }
.cdp-foot { display: flex; justify-content: space-between; margin-top: 10px; }
.cdp-foot button {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid var(--input-border);
  background: var(--card-bg);
  color: var(--text);
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
}
.cdp-foot button:hover { background: var(--bg-controls); }
/* History filter date pickers - smaller */
.history-filters .cdp-wrap { width: 120px; }
.history-filters .cdp-text { padding: 5px 8px; font-size: 12px; }
.history-filters .cdp-icon-btn { height: 30px; font-size: 12px; }
</style>
</head>

<script>
// ── State ────────────────────────────────────────────────────────────────────

let entries  = [];
let filtered = [];
let auditLog = [];
let currentUser = null;
let sortKey = 'name';
let sortDir = 'asc';
let activeLetter = '';
let editingId = null;
let selectedHistory = new Set();

// ── Helpers ──────────────────────────────────────────────────────────────────

function formatDate(val) {
  if (!val) return '';
  const s = String(val);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[3]}.${m[2]}.${m[1]}`;
  return s;
}

function formatDatetime(val) {
  if (!val) return '';
  const d = new Date(val);
  if (isNaN(d)) return '';
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toISODate(val) {
  if (!val) return '';
  const s = String(val);
  const m1 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m1) return `${m1[1]}-${m1[2]}-${m1[3]}`;
  const m2 = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (m2) return `${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
  return '';
}

let toastTimer;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

function showOverlay(id) { document.getElementById(id).classList.add('show'); }
function hideOverlay(id) { document.getElementById(id).classList.remove('show'); }

// ── Fetch helpers ─────────────────────────────────────────────────────────────

async function apiFetch(url, opts) {
  const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok && !r.headers.get('content-type')?.includes('json')) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Load entries ──────────────────────────────────────────────────────────────

async function loadEntries() {
  const data = await apiFetch('/api/blacklist/entries');
  entries = data;
  renderLetterFilter();
  applyFilter();
  updateFooter();
}

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  filtered = entries.filter(e => {
    const matchQ = !q || [e.name, e.hotel, e.birth_date, e.damage, e.stay_date, e.reason, e.added_by]
      .some(v => String(v || '').toLowerCase().includes(q));
    const matchL = !activeLetter || (e.name || '').toUpperCase().startsWith(activeLetter);
    return matchQ && matchL;
  });
  renderTable();
}

function renderLetterFilter() {
  const letters = [...new Set(
    entries.map(e => (e.name || '').charAt(0).toUpperCase()).filter(Boolean)
  )].sort((a, b) => a.localeCompare(b, 'cs'));
  const row = document.getElementById('letter-filter-row');
  if (letters.length < 2) { row.innerHTML = ''; return; }
  row.innerHTML =
    `<button class="hotel-btn letter-btn${!activeLetter ? ' active' : ''}" onclick="setLetterFilter('')">Vše</button>` +
    letters.map(l => `<button class="hotel-btn letter-btn${activeLetter === l ? ' active' : ''}" onclick="setLetterFilter('${l}')">${l}</button>`).join('');
}

function setLetterFilter(l) {
  activeLetter = l;
  renderLetterFilter();
  applyFilter();
}

function renderTable() {
  const tbody = document.getElementById('bl-body');
  const badge = document.getElementById('count-badge');
  badge.textContent = `${filtered.length} záznamů${entries.length !== filtered.length ? ` z ${entries.length}` : ''}`;

  // Update sort arrows
  ['name','hotel','birth_date','stay_date'].forEach(k => {
    const th = document.querySelector(`th[data-sort="${k}"]`);
    const arrow = document.getElementById(`sa-${k}`);
    if (!th || !arrow) return;
    if (k === sortKey) {
      th.classList.add('sort-active');
      arrow.textContent = sortDir === 'asc' ? '▲' : '▼';
    } else {
      th.classList.remove('sort-active');
      arrow.textContent = '';
    }
  });

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;">
      ${entries.length === 0 ? 'Žádné osoby na blacklistu. Použijte <em>+ Přidat</em> pro první záznam.' : 'Žádné výsledky pro zadaný filtr.'}
    </td></tr>`;
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    let va = String(a[sortKey] || '').toLowerCase();
    let vb = String(b[sortKey] || '').toLowerCase();
    const cmp = va.localeCompare(vb, 'cs', { sensitivity: 'base' });
    return sortDir === 'asc' ? cmp : -cmp;
  });

  tbody.innerHTML = sorted.map(e => {
    return `<tr data-id="${escHtml(e.id)}">
      <td>${escHtml(e.name)}</td>
      <td>${escHtml(e.hotel || '')}</td>
      <td>${escHtml(formatDate(e.birth_date))}</td>
      <td>${escHtml(e.damage || '')}</td>
      <td>${escHtml(formatDate(e.stay_date))}</td>
      <td class="col-reason">${escHtml(e.reason)}</td>
      <td class="col-edit">
        <button class="btn-edit-row" onclick="openEditModal('${escHtml(e.id)}')" title="Upravit záznam">✎</button>
        <button class="btn-del-row" onclick="openRemoveModal('${escHtml(e.id)}')" title="Odebrat z blacklistu">×</button>
      </td>
    </tr>`;
  }).join('');
}

function updateFooter() {
  const now = new Date();
  const d = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const name = currentUser?.name || '';
  document.getElementById('footer-info').textContent =
    `${d}${name ? ' · ' + name : ''} · Celkem: ${entries.length} osob`;
}

// ── Load intro ────────────────────────────────────────────────────────────────

async function loadIntro() {
  const data = await apiFetch('/api/blacklist/intro');
  document.getElementById('intro-box').innerHTML = data.content || '';
}

// ── Add modal ─────────────────────────────────────────────────────────────────

let personCount = 0;

function createPersonBlock(num) {
  personCount++;
  const idx = personCount;
  const div = document.createElement('div');
  div.className = 'person-block';
  div.dataset.blockIdx = idx;
  div.innerHTML = `
    <div class="person-block-header">
      <span class="person-block-title">Osoba ${num}</span>
      ${num > 1 ? `<button class="btn-remove-block" title="Odstranit" onclick="removePersonBlock(this)">×</button>` : ''}
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Jméno *</label>
        <input type="text" class="f-name" placeholder="Příjmení Jméno" autocomplete="off">
      </div>
      <div class="form-field">
        <label>Hotel *</label>
        <input type="text" class="f-hotel" placeholder="A, T, I, A+I…" autocomplete="off">
      </div>
    </div>
    <div class="form-row three">
      <div class="form-field">
        <label>Datum narození</label>
        <input type="date" class="f-bdate">
      </div>
      <div class="form-field">
        <label>Škoda</label>
        <input type="text" class="f-damage" placeholder="1500 Kč, 2275 /2 os." autocomplete="off">
      </div>
      <div class="form-field">
        <label>Datum odjezdu</label>
        <input type="date" class="f-sdate">
      </div>
    </div>
    <label>Důvod zařazení *</label>
    <textarea class="f-reason" placeholder="Stručný popis incidentu…"></textarea>
    <div class="warning-dup"></div>
  `;
  // Duplicate check on name input
  const nameInp = div.querySelector('.f-name');
  const bdateInp = div.querySelector('.f-bdate');
  const dupWarn  = div.querySelector('.warning-dup');
  function checkDup() {
    const n = nameInp.value.trim().toLowerCase();
    const b = bdateInp.value;
    if (!n) { dupWarn.style.display = 'none'; return; }
    const dup = entries.find(e =>
      e.name.toLowerCase() === n && (!b || formatDate(e.birth_date) === formatDate(b))
    );
    if (dup) {
      dupWarn.textContent = `Upozornění: osoba "${dup.name}" je již na blacklistu. Přesto lze přidat.`;
      dupWarn.style.display = '';
    } else {
      dupWarn.style.display = 'none';
    }
  }
  nameInp.addEventListener('input', checkDup);
  bdateInp.addEventListener('change', checkDup);
  initDatePickers(div);
  return div;
}

function removePersonBlock(btn) {
  const block = btn.closest('.person-block');
  block.remove();
  // Renumber titles
  document.querySelectorAll('#person-blocks .person-block').forEach((b, i) => {
    b.querySelector('.person-block-title').textContent = `Osoba ${i + 1}`;
  });
}

function openAddModal() {
  personCount = 0;
  const container = document.getElementById('person-blocks');
  container.innerHTML = '';
  container.appendChild(createPersonBlock(1));
  showOverlay('overlay-add');

async function openHistory() {
  selectedHistory.clear();
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('history-view').style.display = 'block';
  document.getElementById('controls-bar').classList.add('hidden');
  document.getElementById('main-content').scrollTop = 0;
  const data = await apiFetch('/api/blacklist/audit');
  auditLog = data;
  renderHistory();
}

function renderHistory() {
  const action = document.getElementById('hist-filter-action').value;
  const from   = document.getElementById('hist-filter-from').value;
  const to     = document.getElementById('hist-filter-to').value;

  let rows = auditLog;
  if (action) rows = rows.filter(r => r.action === action);
  if (from)   rows = rows.filter(r => r.timestamp >= from);
  if (to)     rows = rows.filter(r => r.timestamp <= to + 'T23:59:59');

  const tbody = document.getElementById('hist-body');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:#888;">Žádné záznamy.</td></tr>`;
    const selAll = document.getElementById('hist-sel-all');
    if (selAll) selAll.checked = false;
    updateHistBtns();
    return;
  }

  const actionLabel = { ADD: 'Přidání', REMOVE: 'Odebrání', EDIT: 'Úprava záznamu', EDIT_INTRO: 'Úprava textu' };

  tbody.innerHTML = rows.map(r => {
    const p = r.payload;
    let detail = '';
    if (r.action === 'ADD') {
      const e = p.entry || p;
      detail = `<strong>${escHtml(e.name || '')}</strong><br><span style="color:#555;font-size:11px;">${escHtml((e.reason || '').substring(0, 120))}</span>`;
    } else if (r.action === 'REMOVE') {
      const e = p.entry || p;
      const name = e.original_name || e.name || '';
      const remR = p.removalReason || p.removal_reason || '';
      const origR = e.original_reason || e.reason || '';
      detail = `<strong>${escHtml(name)}</strong><br>
        <span style="color:#555;font-size:11px;">Původní důvod: ${escHtml(origR.substring(0, 80))}</span><br>
        <span style="color:#b71c1c;font-size:11px;">Důvod odebrání: ${escHtml(remR)}</span>`;
    } else if (r.action === 'EDIT') {
      const after = p.after || {};
      const before = p.before || {};
      detail = `<strong>${escHtml(after.name || before.name || '')}</strong><br><span style="color:#555;font-size:11px;">Upraven záznam</span>`;
    } else {
      detail = `<span style="color:#555;font-size:11px;">Upraven úvodní text</span>`;
    }
    const restoreBtn = r.action === 'REMOVE'
      ? `<button class="btn-restore-hist" onclick="restoreFromHistory('${escHtml(r.id)}')" title="Přidat zpět na blacklist">↩</button>`
      : '';
    const isSel = selectedHistory.has(r.id);
    return `<tr class="${isSel ? 'hist-selected' : ''}">
      <td style="width:30px;text-align:center;padding:4px;"><input type="checkbox" class="hist-cb" data-id="${escHtml(r.id)}" ${isSel ? 'checked' : ''} onchange="toggleHistSelect('${escHtml(r.id)}',this.checked)"></td>
      <td style="white-space:nowrap;">${escHtml(formatDatetime(r.timestamp))}</td>
      <td>${escHtml(r.user_name)}</td>
      <td><span class="badge-action ${r.action}">${actionLabel[r.action] || r.action}</span></td>
      <td>${detail}</td>
      <td style="padding:4px;text-align:center;"><div class="hist-action-btns">${restoreBtn}<button class="btn-hist-del" onclick="deleteHistoryEntry('${escHtml(r.id)}')" title="Smazat záznam">×</button></div></td>
    </tr>`;
  }).join('');

  // sync select-all checkbox
  const allIds = rows.map(r => r.id);
  const selAll = document.getElementById('hist-sel-all');
  if (selAll) selAll.checked = allIds.length > 0 && allIds.every(id => selectedHistory.has(id));
  updateHistBtns();
}

function toggleHistSelect(id, checked) {
  if (checked) selectedHistory.add(id);
  else selectedHistory.delete(id);
  const row = document.querySelector(`.hist-cb[data-id="${id}"]`)?.closest('tr');
  if (row) row.classList.toggle('hist-selected', checked);
  const allIds = [...document.querySelectorAll('.hist-cb')].map(cb => cb.dataset.id);
  const selAll = document.getElementById('hist-sel-all');
  if (selAll) selAll.checked = allIds.length > 0 && allIds.every(id => selectedHistory.has(id));
  updateHistBtns();
}

function updateHistBtns() {
  const delBtn     = document.getElementById('btn-hist-del-sel');
  const restoreBtn = document.getElementById('btn-hist-restore-sel');
  const n = selectedHistory.size;
  const restoreCount = [...selectedHistory].filter(id => auditLog.find(r => r.id === id)?.action === 'REMOVE').length;
  if (delBtn) {
    delBtn.style.display = n > 0 ? '' : 'none';
    delBtn.textContent = `Smazat vybrané (${n})`;
  }
  if (restoreBtn) {
    restoreBtn.style.display = restoreCount > 0 ? '' : 'none';
    restoreBtn.textContent = `Obnovit vybrané (${restoreCount})`;
  }
}

async function restoreSelectedHistory() {
  const toRestore = [...selectedHistory]
    .map(id => auditLog.find(r => r.id === id))
    .filter(r => r?.action === 'REMOVE');
  if (toRestore.length === 0) return;
  if (!confirm(`Přidat zpět na blacklist ${toRestore.length} ${toRestore.length === 1 ? 'osobu' : toRestore.length < 5 ? 'osoby' : 'osob'}?`)) return;
  let ok = 0, fail = 0;
  for (const rec of toRestore) {
    const p = rec.payload;
    const e = p.entry || p;
    const name   = e.original_name      || e.name       || '';
    const hotel  = e.original_hotel     || e.hotel      || '';
    const birth  = e.original_birth_date || e.birth_date || '';
    const damage = e.original_damage    || e.damage     || '';
    const stay   = e.original_stay_date  || e.stay_date  || '';
    const reason = e.original_reason    || e.reason     || '';
    if (!name || !reason) { fail++; continue; }
    try {
      const r = await apiFetch('/api/blacklist/entries', {
        method: 'POST',
        body: JSON.stringify({ entries: [{ name, hotel: hotel || null, birthDate: toISODate(birth) || null, damage: damage || null, stayDate: toISODate(stay) || null, reason }] })
      });
      if (r.ok) ok++; else fail++;
    } catch { fail++; }
  }
  await loadEntries();
  selectedHistory.clear();
  closeHistory();
  showToast(fail === 0 ? `Obnoveno ${ok} osob.` : `Obnoveno ${ok}, nepodařilo se ${fail}.`, fail > 0);
}

async function deleteSelectedHistory() {
  const ids = [...selectedHistory];
  if (ids.length === 0) return;
  if (!confirm(`Trvale smazat ${ids.length} ${ids.length === 1 ? 'záznam' : ids.length < 5 ? 'záznamy' : 'záznamů'} z historie?`)) return;
  try {
    const r = await apiFetch('/api/blacklist/audit/bulk', { method: 'DELETE', body: JSON.stringify({ ids }) });
    if (!r.ok) throw new Error(r.msg);
    auditLog = auditLog.filter(x => !selectedHistory.has(x.id));
    const deleted = r.deleted;
    selectedHistory.clear();
    renderHistory();
    showToast(`Smazáno ${deleted} záznamů.`);
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  }
}

async function deleteHistoryEntry(id) {
  if (!confirm('Smazat tento záznam z historie trvale?')) return;
  try {
    const r = await apiFetch(`/api/blacklist/audit/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(r.msg);
    auditLog = auditLog.filter(x => x.id !== id);
    renderHistory();
    showToast('Záznam smazán.');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  }
}

function closeHistory() {
  document.getElementById('history-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  document.getElementById('controls-bar').classList.remove('hidden');
  document.getElementById('main-content').scrollTop = 0;

async function exportPdf() {
  const btn = document.getElementById('btn-pdf');
  btn.disabled = true; btn.textContent = 'Generuji…';
  try {
    const r = await fetch('/api/blacklist/export/pdf');
    if (!r.ok) {
      let msg = 'Chyba při generování PDF.';
      try { const j = await r.json(); msg = j.msg || msg; } catch(e) {}
      showToast(msg, true); return;
    }
    const warning = r.headers.get('X-PDF-Warning');
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const pad2 = n => String(n).padStart(2,'0');
    a.download = `${now.getFullYear()}_${pad2(now.getMonth()+1)}_${pad2(now.getDate())}_BLACKLIST.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    if (warning) showToast('⚠ ' + warning, true);
    else showToast('PDF bylo vygenerováno.');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Export PDF';
  }
}

// ── Custom date picker ────────────────────────────────────────────────────────

(function() {
  const MONTHS = ['Leden','Únor','Březen','Duben','Květen','Červen',
                  'Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  const DOW = ['Po','Út','St','Čt','Pá','So','Ne'];
  let openPopup = null;

  function closeAll() {
    if (openPopup) { openPopup.style.display = 'none'; openPopup = null; }
  }
  document.addEventListener('mousedown', function(e) {
    if (openPopup && !openPopup.closest('.cdp-wrap').contains(e.target)) closeAll();
  });

  function attachPicker(input) {
    if (input._cdp) return;
    input._cdp = true;
    input.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = 'cdp-wrap';
    input.parentNode.insertBefore(wrap, input);
    wrap.appendChild(input);

    const row = document.createElement('div');
    row.className = 'cdp-row';
    row.innerHTML = `<input type="text" class="cdp-text" placeholder="dd.mm.rrrr">` +
                    `<button type="button" class="cdp-icon-btn" tabindex="-1">&#128197;</button>`;
    wrap.insertBefore(row, input);

    const dispInp = row.querySelector('.cdp-text');
    const iconBtn = row.querySelector('.cdp-icon-btn');

    const popup = document.createElement('div');
    popup.className = 'cdp-popup';
    popup.style.display = 'none';
    wrap.appendChild(popup);

    const today = new Date();
    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();

    function getValue() { return input.value; } // YYYY-MM-DD or ''

    function setValue(yyyy, mm, dd) {
      const str = `${yyyy}-${String(mm+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      input.value = str;
      dispInp.value = `${String(dd).padStart(2,'0')}.${String(mm+1).padStart(2,'0')}.${yyyy}`;
      input.dispatchEvent(new Event('change', { bubbles: true }));
      closeAll();
    }

    function clearValue() {
      input.value = '';
      dispInp.value = '';
      input.dispatchEvent(new Event('change', { bubbles: true }));
      closeAll();
    }

    function buildYearOptions() {
      let html = '';
      const startY = today.getFullYear() - 100, endY = today.getFullYear() + 5;
      for (let y = endY; y >= startY; y--)
        html += `<option value="${y}"${y === viewYear ? ' selected' : ''}>${y}</option>`;
      return html;
    }

    function renderPopup() {
      const selVal = getValue();
      let selY = 0, selM = 0, selD = 0;
      if (selVal) { const p = selVal.split('-'); selY=+p[0]; selM=+p[1]-1; selD=+p[2]; }

      const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
      const offset   = (firstDay === 0) ? 6 : firstDay - 1; // Mon=0
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      let grid = '';
      for (let i = 0; i < offset; i++) grid += `<div class="cdp-day cdp-empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const isSel   = selY === viewYear && selM === viewMonth && selD === d;
        const isToday = today.getFullYear()===viewYear && today.getMonth()===viewMonth && today.getDate()===d;
        let cls = 'cdp-day';
        if (isSel)   cls += ' cdp-selected';
        if (isToday) cls += ' cdp-today';
        grid += `<div class="${cls}" data-d="${d}">${d}</div>`;
      }

      popup.innerHTML =
        `<div class="cdp-head">` +
          `<select class="cdp-sel cdp-sel-m">${MONTHS.map((n,i)=>`<option value="${i}"${i===viewMonth?' selected':''}>${n}</option>`).join('')}</select>` +
          `<select class="cdp-sel cdp-sel-y">${buildYearOptions()}</select>` +
        `</div>` +
        `<div class="cdp-dow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div>` +
        `<div class="cdp-grid">${grid}</div>` +
        `<div class="cdp-foot"><button class="cdp-btn-clear">Vymazat</button><button class="cdp-btn-today">Dnes</button></div>`;

      popup.querySelector('.cdp-sel-m').addEventListener('change', function() {
        viewMonth = +this.value; renderPopup();
      });
      popup.querySelector('.cdp-sel-y').addEventListener('change', function() {
        viewYear = +this.value; renderPopup();
      });
      popup.querySelector('.cdp-btn-clear').addEventListener('click', function(e) {
        e.stopPropagation(); clearValue();
      });
      popup.querySelector('.cdp-btn-today').addEventListener('click', function(e) {
        e.stopPropagation();
        viewYear = today.getFullYear(); viewMonth = today.getMonth();
        setValue(viewYear, viewMonth, today.getDate());
      });
      popup.querySelectorAll('.cdp-day[data-d]').forEach(el => {
        el.addEventListener('mousedown', function(e) {
          e.preventDefault(); e.stopPropagation();
          setValue(viewYear, viewMonth, +this.dataset.d);
        });
      });
    }

    function openPopupFn() {
      if (openPopup && openPopup !== popup) closeAll();
      const cur = getValue();
      if (cur) { const p = cur.split('-'); viewYear=+p[0]; viewMonth=+p[1]-1; }
      else { viewYear = today.getFullYear(); viewMonth = today.getMonth(); }
      renderPopup();
      popup.style.display = 'block';
      // flip above if not enough space below
      const rect = wrap.getBoundingClientRect();
      if (rect.bottom + 310 > window.innerHeight && rect.top > 310)
        popup.classList.add('cdp-above');
      else
        popup.classList.remove('cdp-above');
      openPopup = popup;
    }

    // Text field: manual typing — parse on blur
    dispInp.addEventListener('blur', function() {
      const val = this.value.trim();
      if (!val) { clearValue(); return; }
      // Accept dd.mm.yyyy or d.m.yyyy
      const m = val.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (m) {
        const d = +m[1], mo = +m[2] - 1, y = +m[3];
        if (mo >= 0 && mo <= 11 && d >= 1 && d <= 31 && y >= 1900) {
          viewYear = y; viewMonth = mo;
          setValue(y, mo, d);
          return;
        }
      }
      // Invalid — restore from native input
      if (input.value) {
        const p = input.value.split('-');
        this.value = `${p[2]}.${p[1]}.${p[0]}`;
      } else {
        this.value = '';
      }
    });
    // Prevent popup from closing when clicking inside text field
    dispInp.addEventListener('mousedown', function(e) { e.stopPropagation(); });
    iconBtn.addEventListener('mousedown', function(e) {
      e.preventDefault();
      if (popup.style.display !== 'none') { closeAll(); return; }
      openPopupFn();
    });

    // Reflect existing value on init
    if (input.value) {
      const p = input.value.split('-');
      if (p.length === 3)
        dispInp.value = `${p[2]}.${p[1]}.${p[0]}`;
    }
  }

  window.initDatePickers = function(root) {
    (root || document).querySelectorAll('input[type="date"]').forEach(inp => attachPicker(inp));
  };

  window.setCdpValue = function(nativeInput, isoValue) {
    nativeInput.value = isoValue || '';
    const wrap = nativeInput.closest('.cdp-wrap');
    if (!wrap) return;
    const disp = wrap.querySelector('.cdp-text');
    if (!disp) return;
    if (isoValue) {
      const p = isoValue.split('-');
      disp.value = p.length === 3 ? `${p[2]}.${p[1]}.${p[0]}` : '';
    } else {
      disp.value = '';
    }
  };
})();

// ── Sort ─────────────────────────────────────────────────────────────────────

document.querySelectorAll('#bl-table th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sort;
    if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortKey = key; sortDir = 'asc'; }
    renderTable();
  });
});

// ── Edit entry ────────────────────────────────────────────────────────────────

function openEditModal(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('edit-name').value   = e.name   || '';
  document.getElementById('edit-hotel').value  = e.hotel  || '';
  document.getElementById('edit-damage').value = e.damage || '';
  document.getElementById('edit-reason').value = e.reason || '';
  setCdpValue(document.getElementById('edit-bdate'), toISODate(e.birth_date));
  setCdpValue(document.getElementById('edit-sdate'), toISODate(e.stay_date));
  showOverlay('overlay-edit');
  document.getElementById('edit-name').focus();
}

async function submitEdit() {
  const name   = document.getElementById('edit-name').value.trim();
  const hotel  = document.getElementById('edit-hotel').value.trim();
  const bdate  = document.getElementById('edit-bdate').value;
  const damage = document.getElementById('edit-damage').value.trim();
  const sdate  = document.getElementById('edit-sdate').value;
  const reason = document.getElementById('edit-reason').value.trim();
  if (!name)   { document.getElementById('edit-name').style.borderColor   = '#c0392b'; return; }
  if (!reason) { document.getElementById('edit-reason').style.borderColor = '#c0392b'; return; }
  const btn = document.getElementById('btn-edit-submit');
  btn.disabled = true; btn.textContent = 'Ukládám…';
  try {
    const r = await apiFetch(`/api/blacklist/entries/${editingId}`, {
      method: 'PUT',
      body: JSON.stringify({ name, hotel: hotel || null, birthDate: bdate || null, damage: damage || null, stayDate: sdate || null, reason })
    });
    if (!r.ok) throw new Error(r.msg);
    hideOverlay('overlay-edit');
    await loadEntries();
    showToast('Záznam upraven.');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Uložit změny';
  }
}

// ── Restore from history ──────────────────────────────────────────────────────

async function restoreFromHistory(auditId) {
  const rec = auditLog.find(r => r.id === auditId);
  if (!rec) { showToast('Záznam nenalezen.', true); return; }
  const p = rec.payload;
  const e = p.entry || p;
  const name   = e.original_name      || e.name       || '';
  const hotel  = e.original_hotel     || e.hotel      || '';
  const birth  = e.original_birth_date || e.birth_date || '';
  const damage = e.original_damage    || e.damage     || '';
  const stay   = e.original_stay_date  || e.stay_date  || '';
  const reason = e.original_reason    || e.reason     || '';
  if (!name || !reason) { showToast('Nelze obnovit — chybí povinná data.', true); return; }
  if (!confirm(`Přidat „${name}" zpět na blacklist?`)) return;
  try {
    const r = await apiFetch('/api/blacklist/entries', {
      method: 'POST',
      body: JSON.stringify({ entries: [{ name, hotel: hotel || null, birthDate: toISODate(birth) || null, damage: damage || null, stayDate: toISODate(stay) || null, reason }] })
    });
    if (!r.ok) throw new Error(r.msg);
    await loadEntries();
    closeHistory();
    showToast(`${name} přidán/a zpět na blacklist.`);
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  }
}

// Theme toggle handled by /static/theme.js

// ── Mobilní hamburger menu ────────────────────────────────────────────────────
function toggleBlMenu() {
  const menu = document.getElementById('bl-mobile-menu');
  if (menu.classList.contains('open')) closeBlMenu();
  else { menu.classList.add('open'); }
}
function closeBlMenu() {
  document.getElementById('bl-mobile-menu').classList.remove('open');
}

// Mobilní menu — propojit akce s existujícími handlery
document.getElementById('bl-mob-pdf').addEventListener('click', function() { closeBlMenu(); exportPdf(); });
document.getElementById('bl-mob-email').addEventListener('click', function() { closeBlMenu(); exportEmail(); });
document.getElementById('bl-mob-intro').addEventListener('click', function() { closeBlMenu(); openIntroModal(); });
document.getElementById('bl-mob-history').addEventListener('click', function() { closeBlMenu(); openHistory(); });

// Zavřít menu kliknutím mimo
document.addEventListener('click', function(e) {
  const menu = document.getElementById('bl-mobile-menu');
  const btn  = document.getElementById('bl-hamburger');
  if (menu && menu.classList.contains('open') &&
      !menu.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    closeBlMenu();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const me = await fetch('/api/me').then(r => r.ok ? r.json() : null);
    currentUser = me;
  } catch(e) {}

  // ── Načti oprávnění a skryj zakázaná tlačítka ──
  try {
    const perms = await fetch('/api/my-permissions').then(r => r.json());
    const bl = perms?.blacklist;
    if (bl) {
      const btns = bl.buttons || {};
      // Upravit úvodní text
      if (btns.edit_intro === false) {
        ['btn-intro', 'bl-mob-intro'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });
      }
      // Mazání z historie
      if (btns.history_delete === false) {
        // Skryj "Smazat vybrané" tlačítko
        const delSelBtn = document.getElementById('btn-hist-del-sel');
        if (delSelBtn) delSelBtn.style.display = 'none';
        // Skryj individuální × tlačítka — použijeme CSS třídu na body
        document.body.classList.add('no-hist-delete');
      }
    }
  } catch(e) {}

  await loadEntries();
  initDatePickers(document);
  document.getElementById('main-content').scrollTop = 0;
}

init();
</script>
