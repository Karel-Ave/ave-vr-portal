<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blacklist – AVEhotels</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #e8e8e4;
  color: #1a1a1a;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Topbar ── */
#topbar {
  background: #1a1a1a;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  height: 48px;
  border-bottom: 1px solid #2e2e2e;
  flex-shrink: 0;
  flex-wrap: wrap;
}
#topbar-title {
  font-size: 13px;
  font-weight: 700;
  color: #e0e0e0;
  margin-right: 10px;
  white-space: nowrap;
}
.btn-top {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid #3a3a3a;
  background: transparent;
  color: #bbb;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  white-space: nowrap;
}
.btn-top:hover { background: #2e2e2e; color: #fff; border-color: #555; }
.btn-top.danger { border-color: #6b2a2a; color: #e07070; }
.btn-top.danger:hover { background: #4a1a1a; color: #ff9999; border-color: #c0392b; }
.btn-top.primary { border-color: #2e5a2e; color: #6fbf6f; }
.btn-top.primary:hover { background: #1e3e1e; color: #90e090; border-color: #4caf50; }

#remove-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 0 18px;
  height: 40px;
  background: #2a1a1a;
  border-bottom: 1px solid #5a2a2a;
  flex-shrink: 0;
}
#remove-bar.show { display: flex; }
#remove-count { font-size: 12px; color: #e08080; font-weight: 600; }
#remove-bar .spacer { flex: 1; }

/* ── Main content ── */
#main-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* ── Email selection modal ── */
#email-select-list {
  max-height: 320px;
  overflow-y: auto;
  border: 1px solid #e0e0dc;
  border-radius: 6px;
  background: #fff;
  margin-bottom: 12px;
}
.email-select-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 9px 12px;
  border-bottom: 1px solid #f0f0ec;
  cursor: pointer;
  user-select: none;
}
.email-select-row:last-child { border-bottom: none; }
.email-select-row:hover { background: #f8f8f5; }
.email-select-row input[type=checkbox] { flex-shrink: 0; margin-top: 3px; cursor: pointer; }
.email-select-info { flex: 1; min-width: 0; }
.email-select-name { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.email-select-meta { font-size: 11px; color: #888; margin-top: 2px; word-break: break-word; }
.email-select-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}
.email-select-actions button {
  padding: 3px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: transparent;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  color: #555;
}
.email-select-actions button:hover { background: #f0f0f0; }

/* ── Search ── */
#search-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
#search {
  flex: 1;
  max-width: 380px;
  padding: 7px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
  outline: none;
  transition: border-color .15s;
}
#search:focus { border-color: #888; }
#count-badge {
  font-size: 12px;
  color: #666;
  white-space: nowrap;
}

/* ── Table ── */
#bl-table-wrap {
  overflow-x: auto;
}
#bl-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  font-size: 12.5px;
  min-width: 800px;
}
#bl-table thead tr th {
  background: #A9D08E;
  color: #1a1a1a;
  font-weight: 700;
  padding: 7px 10px;
  text-align: left;
  border: 1px solid #8aaa70;
  white-space: nowrap;
  font-size: 12px;
}
#bl-table tbody tr {
  border-bottom: 1px solid #e8e8e4;
  transition: background .1s;
}
#bl-table tbody tr:hover { background: #f5f7f2; }
#bl-table tbody tr.selected { background: #fde8e8; }
#bl-table tbody tr.selected:hover { background: #fdd8d8; }
#bl-table td {
  padding: 6px 10px;
  vertical-align: top;
  border: 1px solid #e0e0dc;
  line-height: 1.4;
}
#bl-table td.col-reason {
  max-width: 360px;
  word-break: break-word;
}
td.col-remove {
  width: 36px;
  text-align: center;
  padding: 4px;
}
.btn-remove-row {
  background: none;
  border: 1px solid #c0392b;
  color: #c0392b;
  border-radius: 4px;
  width: 26px;
  height: 26px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  transition: all .15s;
}
.btn-remove-row:hover { background: #c0392b; color: #fff; }
.btn-remove-row.selected { background: #c0392b; color: #fff; }

#empty-state {
  text-align: center;
  padding: 48px 20px;
  color: #888;
  font-size: 14px;
}

/* ── Footer info ── */
#footer-info {
  margin-top: 14px;
  font-size: 11px;
  color: #888;
  text-align: right;
}

/* ── History view ── */
#history-view {
  display: none;
}
#history-view.show { display: block; }
#main-content.history-mode #list-view { display: none; }
#main-content.history-mode #history-view { display: block; }

.history-filters {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  align-items: center;
}
.history-filters label {
  font-size: 11px;
  color: #666;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.history-filters select,
.history-filters input {
  padding: 5px 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  background: #fff;
  outline: none;
}
#history-table-wrap { overflow-x: auto; }
#history-table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  font-size: 12px;
  min-width: 700px;
}
#history-table thead th {
  background: #2e2e2e;
  color: #e0e0e0;
  font-weight: 600;
  padding: 7px 10px;
  text-align: left;
  border: 1px solid #3e3e3e;
  white-space: nowrap;
}
#history-table tbody tr { border-bottom: 1px solid #e8e8e4; }
#history-table tbody tr:hover { background: #f5f5f5; }
#history-table td {
  padding: 6px 10px;
  vertical-align: top;
  border: 1px solid #e0e0dc;
  line-height: 1.4;
}
.btn-hist-del {
  background: none;
  border: 1px solid #c0392b;
  color: #c0392b;
  border-radius: 4px;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: auto;
  transition: all .15s;
}
.btn-hist-del:hover { background: #c0392b; color: #fff; }
.badge-action {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.badge-action.ADD    { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.badge-action.REMOVE { background: #fdecea; color: #b71c1c; border: 1px solid #ef9a9a; }
.badge-action.EDIT_INTRO { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }

/* ── Modals ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 1000;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px;
  overflow-y: auto;
}
.overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 10px;
  padding: 24px;
  width: 100%;
  max-width: 560px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  position: relative;
}
.modal-lg { max-width: 720px; }
.modal h2 {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 18px;
}
.modal label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  color: #666;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 4px;
  margin-top: 12px;
}
.modal label:first-of-type { margin-top: 0; }
.modal input[type="text"],
.modal input[type="date"],
.modal textarea,
.modal select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
  outline: none;
  transition: border-color .15s;
}
.modal input:focus,
.modal textarea:focus { border-color: #4a4a4a; }
.modal textarea { resize: vertical; min-height: 70px; }
.modal-btns {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
}
.btn-cancel {
  padding: 7px 18px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: transparent;
  color: #666;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.btn-cancel:hover { background: #f0f0f0; }
.btn-save {
  padding: 7px 18px;
  border: 1px solid #2e5a2e;
  border-radius: 6px;
  background: #2e5a2e;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  font-weight: 600;
}
.btn-save:hover { background: #1e3e1e; }
.btn-del-red {
  padding: 7px 18px;
  border: 1px solid #c0392b;
  border-radius: 6px;
  background: #c0392b;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
  font-weight: 600;
}
.btn-del-red:hover { background: #922b21; }

/* ── Person form block ── */
.person-block {
  background: #f8f8f8;
  border: 1px solid #e0e0dc;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 12px;
  position: relative;
}
.person-block-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.person-block-title {
  font-size: 11px;
  font-weight: 700;
  color: #666;
  text-transform: uppercase;
  letter-spacing: .07em;
}
.btn-remove-block {
  background: none;
  border: none;
  color: #c0392b;
  cursor: pointer;
  font-size: 16px;
  padding: 0 4px;
  line-height: 1;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-row.three { grid-template-columns: 1fr 1fr 1fr; }
.form-field { display: flex; flex-direction: column; }
.form-field label { margin-top: 0; margin-bottom: 4px; }
.warning-dup {
  font-size: 11px;
  color: #b25900;
  background: #fff8ee;
  border: 1px solid #f0c060;
  border-radius: 4px;
  padding: 5px 9px;
  margin-top: 6px;
  display: none;
}
.btn-add-more {
  padding: 7px 14px;
  border: 1px dashed #999;
  border-radius: 6px;
  background: transparent;
  color: #555;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  width: 100%;
  transition: all .15s;
  margin-top: 4px;
}
.btn-add-more:hover { background: #f0f0f0; border-style: solid; }

/* ── Removal reasons blocks ── */
.removal-block {
  background: #fff5f5;
  border: 1px solid #f0c0c0;
  border-radius: 8px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.removal-name {
  font-size: 13px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 8px;
}

/* ── Rich text editor ── */
#rte-toolbar {
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  background: #f0f0f0;
  border: 1px solid #ccc;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
}
.rte-btn {
  padding: 3px 9px;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #fff;
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  min-width: 28px;
  text-align: center;
}
.rte-btn:hover { background: #e8e8e8; }
.rte-btn b { font-weight: 900; }
#rte-body {
  min-height: 140px;
  border: 1px solid #ccc;
  border-radius: 0 0 6px 6px;
  padding: 10px 12px;
  font-size: 13px;
  font-family: 'Segoe UI', system-ui, sans-serif;
  outline: none;
  line-height: 1.55;
  background: #fff;
}
#rte-body:focus { border-color: #4a4a4a; }

/* ── Email preview ── */
#email-preview-wrap {
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fafafa;
  padding: 14px 16px;
  font-size: 12px;
  max-height: 340px;
  overflow-y: auto;
  margin-bottom: 12px;
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1a3a1a;
  color: #90e090;
  border: 1px solid #2e6e2e;
  border-radius: 8px;
  padding: 10px 18px;
  font-size: 13px;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .25s, transform .25s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.error { background: #3a1a1a; color: #e09090; border-color: #6e2e2e; }

/* ── Spinner ── */
.spinner-small {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid #ccc;
  border-top-color: #555;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Custom date picker ── */
.cdp-wrap { position: relative; display: block; width: 100%; }
.cdp-row { display: flex; align-items: center; width: 100%; }
.cdp-text {
  flex: 1;
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-right: none;
  border-radius: 6px 0 0 6px;
  font-size: 13px;
  font-family: inherit;
  background: #fff;
  outline: none;
  cursor: pointer;
  transition: border-color .15s;
  width: 0;
}
.cdp-text:focus { border-color: #888; }
.cdp-icon-btn {
  padding: 0 10px;
  height: 36px;
  border: 1px solid #ccc;
  border-left: none;
  border-radius: 0 6px 6px 0;
  background: #f5f5f5;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center;
  transition: background .15s;
}
.cdp-icon-btn:hover { background: #e8e8e8; }
.cdp-popup {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  z-index: 10000;
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 10px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  width: 264px;
  padding: 12px;
  user-select: none;
}
.cdp-popup.cdp-above { top: auto; bottom: calc(100% + 4px); }
.cdp-head { display: flex; gap: 6px; margin-bottom: 10px; }
.cdp-sel {
  flex: 1;
  padding: 5px 6px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 12px;
  font-family: inherit;
  background: #fff;
  cursor: pointer;
  outline: none;
}
.cdp-sel:focus { border-color: #888; }
.cdp-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  text-align: center;
  font-size: 11px;
  color: #999;
  font-weight: 600;
  margin-bottom: 4px;
}
.cdp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cdp-day {
  text-align: center;
  padding: 5px 2px;
  border-radius: 5px;
  font-size: 12px;
  cursor: pointer;
  transition: background .1s;
}
.cdp-day:hover:not(.cdp-empty):not(.cdp-disabled) { background: #e8f0fe; }
.cdp-day.cdp-selected { background: #1a56a4; color: #fff !important; font-weight: 600; }
.cdp-day.cdp-today:not(.cdp-selected) { font-weight: 700; color: #1a56a4; }
.cdp-day.cdp-other { color: #ccc; cursor: default; }
.cdp-day.cdp-empty { cursor: default; }
.cdp-foot { display: flex; justify-content: space-between; margin-top: 10px; }
.cdp-foot button {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid #ccc;
  background: #f5f5f5;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
}
.cdp-foot button:hover { background: #e8e8e8; }
/* History filter date pickers - smaller */
.history-filters .cdp-text { padding: 5px 8px; font-size: 12px; }
.history-filters .cdp-icon-btn { height: 30px; font-size: 12px; }
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <span id="topbar-title">🚫 Blacklist</span>
  <button class="btn-top primary" id="btn-add">+ Přidat</button>
  <button class="btn-top danger" id="btn-remove-mode">− Odebrat</button>
  <button class="btn-top" id="btn-pdf">Export PDF</button>
  <button class="btn-top" id="btn-email">Export e-mail</button>
  <button class="btn-top" id="btn-intro">Upravit text</button>
  <button class="btn-top" id="btn-history">Historie</button>
</div>

<!-- Remove mode bar -->
<div id="remove-bar">
  <span id="remove-count">Označeno: 0 osob</span>
  <div class="spacer"></div>
  <button class="btn-top danger" id="btn-remove-selected">Odebrat označené</button>
  <button class="btn-top" id="btn-remove-cancel">Zrušit</button>
</div>

<!-- Main content -->
<div id="main-content">

  <!-- List view -->
  <div id="list-view">
    <div id="search-row">
      <input id="search" placeholder="Hledat jméno, hotel, důvod…" autocomplete="off">
      <span id="count-badge"></span>
    </div>

    <div id="bl-table-wrap">
      <table id="bl-table">
        <thead>
          <tr>
            <th id="th-remove" style="display:none;width:36px;"></th>
            <th>Jméno</th>
            <th>Hotel</th>
            <th>Datum nar.</th>
            <th>Škoda</th>
            <th>Datum pobytu</th>
            <th>Důvod</th>
          </tr>
        </thead>
        <tbody id="bl-body">
          <tr><td colspan="7" id="empty-state">Načítám…</td></tr>
        </tbody>
      </table>
    </div>

    <div id="footer-info"></div>
  </div>

  <!-- History view -->
  <div id="history-view">
    <div class="history-filters">
      <label>Akce:</label>
      <select id="hist-filter-action">
        <option value="">Vše</option>
        <option value="ADD">Přidání</option>
        <option value="REMOVE">Odebrání</option>
        <option value="EDIT_INTRO">Úprava textu</option>
      </select>
      <label>Od:</label>
      <input type="date" id="hist-filter-from">
      <label>Do:</label>
      <input type="date" id="hist-filter-to">
      <button id="btn-hist-back" style="padding:5px 14px;border-radius:5px;border:1px solid #4a4a4a;background:#3a3a3a;color:#e0e0e0;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;">← Zpět na seznam</button>
    </div>

    <div id="history-table-wrap">
      <table id="history-table">
        <thead>
          <tr>
            <th>Datum a čas</th>
            <th>Uživatel</th>
            <th>Akce</th>
            <th>Detaily</th>
            <th style="width:36px;"></th>
          </tr>
        </thead>
        <tbody id="hist-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Modal: Přidat osobu/y -->
<div class="overlay" id="overlay-add">
  <div class="modal">
    <h2>Přidat osobu na blacklist</h2>
    <div id="person-blocks"></div>
    <button class="btn-add-more" id="btn-add-more">+ Přidat další osobu</button>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-add-cancel">Zrušit</button>
      <button class="btn-save" id="btn-add-submit">Přidat</button>
    </div>
  </div>
</div>

<!-- Modal: Důvody odebrání -->
<div class="overlay" id="overlay-remove">
  <div class="modal">
    <h2>Potvrdit odebrání</h2>
    <div id="removal-blocks"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-rem-cancel">Zrušit</button>
      <button class="btn-del-red" id="btn-rem-submit">Odebrat</button>
    </div>
  </div>
</div>

<!-- Modal: Upravit úvodní text -->
<div class="overlay" id="overlay-intro">
  <div class="modal modal-lg">
    <h2>Upravit úvodní text</h2>
    <div id="rte-toolbar">
      <button class="rte-btn" title="Tučné" onclick="execCmd('bold')"><b>B</b></button>
      <button class="rte-btn" title="Kurzíva" onclick="execCmd('italic')"><i>I</i></button>
      <button class="rte-btn" title="Podtržené" onclick="execCmd('underline')"><u>U</u></button>
    </div>
    <div id="rte-body" contenteditable="true"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-intro-cancel">Zrušit</button>
      <button class="btn-save" id="btn-intro-submit">Uložit</button>
    </div>
  </div>
</div>

<!-- Modal: Výběr změn pro e-mail -->
<div class="overlay" id="overlay-email-select">
  <div class="modal modal-lg">
    <h2>Výběr změn pro e-mail</h2>
    <p style="font-size:12px;color:#666;margin-bottom:10px;">Zaškrtněte změny, které chcete zahrnout do e-mailu:</p>
    <div class="email-select-actions">
      <button onclick="emailSelectAll(true)">Vybrat vše</button>
      <button onclick="emailSelectAll(false)">Zrušit výběr</button>
      <span id="email-select-count" style="font-size:11px;color:#888;margin-left:4px;"></span>
    </div>
    <div id="email-select-list"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-email-select-cancel">Zrušit</button>
      <button class="btn-save" id="btn-email-select-submit">Vygenerovat e-mail</button>
    </div>
  </div>
</div>

<!-- Modal: Export e-mail -->
<div class="overlay" id="overlay-email">
  <div class="modal modal-lg">
    <h2 id="email-modal-title">Export e-mailu</h2>
    <div id="email-preview-wrap"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="btn-email-close">Zavřít</button>
      <button class="btn-save" id="btn-email-copy">Kopírovat</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────

let entries  = [];     // active blacklist
let filtered = [];     // after search filter
let selected = new Set(); // IDs selected for removal
let removeMode = false;
let auditLog = [];
let currentUser = null;

// ── Helpers ──────────────────────────────────────────────────────────────────

function formatDate(val) {
  if (!val) return '';
  const s = String(val);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return `${m[3]}.${m[2]}.${m[1]}`;
  return s;
}

function formatDatetime(val) {
  if (!val) return '';
  const d = new Date(val);
  if (isNaN(d)) return '';
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

function showOverlay(id) { document.getElementById(id).classList.add('show'); }
function hideOverlay(id) { document.getElementById(id).classList.remove('show'); }

// ── Fetch helpers ─────────────────────────────────────────────────────────────

async function apiFetch(url, opts) {
  const r = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!r.ok && !r.headers.get('content-type')?.includes('json')) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Load entries ──────────────────────────────────────────────────────────────

async function loadEntries() {
  const data = await apiFetch('/api/blacklist/entries');
  entries = data;
  applyFilter();
  updateFooter();
}

function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) {
    filtered = [...entries];
  } else {
    filtered = entries.filter(e =>
      [e.name, e.hotel, e.birth_date, e.damage, e.stay_date, e.reason, e.added_by]
        .some(v => String(v || '').toLowerCase().includes(q))
    );
  }
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('bl-body');
  const badge = document.getElementById('count-badge');
  badge.textContent = `${filtered.length} záznamů${entries.length !== filtered.length ? ` z ${entries.length}` : ''}`;

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:40px;color:#888;">
      ${entries.length === 0 ? 'Žádné osoby na blacklistu. Použijte <em>+ Přidat</em> pro první záznam.' : 'Žádné výsledky pro zadaný filtr.'}
    </td></tr>`;
    return;
  }

  const thRemove = document.getElementById('th-remove');
  thRemove.style.display = removeMode ? '' : 'none';

  tbody.innerHTML = filtered.map(e => {
    const isSel = selected.has(e.id);
    return `<tr class="${isSel ? 'selected' : ''}" data-id="${escHtml(e.id)}">
      ${removeMode ? `<td class="col-remove"><button class="btn-remove-row${isSel ? ' selected' : ''}" onclick="toggleSelect('${escHtml(e.id)}')" title="Označit k odebrání">×</button></td>` : ''}
      <td>${escHtml(e.name)}</td>
      <td>${escHtml(e.hotel || '')}</td>
      <td>${escHtml(formatDate(e.birth_date))}</td>
      <td>${escHtml(e.damage || '')}</td>
      <td>${escHtml(formatDate(e.stay_date))}</td>
      <td class="col-reason">${escHtml(e.reason)}</td>
    </tr>`;
  }).join('');
}

function updateFooter() {
  const now = new Date();
  const d = `${String(now.getDate()).padStart(2,'0')}.${String(now.getMonth()+1).padStart(2,'0')}.${now.getFullYear()}`;
  const name = currentUser?.name || '';
  document.getElementById('footer-info').textContent =
    `${d}${name ? ' · ' + name : ''} · Celkem: ${entries.length} osob`;
}

// ── Load intro ────────────────────────────────────────────────────────────────

async function loadIntro() {
  const data = await apiFetch('/api/blacklist/intro');
  document.getElementById('intro-box').innerHTML = data.content || '';
}

// ── Remove mode ───────────────────────────────────────────────────────────────

function enterRemoveMode() {
  removeMode = true;
  selected.clear();
  document.getElementById('remove-bar').classList.add('show');
  document.getElementById('btn-remove-mode').style.display = 'none';
  document.getElementById('btn-add').style.display = 'none';
  updateRemoveCount();
  renderTable();
}

function exitRemoveMode() {
  removeMode = false;
  selected.clear();
  document.getElementById('remove-bar').classList.remove('show');
  document.getElementById('btn-remove-mode').style.display = '';
  document.getElementById('btn-add').style.display = '';
  renderTable();
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  updateRemoveCount();
  renderTable();
}

function updateRemoveCount() {
  document.getElementById('remove-count').textContent =
    `Označeno: ${selected.size} ${selected.size === 1 ? 'osoba' : selected.size < 5 ? 'osoby' : 'osob'}`;
}

// ── Add modal ─────────────────────────────────────────────────────────────────

let personCount = 0;

function createPersonBlock(num) {
  personCount++;
  const idx = personCount;
  const div = document.createElement('div');
  div.className = 'person-block';
  div.dataset.blockIdx = idx;
  div.innerHTML = `
    <div class="person-block-header">
      <span class="person-block-title">Osoba ${num}</span>
      ${num > 1 ? `<button class="btn-remove-block" title="Odstranit" onclick="removePersonBlock(this)">×</button>` : ''}
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Jméno *</label>
        <input type="text" class="f-name" placeholder="Příjmení Jméno" autocomplete="off">
      </div>
      <div class="form-field">
        <label>Hotel *</label>
        <input type="text" class="f-hotel" placeholder="A, T, I, A+I…" autocomplete="off">
      </div>
    </div>
    <div class="form-row three">
      <div class="form-field">
        <label>Datum narození</label>
        <input type="date" class="f-bdate">
      </div>
      <div class="form-field">
        <label>Škoda</label>
        <input type="text" class="f-damage" placeholder="1500 Kč, 2275 /2 os." autocomplete="off">
      </div>
      <div class="form-field">
        <label>Datum pobytu</label>
        <input type="date" class="f-sdate">
      </div>
    </div>
    <label>Důvod zařazení *</label>
    <textarea class="f-reason" placeholder="Stručný popis incidentu…"></textarea>
    <div class="warning-dup"></div>
  `;
  // Duplicate check on name input
  const nameInp = div.querySelector('.f-name');
  const bdateInp = div.querySelector('.f-bdate');
  const dupWarn  = div.querySelector('.warning-dup');
  function checkDup() {
    const n = nameInp.value.trim().toLowerCase();
    const b = bdateInp.value;
    if (!n) { dupWarn.style.display = 'none'; return; }
    const dup = entries.find(e =>
      e.name.toLowerCase() === n && (!b || formatDate(e.birth_date) === formatDate(b))
    );
    if (dup) {
      dupWarn.textContent = `Upozornění: osoba "${dup.name}" je již na blacklistu. Přesto lze přidat.`;
      dupWarn.style.display = '';
    } else {
      dupWarn.style.display = 'none';
    }
  }
  nameInp.addEventListener('input', checkDup);
  bdateInp.addEventListener('change', checkDup);
  initDatePickers(div);
  return div;
}

function removePersonBlock(btn) {
  const block = btn.closest('.person-block');
  block.remove();
  // Renumber titles
  document.querySelectorAll('#person-blocks .person-block').forEach((b, i) => {
    b.querySelector('.person-block-title').textContent = `Osoba ${i + 1}`;
  });
}

function openAddModal() {
  personCount = 0;
  const container = document.getElementById('person-blocks');
  container.innerHTML = '';
  container.appendChild(createPersonBlock(1));
  showOverlay('overlay-add');
  container.querySelector('.f-name').focus();
}

async function submitAdd() {
  const blocks = document.querySelectorAll('#person-blocks .person-block');
  const entries_to_add = [];
  let valid = true;
  blocks.forEach((b, i) => {
    const name   = b.querySelector('.f-name').value.trim();
    const hotel  = b.querySelector('.f-hotel').value.trim();
    const bdate  = b.querySelector('.f-bdate').value;
    const damage = b.querySelector('.f-damage').value.trim();
    const sdate  = b.querySelector('.f-sdate').value;
    const reason = b.querySelector('.f-reason').value.trim();
    if (!name || !reason) {
      b.querySelector('.f-name').style.borderColor = name ? '#ccc' : '#c0392b';
      b.querySelector('.f-reason').style.borderColor = reason ? '#ccc' : '#c0392b';
      valid = false;
      return;
    }
    entries_to_add.push({ name, hotel, birthDate: bdate || null, damage: damage || null, stayDate: sdate || null, reason });
  });
  if (!valid) { showToast('Vyplňte všechna povinná pole.', true); return; }
  const btn = document.getElementById('btn-add-submit');
  btn.disabled = true; btn.textContent = 'Ukládám…';
  try {
    const r = await apiFetch('/api/blacklist/entries', { method: 'POST', body: JSON.stringify({ entries: entries_to_add }) });
    if (!r.ok) throw new Error(r.msg);
    hideOverlay('overlay-add');
    await loadEntries();
    showToast(`Přidáno ${entries_to_add.length} ${entries_to_add.length === 1 ? 'osoba' : entries_to_add.length < 5 ? 'osoby' : 'osob'}.`);
  } catch(e) {
    showToast('Chyba při ukládání: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Přidat';
  }
}

// ── Remove selected modal ─────────────────────────────────────────────────────

function openRemoveModal() {
  if (selected.size === 0) { showToast('Nejdříve označte osoby k odebrání.', true); return; }
  const container = document.getElementById('removal-blocks');
  container.innerHTML = '';
  [...selected].forEach(id => {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    const div = document.createElement('div');
    div.className = 'removal-block';
    div.dataset.id = id;
    div.innerHTML = `
      <div class="removal-name">${escHtml(e.name)}</div>
      <label>Důvod odebrání *</label>
      <textarea class="f-rem-reason" placeholder="Proč je host odebírán z blacklistu…"></textarea>
    `;
    container.appendChild(div);
  });
  showOverlay('overlay-remove');
  container.querySelector('.f-rem-reason')?.focus();
}

async function submitRemove() {
  const blocks = document.querySelectorAll('#removal-blocks .removal-block');
  const removals = [];
  let valid = true;
  blocks.forEach(b => {
    const reason = b.querySelector('.f-rem-reason').value.trim();
    if (!reason) { b.querySelector('.f-rem-reason').style.borderColor = '#c0392b'; valid = false; return; }
    removals.push({ id: b.dataset.id, reason });
  });
  if (!valid) { showToast('Vyplňte důvod odebrání u každé osoby.', true); return; }
  const btn = document.getElementById('btn-rem-submit');
  btn.disabled = true; btn.textContent = 'Odebírám…';
  try {
    const r = await apiFetch('/api/blacklist/remove', { method: 'POST', body: JSON.stringify({ removals }) });
    if (!r.ok) throw new Error(r.msg);
    hideOverlay('overlay-remove');
    exitRemoveMode();
    await loadEntries();
    showToast(`Odebráno ${removals.length} ${removals.length === 1 ? 'osoba' : removals.length < 5 ? 'osoby' : 'osob'}.`);
    openHistory();
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Odebrat';
  }
}

// ── Intro editor ──────────────────────────────────────────────────────────────

function execCmd(cmd) {
  document.execCommand(cmd, false, null);
  document.getElementById('rte-body').focus();
}

async function openIntroModal() {
  const data = await apiFetch('/api/blacklist/intro');
  document.getElementById('rte-body').innerHTML = data.content || '';
  showOverlay('overlay-intro');
  document.getElementById('rte-body').focus();
}

async function submitIntro() {
  const content = document.getElementById('rte-body').innerHTML.trim();
  if (!content) { showToast('Obsah nesmí být prázdný.', true); return; }
  const btn = document.getElementById('btn-intro-submit');
  btn.disabled = true; btn.textContent = 'Ukládám…';
  try {
    const r = await apiFetch('/api/blacklist/intro', { method: 'PUT', body: JSON.stringify({ content }) });
    if (!r.ok) throw new Error(r.msg);
    hideOverlay('overlay-intro');
    await loadIntro();
    showToast('Úvodní text byl uložen.');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Uložit';
  }
}

// ── History ───────────────────────────────────────────────────────────────────

async function openHistory() {
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('history-view').style.display = 'block';
  const data = await apiFetch('/api/blacklist/audit');
  auditLog = data;
  renderHistory();
}

function renderHistory() {
  const action = document.getElementById('hist-filter-action').value;
  const from   = document.getElementById('hist-filter-from').value;
  const to     = document.getElementById('hist-filter-to').value;

  let rows = auditLog;
  if (action) rows = rows.filter(r => r.action === action);
  if (from)   rows = rows.filter(r => r.timestamp >= from);
  if (to)     rows = rows.filter(r => r.timestamp <= to + 'T23:59:59');

  const tbody = document.getElementById('hist-body');
  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:#888;">Žádné záznamy.</td></tr>`;
    return;
  }

  const actionLabel = { ADD: 'Přidání', REMOVE: 'Odebrání', EDIT_INTRO: 'Úprava textu' };

  tbody.innerHTML = rows.map(r => {
    const p = r.payload;
    let detail = '';
    if (r.action === 'ADD') {
      const e = p.entry || p;
      detail = `<strong>${escHtml(e.name || '')}</strong><br><span style="color:#555;font-size:11px;">${escHtml((e.reason || '').substring(0, 120))}</span>`;
    } else if (r.action === 'REMOVE') {
      const e = p.entry || p;
      const name = e.original_name || e.name || '';
      const remR = p.removalReason || p.removal_reason || '';
      const origR = e.original_reason || e.reason || '';
      detail = `<strong>${escHtml(name)}</strong><br>
        <span style="color:#555;font-size:11px;">Původní důvod: ${escHtml(origR.substring(0, 80))}</span><br>
        <span style="color:#b71c1c;font-size:11px;">Důvod odebrání: ${escHtml(remR)}</span>`;
    } else {
      detail = `<span style="color:#555;font-size:11px;">Upraven úvodní text</span>`;
    }
    return `<tr>
      <td style="white-space:nowrap;">${escHtml(formatDatetime(r.timestamp))}</td>
      <td>${escHtml(r.user_name)}</td>
      <td><span class="badge-action ${r.action}">${actionLabel[r.action] || r.action}</span></td>
      <td>${detail}</td>
      <td style="padding:4px;text-align:center;"><button class="btn-hist-del" onclick="deleteHistoryEntry('${escHtml(r.id)}')" title="Smazat záznam">×</button></td>
    </tr>`;
  }).join('');
}

async function deleteHistoryEntry(id) {
  if (!confirm('Smazat tento záznam z historie trvale?')) return;
  try {
    const r = await apiFetch(`/api/blacklist/audit/${id}`, { method: 'DELETE' });
    if (!r.ok) throw new Error(r.msg);
    auditLog = auditLog.filter(x => x.id !== id);
    renderHistory();
    showToast('Záznam smazán.');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  }
}

function closeHistory() {
  document.getElementById('history-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
}

// ── PDF export ────────────────────────────────────────────────────────────────

async function exportPdf() {
  const btn = document.getElementById('btn-pdf');
  btn.disabled = true; btn.textContent = 'Generuji…';
  try {
    const r = await fetch('/api/blacklist/export/pdf');
    if (!r.ok) {
      let msg = 'Chyba při generování PDF.';
      try { const j = await r.json(); msg = j.msg || msg; } catch(e) {}
      showToast(msg, true); return;
    }
    const warning = r.headers.get('X-PDF-Warning');
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const now = new Date();
    const pad2 = n => String(n).padStart(2,'0');
    a.download = `${now.getFullYear()}_${pad2(now.getMonth()+1)}_${pad2(now.getDate())}_BLACKLIST.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    if (warning) showToast('⚠ ' + warning, true);
    else showToast('PDF bylo vygenerováno.');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Export PDF';
  }
}

// ── Email export ──────────────────────────────────────────────────────────────

let emailPendingItems = [];

async function exportEmail() {
  const btn = document.getElementById('btn-email');
  btn.disabled = true; btn.textContent = 'Načítám…';
  try {
    const r = await apiFetch('/api/blacklist/export/email/pending');
    if (!r.ok) throw new Error(r.msg || 'Chyba');
    if (!r.items || r.items.length === 0) { showToast('Žádné nové změny k odeslání.'); return; }
    openEmailSelectModal(r.items);
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Export e-mail';
  }
}

function openEmailSelectModal(items) {
  emailPendingItems = items;
  const actionLabel = { ADD: 'Přidání', REMOVE: 'Odebrání' };
  const list = document.getElementById('email-select-list');
  list.innerHTML = items.map(item => {
    const p = item.payload || {};
    const entry = p.entry || p;
    const name = entry.name || entry.original_name || '—';
    const remReason = p.removalReason || '';
    const origReason = entry.reason || entry.original_reason || '';
    const preview = remReason
      ? `Důvod odebrání: ${remReason.substring(0, 80)}`
      : origReason.substring(0, 80);
    return `<label class="email-select-row">
      <input type="checkbox" class="email-sel-cb" data-id="${escHtml(item.id)}" onchange="updateEmailSelectCount()">
      <div class="email-select-info">
        <div class="email-select-name">
          <span class="badge-action ${item.action}">${actionLabel[item.action] || item.action}</span>
          &nbsp;${escHtml(name)}
        </div>
        <div class="email-select-meta">${escHtml(formatDatetime(item.timestamp))} · ${escHtml(item.user_name)}${preview ? ' · ' + escHtml(preview) : ''}</div>
      </div>
    </label>`;
  }).join('');
  updateEmailSelectCount();
  showOverlay('overlay-email-select');
}

function updateEmailSelectCount() {
  const checked = document.querySelectorAll('.email-sel-cb:checked').length;
  document.getElementById('email-select-count').textContent =
    `Vybráno: ${checked} z ${emailPendingItems.length}`;
}

function emailSelectAll(val) {
  document.querySelectorAll('.email-sel-cb').forEach(cb => cb.checked = val);
  updateEmailSelectCount();
}

async function generateEmailFromSelection() {
  const checked = [...document.querySelectorAll('.email-sel-cb:checked')];
  if (checked.length === 0) { showToast('Vyberte alespoň jednu změnu.', true); return; }
  const ids = checked.map(cb => cb.dataset.id);
  const btn = document.getElementById('btn-email-select-submit');
  btn.disabled = true; btn.textContent = 'Generuji…';
  try {
    const r = await apiFetch('/api/blacklist/export/email', { method: 'POST', body: JSON.stringify({ ids }) });
    if (!r.ok) throw new Error(r.msg || 'Chyba');
    hideOverlay('overlay-email-select');
    document.getElementById('email-preview-wrap').innerHTML = r.html;
    document.getElementById('email-preview-wrap').dataset.rawHtml = r.html;
    document.getElementById('email-modal-title').textContent = 'E-mail vygenerován';
    showOverlay('overlay-email');
  } catch(e) {
    showToast('Chyba: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Vygenerovat e-mail';
  }
}

async function copyEmail() {
  const html = document.getElementById('email-preview-wrap').dataset.rawHtml || '';
  try {
    await navigator.clipboard.write([
      new ClipboardItem({ 'text/html': new Blob([html], { type: 'text/html' }) })
    ]);
    showToast('Zkopírováno do schránky.');
  } catch(e) {
    showToast('Kopírování se nezdařilo: ' + e.message, true);
  }
}

// ── Custom date picker ────────────────────────────────────────────────────────

(function() {
  const MONTHS = ['Leden','Únor','Březen','Duben','Květen','Červen',
                  'Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  const DOW = ['Po','Út','St','Čt','Pá','So','Ne'];
  let openPopup = null;

  function closeAll() {
    if (openPopup) { openPopup.style.display = 'none'; openPopup = null; }
  }
  document.addEventListener('mousedown', function(e) {
    if (openPopup && !openPopup.closest('.cdp-wrap').contains(e.target)) closeAll();
  });

  function attachPicker(input) {
    if (input._cdp) return;
    input._cdp = true;
    input.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = 'cdp-wrap';
    input.parentNode.insertBefore(wrap, input);
    wrap.appendChild(input);

    const row = document.createElement('div');
    row.className = 'cdp-row';
    row.innerHTML = `<input type="text" class="cdp-text" readonly placeholder="dd.mm.rrrr">` +
                    `<button type="button" class="cdp-icon-btn" tabindex="-1">&#128197;</button>`;
    wrap.insertBefore(row, input);

    const dispInp = row.querySelector('.cdp-text');
    const iconBtn = row.querySelector('.cdp-icon-btn');

    const popup = document.createElement('div');
    popup.className = 'cdp-popup';
    popup.style.display = 'none';
    wrap.appendChild(popup);

    const today = new Date();
    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();

    function getValue() { return input.value; } // YYYY-MM-DD or ''

    function setValue(yyyy, mm, dd) {
      const str = `${yyyy}-${String(mm+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      input.value = str;
      dispInp.value = `${String(dd).padStart(2,'0')}.${String(mm+1).padStart(2,'0')}.${yyyy}`;
      input.dispatchEvent(new Event('change', { bubbles: true }));
      closeAll();
    }

    function clearValue() {
      input.value = '';
      dispInp.value = '';
      input.dispatchEvent(new Event('change', { bubbles: true }));
      closeAll();
    }

    function buildYearOptions() {
      let html = '';
      const startY = today.getFullYear() - 100, endY = today.getFullYear() + 5;
      for (let y = endY; y >= startY; y--)
        html += `<option value="${y}"${y === viewYear ? ' selected' : ''}>${y}</option>`;
      return html;
    }

    function renderPopup() {
      const selVal = getValue();
      let selY = 0, selM = 0, selD = 0;
      if (selVal) { const p = selVal.split('-'); selY=+p[0]; selM=+p[1]-1; selD=+p[2]; }

      const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
      const offset   = (firstDay === 0) ? 6 : firstDay - 1; // Mon=0
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      let grid = '';
      for (let i = 0; i < offset; i++) grid += `<div class="cdp-day cdp-empty"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const isSel   = selY === viewYear && selM === viewMonth && selD === d;
        const isToday = today.getFullYear()===viewYear && today.getMonth()===viewMonth && today.getDate()===d;
        let cls = 'cdp-day';
        if (isSel)   cls += ' cdp-selected';
        if (isToday) cls += ' cdp-today';
        grid += `<div class="${cls}" data-d="${d}">${d}</div>`;
      }

      popup.innerHTML =
        `<div class="cdp-head">` +
          `<select class="cdp-sel cdp-sel-m">${MONTHS.map((n,i)=>`<option value="${i}"${i===viewMonth?' selected':''}>${n}</option>`).join('')}</select>` +
          `<select class="cdp-sel cdp-sel-y">${buildYearOptions()}</select>` +
        `</div>` +
        `<div class="cdp-dow">${DOW.map(d=>`<span>${d}</span>`).join('')}</div>` +
        `<div class="cdp-grid">${grid}</div>` +
        `<div class="cdp-foot"><button class="cdp-btn-clear">Vymazat</button><button class="cdp-btn-today">Dnes</button></div>`;

      popup.querySelector('.cdp-sel-m').addEventListener('change', function() {
        viewMonth = +this.value; renderPopup();
      });
      popup.querySelector('.cdp-sel-y').addEventListener('change', function() {
        viewYear = +this.value; renderPopup();
      });
      popup.querySelector('.cdp-btn-clear').addEventListener('click', function(e) {
        e.stopPropagation(); clearValue();
      });
      popup.querySelector('.cdp-btn-today').addEventListener('click', function(e) {
        e.stopPropagation();
        viewYear = today.getFullYear(); viewMonth = today.getMonth();
        setValue(viewYear, viewMonth, today.getDate());
      });
      popup.querySelectorAll('.cdp-day[data-d]').forEach(el => {
        el.addEventListener('mousedown', function(e) {
          e.preventDefault(); e.stopPropagation();
          setValue(viewYear, viewMonth, +this.dataset.d);
        });
      });
    }

    function openPopupFn() {
      if (openPopup && openPopup !== popup) closeAll();
      const cur = getValue();
      if (cur) { const p = cur.split('-'); viewYear=+p[0]; viewMonth=+p[1]-1; }
      else { viewYear = today.getFullYear(); viewMonth = today.getMonth(); }
      renderPopup();
      popup.style.display = 'block';
      // flip above if not enough space below
      const rect = wrap.getBoundingClientRect();
      if (rect.bottom + 310 > window.innerHeight && rect.top > 310)
        popup.classList.add('cdp-above');
      else
        popup.classList.remove('cdp-above');
      openPopup = popup;
    }

    dispInp.addEventListener('mousedown', function(e) {
      e.preventDefault();
      if (popup.style.display !== 'none') { closeAll(); return; }
      openPopupFn();
    });
    iconBtn.addEventListener('mousedown', function(e) {
      e.preventDefault();
      if (popup.style.display !== 'none') { closeAll(); return; }
      openPopupFn();
    });

    // Reflect existing value on init
    if (input.value) {
      const p = input.value.split('-');
      if (p.length === 3)
        dispInp.value = `${p[2]}.${p[1]}.${p[0]}`;
    }
  }

  window.initDatePickers = function(root) {
    (root || document).querySelectorAll('input[type="date"]').forEach(inp => attachPicker(inp));
  };
})();
